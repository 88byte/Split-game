<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Split — Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
#title{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#titleWord{
  font:900 clamp(62px,16vw,120px)/1 'Cormorant Garamond','Georgia',serif;
  color:#fff;letter-spacing:.28em;text-transform:uppercase;
  text-shadow:0 0 100px rgba(180,80,255,.2),0 0 40px rgba(255,255,255,.08);
  margin-bottom:clamp(10px,2vh,18px);
}
#tagA{font:400 italic clamp(13px,3.4vw,17px)/1 'Cormorant Garamond','Georgia',serif;color:rgba(255,255,255,.55);letter-spacing:.3em;text-transform:uppercase;margin-bottom:6px;}
#tagB{font:400 italic clamp(13px,3.4vw,17px)/1 'Cormorant Garamond','Georgia',serif;color:rgba(180,80,255,.72);letter-spacing:.3em;text-transform:uppercase;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">
  <div id="titleWord">SPLIT</div>
  <div id="tagA">Nothing stays whole.</div>
  <div id="tagB">Everything transforms.</div>
</div>
<audio id="mus" preload="auto">
  <source src="https://dl.dropboxusercontent.com/scl/fi/z4sjuysyg1q5xxvs6tvw6/ES_Space-Whales-Stefan-Ekstrom-Adapted-2026-03-30-at-19.17.52-UTC.mp3?rlkey=lcqzo8d34xjmprckw1nexxu5f&st=cgkrj1dx" type="audio/mpeg">
</audio>
<script>
'use strict';
var C=document.getElementById('c'),ctx=C.getContext('2d');
var W,H;
function resize(){
  var dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;
  C.width=Math.round(W*dpr);C.height=Math.round(H*dpr);
  C.style.width=W+'px';C.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
}
resize();window.addEventListener('resize',resize);
var PI=Math.PI,TAU=PI*2;
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeOut4(t){return 1-Math.pow(1-t,4);}
function easeIn(t){return t*t*t;}
function rnd(a,b){return a+Math.random()*(b-a);}
function phase(T,start,dur){return clamp((T-start)/dur,0,1);}
var PURPLE='180,80,255',LTPURPLE='204,102,255',WHITE='255,255,255',DPURPLE='120,40,200';
var GT=0,startMs=null;

// 15-second Reels timeline
var TL={entryEnd:1.5,breathEnd:4.5,innerExpose:3.2,splitStart:4.5,splitEnd:12,titleFadeIn:12,titleFull:14,end:15};
var SP={p0:.08,p1:.18,p2:.42,p3:.62,p4:.875};
var BREATH_FREQ=0.3,BREATH_AMP=0.06;

var pts=[];
function Pt(x,y,vx,vy,r,life,col,glow,grav){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.r=r;this.life=life;this.ml=life;this.col=col||WHITE;this.glow=!!glow;this.grav=grav||.006;}
Pt.prototype.tick=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.vx*=.97;this.life-=.012;};
Pt.prototype.draw=function(){
  var al=clamp(this.life/this.ml,0,1);ctx.save();
  if(this.glow){ctx.shadowColor='rgba('+this.col+',1)';ctx.shadowBlur=this.r*4;}
  ctx.globalAlpha=al*.8;ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.r*al),0,TAU);
  ctx.fillStyle='rgba('+this.col+',1)';ctx.fill();ctx.restore();
};
function burst(x,y,n,spd,col,glow,grav){for(var i=0;i<n;i++){var a=rnd(0,TAU),s=rnd(spd*.25,spd);pts.push(new Pt(x,y,Math.cos(a)*s,Math.sin(a)*s,rnd(1,3.5),rnd(.8,1.8),col,glow,grav));}}

var stars=[],dust=[];
(function(){
  for(var i=0;i<380;i++){var warm=i>190;stars.push({x:Math.random(),y:Math.random(),r:rnd(.3,1.3),al:rnd(.04,.2),spd:rnd(.00002,.0001),col:warm?(Math.random()<.14?LTPURPLE:WHITE):'200,220,255',warm:warm});}
  var cc=['60,100,200','80,130,220'],wc=[DPURPLE,'100,40,180','160,70,240'];
  for(var j=0;j<60;j++){dust.push({x:Math.random(),y:Math.random(),r:rnd(50,140),al:rnd(.01,.044),spd:rnd(.00001,.00005),col:j<30?cc[j%cc.length]:wc[j%wc.length],warm:j>=30});}
})();
function drawSpace(temp){
  var t=clamp(temp,0,1),ct=1-t,wt=t;
  for(var i=0;i<stars.length;i++){var s=stars[i];s.x=(s.x+s.spd)%1;var a=s.warm?wt:ct;if(a<=0)continue;ctx.globalAlpha=s.al*a;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,TAU);ctx.fillStyle='rgba('+s.col+',1)';ctx.fill();}
  ctx.globalAlpha=1;
  for(var j=0;j<dust.length;j++){var d=dust[j];d.x=(d.x+d.spd)%1;var a2=d.warm?wt:ct;if(a2<=0)continue;var dg=ctx.createRadialGradient(d.x*W,d.y*H,0,d.x*W,d.y*H,d.r);dg.addColorStop(0,'rgba('+d.col+','+d.al*a2+')');dg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=dg;ctx.beginPath();ctx.arc(d.x*W,d.y*H,d.r,0,TAU);ctx.fill();}
}
function drawVignette(s){var vg=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.72);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(.5,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,'+(s||.8)+')');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);}

var PLASMA=[];
(function(){var cols=['140,60,255','180,80,255','100,40,200','200,120,255','220,160,255','160,80,240','240,200,255','255,255,255'];for(var i=0;i<8;i++){PLASMA.push({as:rnd(.12,.28)*(Math.random()<.5?1:-1),bs:rnd(.14,.32)*(Math.random()<.5?1:-1),ox:rnd(.2,.8),oy:rnd(.2,.8),sz:rnd(.32,.56),al:rnd(.35,.58),col:cols[i],seed:rnd(0,TAU)});}})();

function drawOrb(x,y,r,col,alpha,iBlend,gm){
  if(alpha<=0||r<=0)return;
  ctx.save();ctx.globalAlpha=alpha;
  var breathe=1+Math.sin(GT*BREATH_FREQ*TAU)*BREATH_AMP,pr=r*breathe,g=gm||1;
  var og=ctx.createRadialGradient(x,y,pr*.2,x,y,pr*2.3*g);og.addColorStop(0,'rgba('+col+',.15)');og.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,pr*2.3*g,0,TAU);ctx.fill();
  ctx.beginPath();ctx.arc(x,y,pr+2,0,TAU);ctx.strokeStyle='rgba('+col+',.09)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.beginPath();ctx.arc(x,y,pr,0,TAU);ctx.clip();
  ctx.globalAlpha=alpha;ctx.fillStyle='rgba(3,1,12,.92)';ctx.beginPath();ctx.arc(x,y,pr,0,TAU);ctx.fill();
  var ib=clamp(iBlend||0,0,1);
  for(var i=0;i<PLASMA.length;i++){
    var p=PLASMA[i];
    var bx=x+Math.cos(p.as*GT+p.ox*TAU)*pr*(p.ox*.65+.12);
    var by2=y+Math.sin(p.bs*GT+p.oy*TAU)*pr*(p.oy*.65+.12);
    var bsz=pr*p.sz*(0.65+.35*Math.sin(GT*p.bs*2.5+p.seed));
    var bal=p.al*(0.55+.45*Math.sin(GT*.4+p.seed));
    if(ib>0){var tCol=(by2<y)?LTPURPLE:(i%2===0?'220,210,255':WHITE);var tBg=ctx.createRadialGradient(bx,by2,0,bx,by2,bsz);tBg.addColorStop(0,'rgba('+tCol+','+(bal*ib*.9)+')');tBg.addColorStop(.5,'rgba('+tCol+','+(bal*ib*.3)+')');tBg.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=alpha;ctx.fillStyle=tBg;ctx.beginPath();ctx.arc(bx,by2,bsz,0,TAU);ctx.fill();bal*=(0.7+ib*.3);}
    var bg=ctx.createRadialGradient(bx,by2,0,bx,by2,bsz);bg.addColorStop(0,'rgba('+p.col+','+bal*.9+')');bg.addColorStop(.5,'rgba('+p.col+','+bal*.3+')');bg.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=alpha;ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bx,by2,bsz,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=alpha*.2;
  for(var ti=0;ti<5;ti++){var ta=GT*.22+ti*TAU/5,tr=pr*(0.28+.18*Math.sin(GT*.4+ti*1.2));ctx.strokeStyle='rgba('+PURPLE+',.6)';ctx.lineWidth=.9;ctx.shadowColor='rgba('+PURPLE+',1)';ctx.shadowBlur=4;ctx.beginPath();ctx.moveTo(x+Math.cos(ta)*tr*.25,y+Math.sin(ta)*tr*.25);ctx.quadraticCurveTo(x+Math.cos(ta+.7)*tr*.65,y+Math.sin(ta+.45)*tr*.55,x+Math.cos(ta+1.3)*tr,y+Math.sin(ta+1.0)*tr*.82);ctx.stroke();}
  ctx.shadowBlur=0;
  var cR=pr*.18*(1+Math.sin(GT*BREATH_FREQ*TAU)*.22);var cg=ctx.createRadialGradient(x,y,0,x,y,cR);cg.addColorStop(0,'rgba(255,255,255,.96)');cg.addColorStop(.4,'rgba(200,140,255,.55)');cg.addColorStop(1,'rgba(0,0,0,0)');ctx.globalAlpha=alpha*.88;ctx.fillStyle=cg;ctx.beginPath();ctx.arc(x,y,cR,0,TAU);ctx.fill();
  if(ib>0){var seamN=28;for(var si=0;si<seamN;si++){var sa=si/seamN*TAU+GT*.15,isPurp=si<seamN/2;var esc=ib*(0.28+.5*Math.sin(GT*1.8+si*.4+1));var spx=x+Math.cos(sa)*pr*(0.52+.28*Math.abs(Math.cos(sa)));var spy=y+Math.sin(sa)*pr*.12-(isPurp?1:-1)*pr*esc;spy+=Math.sin(GT*2.5+si*.7)*ib*pr*.07;spx+=Math.cos(GT*1.8+si*.5)*ib*pr*.05;ctx.globalAlpha=alpha*ib*(.32+.28*Math.sin(GT*1.5+si));ctx.shadowColor='rgba('+(isPurp?LTPURPLE:WHITE)+',1)';ctx.shadowBlur=3;ctx.beginPath();ctx.arc(spx,spy,isPurp?1.8:1.4,0,TAU);ctx.fillStyle='rgba('+(isPurp?LTPURPLE:WHITE)+',1)';ctx.fill();}ctx.shadowBlur=0;}
  ctx.restore();
  ctx.beginPath();ctx.arc(x,y,pr,0,TAU);var sp2=ctx.createRadialGradient(x-pr*.28,y-pr*.36,0,x-pr*.1,y-pr*.18,pr*.5);sp2.addColorStop(0,'rgba(255,255,255,.44)');sp2.addColorStop(1,'rgba(255,255,255,0)');ctx.globalAlpha=alpha*.5;ctx.fillStyle=sp2;ctx.fill();
  ctx.restore();
}
function drawSimpleOrb(x,y,r,col,alpha){
  if(alpha<=0||r<=0)return;ctx.save();ctx.globalAlpha=alpha;var pr=r*(1+Math.sin(GT*2.1)*.034);
  var og=ctx.createRadialGradient(x,y,pr*.2,x,y,pr*2.3);og.addColorStop(0,'rgba('+col+',.15)');og.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,pr*2.3,0,TAU);ctx.fill();
  var bg=ctx.createRadialGradient(x-pr*.25,y-pr*.3,0,x,y,pr);bg.addColorStop(0,'rgba(255,255,255,.92)');bg.addColorStop(.28,'rgba('+col+',.96)');bg.addColorStop(1,'rgba(0,0,0,.55)');ctx.globalAlpha=alpha*.88;ctx.fillStyle=bg;ctx.beginPath();ctx.arc(x,y,pr,0,TAU);ctx.fill();
  var sp=ctx.createRadialGradient(x-pr*.28,y-pr*.35,0,x-pr*.1,y-pr*.18,pr*.5);sp.addColorStop(0,'rgba(255,255,255,.5)');sp.addColorStop(1,'rgba(255,255,255,0)');ctx.globalAlpha=alpha*.54;ctx.fillStyle=sp;ctx.fill();ctx.restore();
}

function draw(){
  var T=GT;ctx.fillStyle='#06080d';ctx.fillRect(0,0,W,H);
  var temp=clamp(T/TL.splitStart,0,1);
  if(T<TL.entryEnd){
    var ep=T/TL.entryEnd;drawSpace(ep*.4);var er=W*.13*easeOut4(ep);
    if(ep<.08&&Math.random()<.5)burst(W*.5,H*.5,3,rnd(2,5),PURPLE,true,.007);
    ctx.save();ctx.globalAlpha=easeOut(ep)*.1;var pb=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.5);pb.addColorStop(0,'rgba('+PURPLE+',.4)');pb.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=pb;ctx.fillRect(0,0,W,H);ctx.restore();
    drawOrb(W*.5,H*.5,er,PURPLE,easeOut(ep),0);drawVignette(.85);
  }
  else if(T<TL.breathEnd){
    drawSpace(temp*.7);
    ctx.save();ctx.globalAlpha=.09;var pb2=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.52);pb2.addColorStop(0,'rgba('+PURPLE+',.32)');pb2.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=pb2;ctx.fillRect(0,0,W,H);ctx.restore();
    for(var ri=0;ri<4;ri++){var rp=((GT*BREATH_FREQ+ri*.25)%1);ctx.save();ctx.globalAlpha=Math.max(0,(1-rp)*.08);ctx.strokeStyle='rgba('+PURPLE+',.7)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(W*.5,H*.5,W*.13*(1+rp*4.5),0,TAU);ctx.stroke();ctx.restore();}
    var iBlend=clamp(phase(T,TL.innerExpose,1.2),0,1),gm=1+iBlend*.4;
    if(iBlend>.06&&iBlend<.5&&Math.random()<.18){burst(W*.5+rnd(-W*.1,W*.1),H*.5-rnd(0,W*.05),2,rnd(1.8,3.5),LTPURPLE,true,.005);burst(W*.5+rnd(-W*.1,W*.1),H*.5+rnd(0,W*.05),2,rnd(1.8,3.5),WHITE,true,.005);}
    drawOrb(W*.5,H*.5,W*.13,PURPLE,1,iBlend,gm);drawVignette(.8);
  }
  else if(T<TL.splitEnd){
    var sp=phase(T,TL.splitStart,TL.splitEnd-TL.splitStart);drawSpace(1);
    ctx.save();ctx.globalAlpha=.1;var satm=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.6);satm.addColorStop(0,'rgba('+PURPLE+',.4)');satm.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=satm;ctx.fillRect(0,0,W,H);ctx.restore();
    var p0=SP.p0,p1=SP.p1,p2=SP.p2,p3=SP.p3,p4=SP.p4;
    var sox=W*.5,soy=H*.5,sor=W*.13,ssx=1,ssy=1;
    if(sp<=p0){drawOrb(sox,soy,sor,PURPLE,1,1,1);}
    else if(sp<=p1){drawOrb(sox,soy,sor,PURPLE,1,clamp((sp-p0)/(p1-p0),0,1),1);}
    else if(sp<=p2){
      var tp=easeIn((sp-p1)/(p2-p1)),ta=clamp(tp*14,0,16);
      sox=W*.5+Math.sin(GT*16+tp*8)*ta+Math.sin(GT*24)*ta*.35;soy=H*.5+Math.sin(GT*14)*ta*.7;
      if(Math.random()<.38){pts.push(new Pt(sox+rnd(-sor*.6,sor*.6),soy-sor*.2,rnd(-.5,.5),rnd(-1.8,-.3),rnd(1,2.5),rnd(.8,1.8),LTPURPLE,true,.004));pts.push(new Pt(sox+rnd(-sor*.6,sor*.6),soy+sor*.2,rnd(-.5,.5),rnd(.3,1.8),rnd(1,2.5),rnd(.8,1.8),WHITE,true,.004));}
      drawOrb(sox,soy,sor,PURPLE,1,1,1);
    }
    else if(sp<=p3){
      var sq=easeIn((sp-p2)/(p3-p2));sox=W*.5+Math.sin(GT*9)*3;soy=H*.5;ssx=1-sq*.42;ssy=1+sq*.26;
      if(Math.random()<.5){pts.push(new Pt(sox+rnd(-sor*.5,sor*.5),soy-rnd(0,sor*.3),rnd(-1,1),rnd(-2.5,-.5),rnd(1.5,3),rnd(.7,1.6),LTPURPLE,true,.004));pts.push(new Pt(sox+rnd(-sor*.5,sor*.5),soy+rnd(0,sor*.3),rnd(-1,1),rnd(.5,2.5),rnd(1.5,3),rnd(.7,1.6),WHITE,true,.004));}
      ctx.save();ctx.globalAlpha=sq*.35;
      var crack=ctx.createLinearGradient(sox-sor,soy,sox+sor,soy);crack.addColorStop(0,'rgba('+LTPURPLE+',0)');crack.addColorStop(.3,'rgba('+LTPURPLE+',.8)');crack.addColorStop(.5,'rgba(255,255,255,1)');crack.addColorStop(.7,'rgba('+WHITE+',.8)');crack.addColorStop(1,'rgba('+WHITE+',0)');
      ctx.strokeStyle=crack;ctx.lineWidth=2+sq*3;ctx.shadowColor='rgba(255,255,255,1)';ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(sox-sor*.9,soy);ctx.lineTo(sox+sor*.9,soy);ctx.stroke();ctx.shadowBlur=0;ctx.restore();
      ctx.save();ctx.translate(sox,soy);ctx.scale(ssx,ssy);ctx.translate(-sox,-soy);drawOrb(sox,soy,sor,PURPLE,1,1,1);ctx.restore();
    }
    else if(sp<=p4){
      var flashBuild=easeOut4((sp-p3)/(p4-p3));
      if(Math.random()<.65){pts.push(new Pt(W*.5+rnd(-sor*.4,sor*.4),H*.5-sor*.1,rnd(-2,2),rnd(-3.5,-.8),rnd(2,4),rnd(.5,1.3),LTPURPLE,true,.005));pts.push(new Pt(W*.5+rnd(-sor*.4,sor*.4),H*.5+sor*.1,rnd(-2,2),rnd(.8,3.5),rnd(2,4),rnd(.5,1.3),WHITE,true,.005));}
      ctx.save();ctx.globalAlpha=flashBuild*.78;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();
    }
    else{
      var postP=easeOut4((sp-p4)/(1-p4)),fl2=Math.max(0,1-postP*3);
      if(fl2>0){ctx.save();ctx.globalAlpha=fl2*.7;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();}
      if(postP<.06&&Math.random()<.8){burst(W*.5,H*.5,8,rnd(3,7),LTPURPLE,true,.006);burst(W*.5,H*.5,8,rnd(3,7),WHITE,true,.006);}
      var driftP=easeOut(postP)*H*.2,oAlpha=Math.min(postP*5,1);
      drawSimpleOrb(W*.5,H*.5-driftP,sor*.88,LTPURPLE,oAlpha);
      drawSimpleOrb(W*.5,H*.5+driftP,sor*.88,WHITE,oAlpha);
      if(driftP>8){ctx.save();ctx.globalAlpha=(1-postP)*.15;ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1;ctx.setLineDash([3,7]);ctx.beginPath();ctx.moveTo(W*.5,H*.5-driftP+sor*.88);ctx.lineTo(W*.5,H*.5+driftP-sor*.88);ctx.stroke();ctx.setLineDash([]);ctx.restore();}
    }
    drawVignette(.76);
  }
  else{
    drawSpace(1);ctx.save();ctx.globalAlpha=.07;var datm=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.65);datm.addColorStop(0,'rgba('+PURPLE+',.4)');datm.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=datm;ctx.fillRect(0,0,W,H);ctx.restore();
    var dT=T-TL.splitEnd,oR=W*.07,oFade=Math.max(0,1-phase(T,TL.titleFull-.5,1)*.5),tDrift=easeOut(Math.min(dT/3,1))*W*.15;
    drawSimpleOrb(W*.5-tDrift,H*.42,oR,LTPURPLE,oFade*.8);
    drawSimpleOrb(W*.5+tDrift,H*.58,oR,WHITE,oFade*.8);
    var tA=phase(T,TL.titleFadeIn,TL.titleFull-TL.titleFadeIn);
    document.getElementById('title').style.opacity=easeOut(tA);
    drawVignette(.7);
  }
  ctx.save();ctx.globalAlpha=1;for(var pi=pts.length-1;pi>=0;pi--){pts[pi].tick();pts[pi].draw();if(pts[pi].life<=0)pts.splice(pi,1);}ctx.restore();
}

var running=true;
function loop(ts){if(!startMs)startMs=ts;GT=(ts-startMs)/1000;if(GT>TL.end)GT=TL.end;draw();if(GT<TL.end&&running)requestAnimationFrame(loop);}
window.addEventListener('load',function(){var mus=document.getElementById('mus');mus.volume=.75;mus.play().catch(function(){});requestAnimationFrame(loop);});
</script>
</body>
</html>
