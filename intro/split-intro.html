<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Split</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
#tapScreen{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;cursor:pointer;transition:opacity 1.2s ease;
}
#tapTitle{
  font-family:'Georgia',serif;font-size:clamp(52px,14vw,96px);
  font-weight:900;color:#fff;letter-spacing:0.25em;text-transform:uppercase;
  margin-bottom:clamp(28px,6vh,52px);
}
#tapHint{
  font-family:'Georgia',serif;font-size:clamp(10px,2.5vw,13px);
  color:rgba(255,255,255,0.22);letter-spacing:0.35em;text-transform:uppercase;
  animation:pulseHint 2.4s ease-in-out infinite;
}
@keyframes pulseHint{0%,100%{opacity:0.22;}50%{opacity:0.55;}}
#caption{
  position:fixed;bottom:0;left:0;right:0;
  padding:0 10vw clamp(52px,12vh,100px);
  text-align:center;z-index:20;pointer-events:none;opacity:0;
}
#captionInner{
  font-family:'Georgia',serif;font-size:clamp(15px,4vw,23px);
  line-height:1.95;color:rgba(255,255,255,0.88);letter-spacing:0.04em;
}
#logoWrap{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#logoText{
  font-family:'Georgia',serif;font-size:clamp(56px,15vw,112px);
  font-weight:900;color:#fff;letter-spacing:0.28em;text-transform:uppercase;
  text-shadow:0 0 80px rgba(255,255,255,0.10);
  margin-bottom:clamp(12px,2.5vh,24px);
}
#logoTagline{
  font-family:'Georgia',serif;font-size:clamp(10px,2.6vw,14px);
  color:rgba(255,255,255,0.32);letter-spacing:0.32em;text-transform:uppercase;
  margin-bottom:clamp(40px,10vh,80px);
}
#playBtn{
  font-family:'Georgia',serif;font-size:11px;letter-spacing:0.38em;
  text-transform:uppercase;color:#fff;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);
  border-radius:50px;padding:14px 44px;
  cursor:pointer;pointer-events:none;opacity:0;
  transition:background 0.3s,border-color 0.3s;
}
#playBtn:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.32);}
#skipBtn{
  position:fixed;bottom:26px;right:26px;z-index:50;
  font-family:'Georgia',serif;font-size:9px;letter-spacing:0.32em;
  text-transform:uppercase;color:rgba(255,255,255,0.16);
  background:none;border:none;cursor:pointer;transition:color 0.3s;
}
#skipBtn:hover{color:rgba(255,255,255,0.42);}
</style>
</head>
<body>
<div id="tapScreen"><div id="tapTitle">SPLIT</div><div id="tapHint">tap anywhere to begin</div></div>
<canvas id="c"></canvas>
<div id="caption"><div id="captionInner"></div></div>
<div id="logoWrap">
  <div id="logoText">SPLIT</div>
  <div id="logoTagline">Two halves &nbsp;·&nbsp; One mind &nbsp;·&nbsp; Zero margin</div>
  <button id="playBtn">Enter</button>
</div>
<button id="skipBtn">Skip</button>
<audio id="bgMusic" loop preload="auto">
  <source src="https://dl.dropboxusercontent.com/scl/fi/ofizgf1f67ew7da9wqrqe/ES_Pillow-Magic-Valante.mp3?rlkey=l8ph4trcq9cbxs0w4qmtovem4&st=a6qgi5gk" type="audio/mpeg">
</audio>
<script>
'use strict';
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
var PI=Math.PI,PI2=PI*2;
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function easeOut(t){return 1-Math.pow(1-t,3);}
function easeIn(t){return t*t*t;}
function easeIO(t){return t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;}
function rnd(a,b){return a+Math.random()*(b-a);}
var GT=0,startMs=null;

// ── PARTICLES ─────────────────────────────────────────────────
var particles=[];
function Pt(x,y,vx,vy,r,life,col,glow){
  this.x=x;this.y=y;this.vx=vx;this.vy=vy;
  this.r=r;this.life=life;this.maxLife=life;this.col=col;this.glow=!!glow;
}
Pt.prototype.tick=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.008;this.vx*=0.97;this.life-=0.009;};
Pt.prototype.draw=function(){
  var al=clamp(this.life/this.maxLife,0,1);
  ctx.save();
  if(this.glow){ctx.shadowColor='rgba('+this.col+',0.9)';ctx.shadowBlur=this.r*4;}
  ctx.globalAlpha=al*0.75;
  ctx.beginPath();ctx.arc(this.x,this.y,this.r*al,0,PI2);
  ctx.fillStyle='rgba('+this.col+',1)';ctx.fill();
  ctx.restore();
};
function burst(x,y,n,spd,col,glow){
  for(var i=0;i<n;i++){
    var a=rnd(0,PI2),s=rnd(spd*0.3,spd);
    particles.push(new Pt(x,y,Math.cos(a)*s,Math.sin(a)*s,rnd(1,3.5),rnd(0.9,2),col,glow));
  }
}

// ── SPACE BACKGROUND ──────────────────────────────────────────
var stars=[],dustClouds=[];
(function(){
  for(var i=0;i<350;i++){
    stars.push({x:Math.random(),y:Math.random(),r:rnd(0.3,1.3),al:rnd(0.04,0.2),spd:rnd(0.00002,0.00009),
      col:Math.random()<0.12?'180,200,255':Math.random()<0.08?'255,200,180':'255,255,255'});
  }
  var dc=['70,110,190','110,55,195','55,150,190','150,90,210','190,110,70'];
  for(var j=0;j<60;j++){
    dustClouds.push({x:Math.random(),y:Math.random(),r:rnd(50,140),al:rnd(0.012,0.05),
      spd:rnd(0.00001,0.00005),col:dc[Math.floor(Math.random()*dc.length)]});
  }
})();
function drawSpace(tint){
  var t=tint||1;
  for(var i=0;i<stars.length;i++){
    var s=stars[i];s.x=(s.x+s.spd)%1;
    ctx.globalAlpha=s.al*t;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,PI2);
    ctx.fillStyle='rgba('+s.col+',1)';ctx.fill();
  }
  ctx.globalAlpha=1;
  for(var j=0;j<dustClouds.length;j++){
    var d=dustClouds[j];d.x=(d.x+d.spd)%1;
    var dg=ctx.createRadialGradient(d.x*W,d.y*H,0,d.x*W,d.y*H,d.r);
    dg.addColorStop(0,'rgba('+d.col+','+d.al*t+')');dg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=dg;ctx.beginPath();ctx.arc(d.x*W,d.y*H,d.r,0,PI2);ctx.fill();
  }
}
function drawVignette(str){
  var vg=ctx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(0.52,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,'+(str||0.78)+')');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}
function drawGrid(alpha,col){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=alpha;
  ctx.strokeStyle=col||'rgba(255,255,255,1)';ctx.lineWidth=0.5;
  var step=clamp(Math.min(W,H)*0.075,38,78);
  for(var x=0;x<W+step;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H+step;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();
}
function drawPerspGrid(alpha,col){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=alpha;
  var vx=W*0.5,vy=H*0.38;
  ctx.strokeStyle=col||'rgba(180,80,255,0.8)';ctx.lineWidth=0.7;
  var lines=16;
  for(var i=0;i<=lines;i++){ctx.beginPath();ctx.moveTo(W*i/lines,H);ctx.lineTo(vx,vy);ctx.stroke();}
  for(var j=0;j<=10;j++){
    var rp=Math.pow(j/10,1.5);
    var ry=lerp(H,vy,rp);
    ctx.beginPath();ctx.moveTo(lerp(0,vx,rp),ry);ctx.lineTo(lerp(W,vx,rp),ry);ctx.stroke();
  }
  ctx.restore();
}
function drawHueBands(alpha){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=alpha;
  for(var i=0;i<8;i++){
    var hue=(i/8*360+GT*18)%360;
    ctx.fillStyle='hsla('+hue+',65%,55%,0.065)';
    ctx.fillRect(0,H*(i/8+((GT*0.04)%0.125)),W,H/8+2);
  }
  ctx.restore();
}

// ── ORB ────────────────────────────────────────────────────────
function drawOrb(x,y,r,col,alpha,gm){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=alpha;
  var pr=r*(1+Math.sin(GT*2.1)*0.035);
  var g=gm||1;
  var og=ctx.createRadialGradient(x,y,pr*0.3,x,y,pr*2.6*g);
  og.addColorStop(0,'rgba('+col+',0.13)');og.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,pr*2.6*g,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(x,y,pr+3+Math.sin(GT*1.7)*1.5,0,PI2);
  ctx.strokeStyle='rgba('+col+',0.09)';ctx.lineWidth=1.5;ctx.stroke();
  var bg=ctx.createRadialGradient(x-pr*0.26,y-pr*0.3,0,x,y,pr);
  bg.addColorStop(0,'rgba(255,255,255,0.92)');bg.addColorStop(0.32,'rgba('+col+',0.96)');
  bg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.beginPath();ctx.arc(x,y,pr,0,PI2);ctx.globalAlpha=alpha*0.88;ctx.fillStyle=bg;ctx.fill();
  var sp=ctx.createRadialGradient(x-pr*0.28,y-pr*0.34,0,x-pr*0.12,y-pr*0.18,pr*0.52);
  sp.addColorStop(0,'rgba(255,255,255,0.52)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.globalAlpha=alpha*0.58;ctx.fillStyle=sp;ctx.fill();
  ctx.globalAlpha=alpha*0.35;
  for(var i=0;i<5;i++){
    var a=i/5*PI2+GT*0.45;
    ctx.beginPath();ctx.arc(x+Math.cos(a)*pr*0.34,y+Math.sin(a)*pr*0.34,1.2,0,PI2);
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
  }
  ctx.restore();
}

// ── CINEMATIC WALL ─────────────────────────────────────────────
function drawWall(x,topH,botY,alpha,gc){
  if(alpha<=0)return;
  var ww=clamp(W*0.048,26,52);
  var c=gc||'100,160,255';
  ctx.save();
  // Depth layers
  for(var d=4;d>=1;d--){
    ctx.globalAlpha=alpha*(0.07*d);
    ctx.fillStyle='rgba(5,8,14,'+  (0.88-d*0.07)+')';
    ctx.fillRect(x-ww*0.5+d*4,0,ww,topH);
    ctx.fillRect(x-ww*0.5+d*4,botY,ww,H-botY);
  }
  // Main face
  var wg=ctx.createLinearGradient(x-ww*0.5,0,x+ww*0.5,0);
  wg.addColorStop(0,'rgba(7,11,19,0.97)');wg.addColorStop(0.45,'rgba(17,23,35,0.97)');
  wg.addColorStop(0.55,'rgba(17,23,35,0.97)');wg.addColorStop(1,'rgba(5,8,15,0.97)');
  ctx.globalAlpha=alpha;ctx.fillStyle=wg;
  ctx.fillRect(x-ww*0.5,0,ww,topH);ctx.fillRect(x-ww*0.5,botY,ww,H-botY);
  // Glow edges
  ctx.shadowColor='rgba('+c+',0.9)';ctx.shadowBlur=16;
  ctx.strokeStyle='rgba('+c+',0.38)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-ww*0.5,topH);ctx.lineTo(x+ww*0.5,topH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-ww*0.5,botY);ctx.lineTo(x+ww*0.5,botY);ctx.stroke();
  ctx.shadowBlur=0;
  // Gap glow — light from other side
  var gapH=botY-topH,gcY=topH+gapH*0.5;
  var gg=ctx.createRadialGradient(x,gcY,0,x,gcY,gapH*0.9);
  gg.addColorStop(0,'rgba('+c+',0.05)');gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.fillRect(x-gapH,gcY-gapH,gapH*2,gapH*2);
  // Notches
  ctx.globalAlpha=alpha*0.1;ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=0.5;
  for(var n=0;n<3;n++){
    var ny=topH*0.2+topH*0.28*n;
    ctx.beginPath();ctx.moveTo(x-ww*0.35,ny);ctx.lineTo(x+ww*0.35,ny);ctx.stroke();
  }
  ctx.restore();
}

// ── CAPTION ────────────────────────────────────────────────────
var captEl=document.getElementById('caption');
var captInner=document.getElementById('captionInner');
var captQueue=[],captRunning=false,captTimers=[];
function qC(text,hold,delay){
  captQueue.push({text:text,hold:hold||3800,delay:delay||0});
  if(!captRunning)nextCaption();
}
function nextCaption(){
  if(!captQueue.length){captRunning=false;return;}
  captRunning=true;
  var item=captQueue.shift();
  captTimers.push(setTimeout(function(){
    captInner.innerHTML=item.text.replace(/\n/g,'<br>');
    fadeCaptTo(1,600,function(){
      captTimers.push(setTimeout(function(){
        fadeCaptTo(0,750,function(){
          captTimers.push(setTimeout(nextCaption,200));
        });
      },item.hold));
    });
  },item.delay));
}
function fadeCaptTo(to,dur,cb){
  var from=parseFloat(captEl.style.opacity)||0,s=null;
  function step(ts){
    if(!s)s=ts;var p=clamp((ts-s)/dur,0,1);
    captEl.style.opacity=lerp(from,to,easeIO(p));
    if(p<1)requestAnimationFrame(step);else if(cb)cb();
  }
  requestAnimationFrame(step);
}
function clearCaptions(){
  captTimers.forEach(clearTimeout);captTimers=[];
  captQueue=[];captRunning=false;
  captEl.style.opacity=0;captInner.textContent='';
}

// ── SCENES ─────────────────────────────────────────────────────
var SCENES=[
  {id:'void',     dur:4000},
  {id:'pulse',    dur:8000},
  {id:'gaps',     dur:7500},
  {id:'confront', dur:6500},
  {id:'breath',   dur:7000},
  {id:'struggle', dur:10000},
  {id:'merge',    dur:6000},
  {id:'states',   dur:11000},
  {id:'founders', dur:7500},
  {id:'logo',     dur:99999},
];
var curScene=0,sceneStart=0,sceneT=0,sceneTimer=null;
var wallSet=[],confrontWallX=0;

function initScrollWalls(){
  wallSet=[];
  for(var i=0;i<3;i++){
    wallSet.push({x:W+80+i*(W*0.55),gapCY:H*(0.28+Math.random()*0.44),
      gapH:H*(0.15+Math.random()*0.09),spd:W*0.0032,alpha:0});
  }
}

function fireScene(id){
  if(id==='pulse'){
    qC('In the beginning',3400,900);
    qC('there was only the pulse.',3600,4600);
    qC('One light.\n\nWhole.\n\nUndivided.',4500,9000);
  }
  else if(id==='gaps'){
    initScrollWalls();
    qC('Then the world learned to build walls.',4000,700);
    qC('Not from malice.\n\nFrom nature.',4500,5200);
  }
  else if(id==='confront'){
    confrontWallX=W*0.68;
    qC('The walls did not want to destroy you.',4000,600);
    qC('They were indifferent.',3000,5000);
    qC('They existed\nin the exact shape\nof your fear.',5000,8400);
  }
  else if(id==='breath'){
    qC('The first ones who endured\ndid not conquer.',4500,700);
    qC('They became still.',3800,5600);
  }
  else if(id==='struggle'){
    qC('They discovered\nwhat the walls could not anticipate.',4800,5500);
    qC('That one thing could be two\nwithout ceasing to be whole.',5000,11000);
  }
  else if(id==='merge'){
    qC('Hold to become many.',3000,500);
    qC('Release to become one.',3000,3900);
    qC('The rhythm was older\nthan the walls themselves.',4500,7400);
  }
  else if(id==='states'){
    qC('Some never hear it.',2800,400);
    qC('The ones who go deepest\nenter something older than memory.',4800,3400);
    qC('Three thresholds.\n\nThree awakenings.\n\nEach older than the last.',5500,8600);
  }
  else if(id==='founders'){
    qC('The first thousand\nwho reached the oldest light',4500,800);
    qC('carry something forward\nthat cannot be bought.',4200,6000);
    qC('Only earned.',4000,10800);
  }
}

function advance(){
  if(curScene>=SCENES.length-1)return;
  curScene++;
  sceneStart=performance.now();
  clearCaptions();
  particles=[];
  wallSet=[];
  fireScene(SCENES[curScene].id);
  if(SCENES[curScene].id!=='logo'){
    sceneTimer=setTimeout(advance,SCENES[curScene].dur);
  } else {
    setTimeout(showLogo,1600);
  }
}

// ── DRAW SCENES ────────────────────────────────────────────────
function drawScene(id,p){
  var fi=clamp(p*6,0,1);
  var fo=clamp((1-p)*6,0,1);

  if(id==='void'){
    drawSpace(easeOut(p)*0.55);
    // Single faint shockwave
    var sw=W*0.75*p;
    ctx.save();ctx.globalAlpha=easeOut(p*2)*0.04*(1-p*0.85);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(W*0.5,H*0.5,sw,0,PI2);ctx.stroke();ctx.restore();
    drawVignette(0.9);
  }
  else if(id==='pulse'){
    drawSpace(0.55);drawGrid(easeOut(p)*0.025);
    var or=W*0.105*(1+Math.sin(GT*1.35)*0.12);
    var oa=easeOut(p*1.8)*Math.min(fo*1.5,1);
    for(var ri=0;ri<5;ri++){
      var rp=((GT*0.35+ri*0.2)%1);
      ctx.save();ctx.globalAlpha=Math.max(0,(1-rp)*0.09);
      ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.1;
      ctx.beginPath();ctx.arc(W*0.5,H*0.5,or*(1+rp*4.5),0,PI2);ctx.stroke();ctx.restore();
    }
    drawOrb(W*0.5,H*0.5,or,'255,255,255',oa);
    drawVignette(0.76);
  }
  else if(id==='gaps'){
    drawSpace(0.52);drawGrid(0.028);
    for(var wi=0;wi<wallSet.length;wi++){
      var w=wallSet[wi];
      w.x-=w.spd;w.alpha=Math.min(w.alpha+0.022,1);
      if(w.x<-120){w.x=W+70+Math.random()*W*0.3;w.gapCY=H*(0.27+Math.random()*0.46);w.gapH=H*(0.14+Math.random()*0.1);}
      var th=w.gapCY-w.gapH*0.5,by=w.gapCY+w.gapH*0.5;
      drawWall(w.x,th,by,w.alpha*fi*0.88);
      if(Math.random()<0.07){particles.push(new Pt(w.x+rnd(-w.gapH*0.3,w.gapH*0.3),rnd(th+8,by-8),rnd(-0.4,0.4),rnd(-0.3,0.3),rnd(0.7,1.8),rnd(1.5,3),'180,210,255',false));}
    }
    var tx=W*(0.12+p*0.58),ty=H*0.5+Math.sin(GT*0.5)*H*0.04,tr=W*0.07;
    for(var ti=0;ti<6;ti++){ctx.save();ctx.globalAlpha=fi*(0.038-ti*0.005);ctx.beginPath();ctx.arc(tx-tr*(ti+1)*0.72,ty,tr*(0.95-ti*0.1),0,PI2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();ctx.restore();}
    drawOrb(tx,ty,tr,'255,255,255',fi*0.88);
    drawVignette(0.78);
  }
  else if(id==='confront'){
    drawSpace(0.52);drawGrid(0.022);
    var cth=H*0.5-H*0.09,cby=H*0.5+H*0.09;
    drawWall(confrontWallX,cth,cby,Math.min(p*3,1)*0.92);
    var ap2=0.42;var cx,cy;
    if(p<ap2){var ap=easeOut(p/ap2);cx=lerp(W*0.1,confrontWallX-W*0.2,ap);cy=H*0.5;}
    else{var fa=clamp((p-ap2)*0.55,0,4);cx=confrontWallX-W*0.2+Math.sin(GT*6.5)*fa+Math.sin(GT*11)*fa*0.45;cy=H*0.5+Math.sin(GT*7.2)*fa*0.6;}
    drawOrb(cx,cy,W*0.082,'255,255,255',Math.min(p*4,1));
    drawVignette(0.80);
  }
  else if(id==='breath'){
    drawSpace(0.56);drawGrid(0.022);
    var br=W*0.105*(1+Math.sin(GT*0.92)*0.13);
    for(var bi=0;bi<5;bi++){
      var bp=((GT*0.25+bi*0.2)%1);
      ctx.save();ctx.globalAlpha=Math.max(0,(1-bp)*0.085);
      ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(W*0.5,H*0.5,br*(1.2+bp*5.5),0,PI2);ctx.stroke();ctx.restore();
    }
    drawOrb(W*0.5,H*0.5,br,'255,255,255',Math.min(fi*1.5,1));
    drawVignette(0.74);
  }
  else if(id==='struggle'){
    drawSpace(0.5);drawGrid(0.028);
    var swx=W*0.64,sgy=H*0.5,sgh=H*0.17,sth=sgy-sgh*0.5,sby=sgy+sgh*0.5;
    // Wall — always visible
    drawWall(swx,sth,sby,0.92);
    var p0=0.18,p1=0.35,p2=0.55,p3=0.67,p4=0.76;
    var sox,soy,sor=W*0.082,ssx=1,ssy=1,split=false,sprd=0;
    if(p<=p0){var ap=easeOut(p/p0);sox=lerp(W*0.1,swx-W*0.22,ap);soy=sgy;}
    else if(p<=p1){sox=swx-W*0.22;soy=sgy;}
    else if(p<=p2){
      var tp=(p-p1)/(p2-p1);var ta=clamp(tp*13,0,15);
      sox=swx-W*0.22+Math.sin(GT*15+tp*6)*ta+Math.sin(GT*22)*ta*0.38;
      soy=sgy+Math.sin(GT*13)*ta*0.8+Math.sin(GT*20+1)*ta*0.28;
      // Wall shudder
      drawWall(swx+Math.sin(GT*11)*tp*3.5,sth,sby,0.92);
      if(Math.random()<0.28*tp)burst(sox,soy,2,1.4,'255,255,255',false);
    }
    else if(p<=p3){
      var sp=(easeIn((p-p2)/(p3-p2)));
      sox=swx-W*0.22+Math.sin(GT*8)*2.5;soy=sgy;
      ssx=1-sp*0.4;ssy=1+sp*0.24;
      // Light seam
      ctx.save();ctx.globalAlpha=sp*0.22;ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillRect(sox-3,soy-sor*1.9,6,sor*3.8);ctx.restore();
      if(Math.random()<0.3)burst(sox,soy,1,0.9,'255,255,255',false);
    }
    else if(p<=p4){
      var tp2=(p-p3)/(p4-p3);var fl=1-tp2;
      ctx.save();ctx.globalAlpha=fl*0.42;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();
      if(tp2<0.35&&Math.random()<0.85)burst(swx-W*0.22,sgy,9,rnd(2.5,6),'255,255,255',true);
      split=true;sprd=tp2*sgh*0.55;sox=swx-W*0.22;soy=sgy;
    }
    else{
      split=true;
      var np=easeOut((p-p4)/(1-p4));
      sprd=sgh*0.55;sox=lerp(swx-W*0.22,swx+W*0.22,np);soy=sgy;
      if(Math.random()<0.25){burst(sox,soy-sprd,2,0.9,'255,255,255',false);burst(sox,soy+sprd,2,0.9,'255,255,255',false);}
    }
    if(!split){
      ctx.save();ctx.translate(sox,soy);ctx.scale(ssx,ssy);ctx.translate(-sox,-soy);
      drawOrb(sox,soy,sor,'255,255,255',1);ctx.restore();
    } else {
      drawOrb(sox,soy-sprd,sor*0.9,'255,255,255',1);
      drawOrb(sox,soy+sprd,sor*0.9,'255,255,255',1);
      if(sprd>8){
        ctx.save();ctx.globalAlpha=0.16;ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
        ctx.setLineDash([3,6]);ctx.beginPath();ctx.moveTo(sox,soy-sprd+sor);ctx.lineTo(sox,soy+sprd-sor);ctx.stroke();
        ctx.setLineDash([]);ctx.restore();
      }
    }
    drawVignette(0.78);
  }
  else if(id==='merge'){
    drawSpace(0.55);drawGrid(0.022);
    var mx=W*0.4+p*W*0.12,mr=W*0.088;
    var msp=(1-easeIO(Math.min(p*2.4,1)))*H*0.11;
    if(msp>4){
      drawOrb(mx,H*0.5-msp,mr*0.9,'255,255,255',1);
      drawOrb(mx,H*0.5+msp,mr*0.9,'255,255,255',1);
      ctx.save();ctx.globalAlpha=0.14;ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
      ctx.setLineDash([3,6]);ctx.beginPath();ctx.moveTo(mx,H*0.5-msp+mr);ctx.lineTo(mx,H*0.5+msp-mr);ctx.stroke();
      ctx.setLineDash([]);ctx.restore();
    } else {
      var mfl=Math.max(0,1-(p-0.45)*8);
      if(mfl>0){ctx.save();ctx.globalAlpha=mfl*0.38;ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.restore();
        if(mfl>0.4&&Math.random()<0.5)burst(mx,H*0.5,6,rnd(1.5,4),'255,255,255',true);}
      drawOrb(mx,H*0.5,mr*(1+mfl*0.28),'255,255,255',1);
    }
    drawVignette(0.72);
  }
  else if(id==='states'){
    var third=1/3,si=Math.min(Math.floor(p/third),2),sp=(p%third)/third;
    var sfi=Math.min(sp*4,1),sfo=Math.min((1-sp)*4,1),senv=Math.min(sfi,sfo);
    var stCols=['255,255,255','120,200,255','180,80,255'];
    var stBg=['255,255,255','80,160,255','120,50,200'];
    var stNames=['DARK SPACE','PRISMATIC','ORIGIN'];
    // Tint atmosphere
    ctx.save();ctx.globalAlpha=senv*0.07;
    var atm=ctx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,W*0.6);
    atm.addColorStop(0,'rgba('+stBg[si]+',0.35)');atm.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=atm;ctx.fillRect(0,0,W,H);ctx.restore();
    drawSpace(senv*0.6);
    if(si===0)drawGrid(senv*0.038);
    if(si===1)drawHueBands(senv*0.7);
    if(si===2)drawPerspGrid(senv*0.72,'rgba(180,80,255,1)');
    drawOrb(W*0.5,H*0.44,W*0.105,stCols[si],senv);
    ctx.save();ctx.globalAlpha=senv*0.48;ctx.fillStyle='rgba('+stCols[si]+',1)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='600 '+Math.round(W*0.025)+'px Georgia,serif';
    ctx.fillText(stNames[si],W*0.5,H*0.7);ctx.restore();
    drawVignette(0.76);
  }
  else if(id==='founders'){
    drawSpace(0.65);drawPerspGrid(fi*0.72,'rgba(180,80,255,1)');drawGrid(fi*0.01,'rgba(180,80,255,0.5)');
    ctx.save();ctx.globalAlpha=fi*0.09;
    var pa=ctx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,W*0.65);
    pa.addColorStop(0,'rgba(130,45,255,0.55)');pa.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pa;ctx.fillRect(0,0,W,H);ctx.restore();
    var fr=W*0.105*(1+Math.sin(GT*1.6)*0.09);
    drawOrb(W*0.5,H*0.44,fr,'180,80,255',fi,1.15);
    ctx.save();ctx.globalAlpha=fi*0.42;ctx.translate(W*0.5,H*0.44);ctx.rotate(GT*0.38);
    ctx.shadowColor='rgba(180,80,255,0.8)';ctx.shadowBlur=12;
    ctx.strokeStyle='rgba(180,80,255,0.52)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(0,0,fr*2,fr*0.5,0,0,PI2);ctx.stroke();ctx.restore();
    if(Math.random()<0.38){var fa2=rnd(0,PI2);burst(W*0.5+Math.cos(fa2)*fr*2,H*0.44+Math.sin(fa2)*fr*0.5,1,0.7,'180,80,255',true);}
    drawVignette(0.78);
  }
  else if(id==='logo'){
    drawSpace(0.5);drawPerspGrid(0.038,'rgba(180,80,255,0.55)');drawGrid(0.013);
    var ac=['255,255,255','120,200,255','180,80,255'];
    for(var ai=0;ai<3;ai++){
      drawOrb(W*(0.22+ai*0.28)+Math.sin(GT*0.38+ai*1.1)*W*0.03,H*0.76+Math.sin(GT*0.28+ai*0.9)*H*0.03,W*0.026,ac[ai],0.14,0.8);
    }
    drawVignette(0.7);
  }
  // Particles
  ctx.save();ctx.globalAlpha=1;
  for(var pi=particles.length-1;pi>=0;pi--){particles[pi].tick();particles[pi].draw();if(particles[pi].life<=0)particles.splice(pi,1);}
  ctx.restore();
}

// ── LOGO ───────────────────────────────────────────────────────
var logoWrap=document.getElementById('logoWrap'),playBtn=document.getElementById('playBtn');
function animFade(el,from,to,dur,ease,cb){
  var s=null;
  function step(ts){if(!s)s=ts;var p=clamp((ts-s)/dur,0,1);el.style.opacity=lerp(from,to,(ease||easeOut)(p));if(p<1)requestAnimationFrame(step);else if(cb)cb();}
  requestAnimationFrame(step);
}
function showLogo(){
  animFade(logoWrap,0,1,1400,easeOut,function(){
    setTimeout(function(){playBtn.style.pointerEvents='all';animFade(playBtn,0,1,700,easeOut,null);},900);
  });
}

// ── LOOP ───────────────────────────────────────────────────────
var running=false;
function loop(ts){
  if(!startMs)startMs=ts;
  GT=(ts-startMs)/1000;
  var elapsed=ts-sceneStart;
  sceneT=Math.min(elapsed/SCENES[curScene].dur,1);
  ctx.fillStyle='#06080d';ctx.fillRect(0,0,W,H);
  drawScene(SCENES[curScene].id,sceneT);
  if(running)requestAnimationFrame(loop);
}

// ── INIT ───────────────────────────────────────────────────────
var music=document.getElementById('bgMusic');
var tapScreen=document.getElementById('tapScreen');
var started=false;
function begin(){
  if(started)return;started=true;
  animFade(tapScreen,1,0,900,easeIO,function(){tapScreen.style.display='none';});
  music.volume=0;music.play().catch(function(){});
  var vol=0,mf=setInterval(function(){vol=Math.min(vol+0.018,0.7);music.volume=vol;if(vol>=0.7)clearInterval(mf);},80);
  sceneStart=performance.now();running=true;requestAnimationFrame(loop);
  setTimeout(advance,SCENES[0].dur);
}
tapScreen.addEventListener('click',begin);
tapScreen.addEventListener('touchstart',function(e){e.preventDefault();begin();},{passive:false});

document.getElementById('skipBtn').addEventListener('click',function(){
  if(!started){begin();return;}
  clearTimeout(sceneTimer);clearCaptions();particles=[];
  curScene=SCENES.length-1;sceneStart=performance.now();showLogo();
});

playBtn.addEventListener('click',function(){
  var v=music.volume,out=setInterval(function(){v=Math.max(v-0.05,0);music.volume=v;if(v<=0){clearInterval(out);music.pause();}},60);
  document.body.style.transition='opacity 0.7s';document.body.style.opacity=0;
  setTimeout(function(){window.location.href='https://split.games';},700);
});
</script>
