function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}

function tone(freq,endFreq,type,vol,dur,delay=0){
  if(!AC)return;try{
    const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='lowpass';f.frequency.value=5000;o.connect(f);f.connect(g);g.connect(AC.destination);
    const t=AC.currentTime+delay;o.type=type;o.frequency.setValueAtTime(freq,t);
    if(endFreq)o.frequency.exponentialRampToValueAtTime(Math.max(endFreq,10),t+dur);
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}

let musicAudio=null,musicFadeTimer=null,musicCurrentAct=0;

function playMusic(actNum){
  const url=MUSIC[actNum];
  if(!url||actNum===musicCurrentAct)return;
  musicCurrentAct=actNum;
  const oldAudio=musicAudio;
  const newAudio=new Audio(url);
  newAudio.loop=true;newAudio.volume=0;
  newAudio.play().catch(()=>{}); // mobile: may need user gesture
  musicAudio=newAudio;
  // Crossfade over 1.5 seconds
  const dur=1500,start=Date.now(),fromVol=oldAudio?oldAudio.volume:0;
  if(musicFadeTimer)clearInterval(musicFadeTimer);
  musicFadeTimer=setInterval(()=>{
    const t=Math.min((Date.now()-start)/dur,1);
    newAudio.volume=t*0.45;
    if(oldAudio)oldAudio.volume=fromVol*(1-t);
    if(t>=1){
      clearInterval(musicFadeTimer);musicFadeTimer=null;
      if(oldAudio){oldAudio.pause();oldAudio.src='';}
    }
  },16);
}

function fadeOutMusic(durMs=2000){
  if(!musicAudio)return;
  const audio=musicAudio,start=Date.now(),fromVol=audio.volume;
  musicCurrentAct=0;
  const iv=setInterval(()=>{
    const t=Math.min((Date.now()-start)/durMs,1);
    audio.volume=fromVol*(1-t);
    if(t>=1){clearInterval(iv);audio.pause();if(musicAudio===audio)musicAudio=null;}
  },16);
}

function stopMusic(){
  if(musicAudio){musicAudio.pause();musicAudio.src='';musicAudio=null;}
  if(musicFadeTimer){clearInterval(musicFadeTimer);musicFadeTimer=null;}
  musicCurrentAct=0;
}

const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rnd=(a,b)=>Math.random()*(b-a)+a;
const tau=Math.PI*2;
const E=()=>EPOCHS[Math.min(gs.epoch,5)];
const GLITCH='!@#$%^&*><[]{}|\\/?~`';
function glitchStr(s,n){return s.split('').map(c=>Math.random()<n?GLITCH[Math.floor(Math.random()*GLITCH.length)]:c).join('');}
function pColor(){
  if(gs.act===2)return'#111130';

  if(o.color==='CYCLE')return`hsl(${gs.frame*2%360},100%,65%)`;
  return o.color;
}
function poly(sides,r,x=0,y=0,rot=0){
  ctx.beginPath();
  for(let i=0;i<=sides;i++){const a=tau/sides*i+rot;i?ctx.lineTo(Math.cos(a)*r+x,Math.sin(a)*r+y):ctx.moveTo(Math.cos(a)*r+x,Math.sin(a)*r+y);}
  ctx.closePath();ctx.stroke();
}
function fmtTime(f){const s=Math.floor(f/60),m=Math.floor(s/60);return`${m}:${String(s%60).padStart(2,'0')}`;}

let stars=[];
function initStars(){
  stars=[];
  [[90,.7,.012],[55,1.3,.028],[22,2.1,.055]].forEach(([n,sz,par])=>{
    for(let i=0;i<n;i++)stars.push({x:rnd(0,C.width),y:rnd(0,C.height),sz,par,tw:rnd(0,tau),tws:rnd(.02,.05)});
  });
}
initStars();
function drawStars(inv=false){
  const dx=P.x-C.width/2,dy=P.y-C.height/2;
  stars.forEach(s=>{
    s.tw+=s.tws;
    const sx=((s.x-dx*s.par)%C.width+C.width)%C.width;
    const sy=((s.y-dy*s.par)%C.height+C.height)%C.height;
    ctx.save();ctx.globalAlpha=(.15+Math.sin(s.tw)*.13)*(inv?.55:1);ctx.fillStyle=inv?'rgba(0,0,60,.9)':'#fff';
    ctx.beginPath();ctx.arc(sx,sy,s.sz,0,tau);ctx.fill();ctx.restore();
  });
}

let bgC={r:2,g:4,b:10};
function drawBG(){
  let tr,tg,tb;
  if(gs.act===2){tr=238;tg=238;tb=255;}
  else if(gs.act===3){tr=4;tg=2;tb=8;}
  else if(gs.act===4){tr=2;tg=8;tb=14;}
  else{const e=E();[tr,tg,tb]=e.bgRGB;}
  bgC.r=lerp(bgC.r,tr,.015);bgC.g=lerp(bgC.g,tg,.015);bgC.b=lerp(bgC.b,tb,.015);
  ctx.fillStyle=`rgb(${bgC.r|0},${bgC.g|0},${bgC.b|0})`;ctx.fillRect(0,0,C.width,C.height);
  if(gs.act!==3){
    ctx.save();
    ctx.strokeStyle=gs.act===2?`rgba(0,0,80,${.015+gs.gridPulse*.05})`:`rgba(255,255,255,${.02+gs.gridPulse*.09})`;
    ctx.lineWidth=1;const sz=55,ox=(gs.frame*.22)%sz,oy=(gs.frame*.14)%sz;
    for(let x=ox-sz;x<C.width+sz;x+=sz){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,C.height);ctx.stroke();}
    for(let y=oy-sz;y<C.height+sz;y+=sz){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(C.width,y);ctx.stroke();}
    ctx.restore();gs.gridPulse*=.96;
  }
  if(gs.bossWave){ctx.save();ctx.fillStyle=`rgba(220,0,0,${.07+Math.sin(gs.frame*.04)*.04})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
}

class Particle{
  constructor(x,y,vx,vy,color,size,life,glow=8){Object.assign(this,{x,y,vx,vy,color,size,life,maxLife:life,glow});}
  update(){this.x+=this.vx;this.y+=this.vy;this.vx*=.93;this.vy*=.93;this.life--;}
  draw(){
    const a=this.life/this.maxLife;if(a<=0||this.size<=0)return;
    ctx.save();ctx.globalAlpha=a*.9;ctx.shadowBlur=this.glow;ctx.shadowColor=this.color;
    ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,Math.max(0.1,this.size*a),0,tau);ctx.fill();ctx.restore();
  }
}
function burst(x,y,color,n=12,sMin=1,sMax=5,szMin=1.5,szMax=4,lMin=20,lMax=45){
  for(let i=0;i<n;i++){const a=rnd(0,tau),s=rnd(sMin,sMax);particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,color,rnd(szMin,szMax),rnd(lMin,lMax)));}
}
class FloatText{
  constructor(x,y,text,color,size=22){Object.assign(this,{x,y,text,color,size,vy:-1.3,life:65,maxLife:65});}
  update(){this.y+=this.vy;this.vy*=.97;this.life--;}
  draw(){
    const a=this.life/this.maxLife;ctx.save();ctx.globalAlpha=a;ctx.font=`700 ${this.size}px 'Orbitron'`;
    ctx.fillStyle=this.color;ctx.shadowBlur=14;ctx.shadowColor=this.color;ctx.textAlign='center';ctx.fillText(this.text,this.x,this.y);ctx.restore();
  }
}
// ── ACT 1 ENTITIES ────────────────────────────────────────────────────────────
class Shard{
  constructor(){
    const a=rnd(0,tau),d=Math.min(C.width,C.height)*rnd(.15,.42);
    this.x=C.width/2+Math.cos(a)*d;this.y=C.height/2+Math.sin(a)*d;
    this.angle=a;this.dist=d;this.speed=rnd(.003,.008)*(Math.random()>.5?1:-1);
    this.r=rnd(4.5,8);this.pulse=rnd(0,tau);this.collected=false;this.dead=false;
  }
  update(){
    this.pulse+=.065;
    if(!this.collected){
      if(gs.magnet){
        const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
        const spd=Math.min(6,100/d),sp=Math.max(0,(d-30)/180)*3;
        this.x+=dx/d*spd+(-dy/d)*sp;this.y+=dy/d*spd+(dx/d)*sp;
      }else{this.angle+=this.speed;this.x=C.width/2+Math.cos(this.angle)*this.dist;this.y=C.height/2+Math.sin(this.angle)*this.dist;}
    }else{this.x=lerp(this.x,P.x,.25);this.y=lerp(this.y,P.y,.25);if(dist(this,P)<8)this.dead=true;}
  }
  draw(){
    const c=E().shard,pr=this.r+Math.sin(this.pulse)*2;
    ctx.save();ctx.shadowBlur=22;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(this.x,this.y,pr*.35,0,tau);ctx.fill();ctx.restore();
  }
}
const OTYPES=['ring','triangle','hex','dart','cross','cluster'];
class Obstacle{
  constructor(){
    const av=Math.min(gs.epoch+2,OTYPES.length);
    this.type=OTYPES[Math.floor(Math.random()*av)];
    const side=Math.floor(Math.random()*4),m=80;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    // 70% of obstacles aim near player, 30% aim toward center for variety
    const usePlayer=Math.random()<0.7;
    const tx=(usePlayer?P.x:C.width/2)+rnd(-120,120);
    const ty=(usePlayer?P.y:C.height/2)+rnd(-120,120);
    const a=Math.atan2(ty-this.y,tx-this.x),sp=rnd(1.8,3.2)*E().speed;
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.r=rnd(18,32);this.rot=0;this.rotS=rnd(-.04,.04);
    this.alive=true;this.age=0;this.homing=this.type==='dart'&&gs.epoch>=2;this.color=E().obstacle;
  }
  update(){
    this.age++;
    if(this.homing&&this.age>40){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1,h=.025*E().speed;
      this.vx=lerp(this.vx,dx/d*3.5*E().speed,h);this.vy=lerp(this.vy,dy/d*3.5*E().speed,h);
    }
    // All obstacles drift toward player position (not just homing darts)
    // Increases with epoch so early game is forgiving, late game punishes standing still
    if(!this.homing&&this.age>60&&gs.epoch>=1){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
      const drift=0.004*gs.epoch; // 0 in void, ramps up per epoch
      this.vx+=dx/d*drift;this.vy+=dy/d*drift;
      // Cap speed so they don't rocket
      const spd=Math.hypot(this.vx,this.vy),maxSpd=E().speed*3.5;
      if(spd>maxSpd){this.vx=this.vx/spd*maxSpd;this.vy=this.vy/spd*maxSpd;}
    }
    this.x+=this.vx;this.y+=this.vy;this.rot+=this.rotS;
    if(this.x<-300||this.x>C.width+300||this.y<-300||this.y>C.height+300){
      if(this.alive)burst(Math.max(0,Math.min(C.width,this.x)),Math.max(0,Math.min(C.height,this.y)),this.color,4,.5,2.5,1,2.5,12,25);
      this.alive=false;
    }
  }
  draw(){
    const fi=Math.min(this.age/25,1),r=this.r,pd=dist(P,this),prx=Math.max(0,1-pd/220);
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.globalAlpha=fi;ctx.strokeStyle=this.color;ctx.lineWidth=2.5+prx*2.5;ctx.shadowBlur=22+prx*30;ctx.shadowColor=this.color;
    if(this.type==='ring'){ctx.beginPath();ctx.arc(0,0,r,0,tau);ctx.stroke();ctx.beginPath();ctx.arc(0,0,r*.55,0,tau);ctx.stroke();}
    else if(this.type==='triangle'){poly(3,r);}else if(this.type==='hex'){poly(6,r);}
    else if(this.type==='dart'){
      ctx.beginPath();ctx.moveTo(0,-r*1.6);ctx.lineTo(r*.55,0);ctx.lineTo(0,r*.8);ctx.lineTo(-r*.55,0);ctx.closePath();ctx.stroke();
      if(this.homing&&pd<240){
        ctx.save();ctx.strokeStyle=`rgba(255,50,50,${(240-pd)/240*.55})`;ctx.lineWidth=1;ctx.setLineDash([3,3]);
        const dl=Math.hypot(P.x-this.x,P.y-this.y)||1;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo((P.x-this.x)/dl*Math.min(pd,70),(P.y-this.y)/dl*Math.min(pd,70));ctx.stroke();ctx.setLineDash([]);ctx.restore();
      }
    }
    else if(this.type==='cross'){const l=r*1.2,w=r*.3;ctx.beginPath();ctx.rect(-w,-l,w*2,l*2);ctx.stroke();ctx.beginPath();ctx.rect(-l,-w,l*2,w*2);ctx.stroke();}
    else{for(let i=0;i<3;i++){const a2=tau/3*i+this.rot*2;ctx.beginPath();ctx.arc(Math.cos(a2)*r*.7,Math.sin(a2)*r*.7,r*.33,0,tau);ctx.stroke();}}
    ctx.restore();
  }
  get hitR(){return this.r*.72;}
}
const PU_CFG={nova:{color:'#ff6600',label:'NOVA'},shield:{color:'#00ffff',label:'SHIELD'},magnet:{color:'#ffaa00',label:'MAGNET'},life:{color:'#ff88ff',label:'+LIFE'}};
class PowerUp{
  constructor(){
    this.type=['nova','shield','magnet','magnet','magnet','life'][Math.floor(Math.random()*6)];
    const a=rnd(0,tau),d=rnd(80,Math.min(C.width,C.height)*.38);
    this.x=C.width/2+Math.cos(a)*d;this.y=C.height/2+Math.sin(a)*d;
    this.angle=a;this.dist=d;this.r=11;this.pulse=rnd(0,tau);this.dead=false;this.life=700;
    this.color=PU_CFG[this.type].color;this.label=PU_CFG[this.type].label;
  }
  update(){
    this.pulse+=.055;this.life--;if(this.life<=0)this.dead=true;
    this.angle+=.003;this.x=C.width/2+Math.cos(this.angle)*this.dist;this.y=C.height/2+Math.sin(this.angle)*this.dist;
  }
  draw(){
    const al=Math.min(this.life/60,1),pr=this.r+Math.sin(this.pulse)*3;

    else if(this.type==='shield'){poly(6,pr,this.x,this.y,this.pulse*.18);}
    else if(this.type==='life'){ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.stroke();ctx.beginPath();ctx.arc(this.x,this.y,pr*.5,0,tau);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(this.x,this.y-pr*1.5);ctx.lineTo(this.x+pr,this.y);ctx.lineTo(this.x,this.y+pr*1.5);ctx.lineTo(this.x-pr,this.y);ctx.closePath();ctx.stroke();}

// Laser types: 'scan' slides across screen, 'sweep' rotates from edge
class Laser{
  constructor(intensity){
    this.type=Math.random()<.55?'scan':'sweep';
    this.alive=true;this.age=0;
    this.telegraphFrames=90; // 1.5s warning
    this.activeFrames=rnd(120,220)|0; // how long beam stays live
    this.totalLife=this.telegraphFrames+this.activeFrames;
    this.color='#ffff00';
    this.hitColor='#ff4400';
    if(this.type==='scan'){
      // horizontal or vertical scan
      this.axis=Math.random()<.5?'h':'v';
      this.dir=Math.random()<.5?1:-1;
      this.thickness=10+intensity*4;
      if(this.axis==='h'){
        this.pos=this.dir>0?-this.thickness:C.height+this.thickness;
        this.speed=(1.5+intensity*0.8)*this.dir;
      }else{
        this.pos=this.dir>0?-this.thickness:C.width+this.thickness;
        this.speed=(1.5+intensity*0.8)*this.dir;
      }
    }else{
      // sweep from corner
      const corner=Math.floor(Math.random()*4);
      this.ox=[0,C.width,C.width,0][corner];
      this.oy=[0,0,C.height,C.height][corner];
      this.angle=rnd(0,tau);
      this.sweepDir=Math.random()<.5?1:-1;
      this.sweepSpeed=(0.008+intensity*0.004)*this.sweepDir;
      this.length=Math.max(C.width,C.height)*1.5;
      this.thickness=8+intensity*3;
    }
  }
  get isActive(){return this.age>this.telegraphFrames&&this.age<this.totalLife;}
  get phase(){return Math.min(this.age/this.telegraphFrames,1);}
  update(){
    this.age++;if(this.age>=this.totalLife)this.alive=false;
    if(this.isActive){
      if(this.type==='scan') this.pos+=this.speed;
      else this.angle+=this.sweepSpeed;
    }
  }
  draw(){
    const tel=this.age<this.telegraphFrames;
    const flash=this.isActive&&Math.floor(this.age/4)%2===0;
    const alpha=tel?(this.phase*.55):(this.isActive?.9:0);
    if(alpha<=0)return;
    ctx.save();
    if(this.type==='scan'){
      const col=tel?`rgba(255,255,80,${alpha})`:(flash?`rgba(255,80,0,${alpha})`:`rgba(255,200,0,${alpha})`);
      ctx.strokeStyle=col;ctx.lineWidth=this.thickness+(tel?0:4);
      ctx.shadowBlur=tel?8:28;ctx.shadowColor=col;
      ctx.beginPath();
      if(this.axis==='h'){ctx.moveTo(0,this.pos);ctx.lineTo(C.width,this.pos);}
      else{ctx.moveTo(this.pos,0);ctx.lineTo(this.pos,C.height);}
      ctx.stroke();
      // Telegraph: dashed warning line
      if(tel){ctx.setLineDash([8,6]);ctx.lineWidth=1.5;ctx.globalAlpha=alpha*.5;ctx.stroke();ctx.setLineDash([]);}
    }else{
      const col=tel?`rgba(255,255,80,${alpha})`:(flash?`rgba(255,80,0,${alpha})`:`rgba(255,200,0,${alpha})`);
      ctx.strokeStyle=col;ctx.lineWidth=this.thickness+(tel?0:4);ctx.shadowBlur=tel?8:28;ctx.shadowColor=col;
      const ex=this.ox+Math.cos(this.angle)*this.length,ey=this.oy+Math.sin(this.angle)*this.length;
      ctx.beginPath();ctx.moveTo(this.ox,this.oy);ctx.lineTo(ex,ey);ctx.stroke();
      if(tel){ctx.setLineDash([10,8]);ctx.lineWidth=1.5;ctx.globalAlpha=alpha*.5;ctx.beginPath();ctx.moveTo(this.ox,this.oy);ctx.lineTo(ex,ey);ctx.stroke();ctx.setLineDash([]);}
    }
    ctx.restore();
  }
  hitsPlayer(){
    if(!this.isActive)return false;
    const hw=this.thickness/2+P.r*.7;
    if(this.type==='scan'){
      if(this.axis==='h')return Math.abs(P.y-this.pos)<hw;
      return Math.abs(P.x-this.pos)<hw;
    }else{
      // Point-to-line distance from player to sweep beam
      const ex=this.ox+Math.cos(this.angle)*this.length,ey=this.oy+Math.sin(this.angle)*this.length;
      const dx=ex-this.ox,dy=ey-this.oy,len=Math.hypot(dx,dy)||1;
      const t=Math.max(0,Math.min(1,((P.x-this.ox)*dx+(P.y-this.oy)*dy)/(len*len)));
      const closestX=this.ox+t*dx,closestY=this.oy+t*dy;
      return Math.hypot(P.x-closestX,P.y-closestY)<hw;
    }
  }
}

class MazeWall{
  constructor(y){
    this.y=y;this.thickness=9;this.dead=false;
    const prog=Math.min(gs.mazeScrolled/14000,1);
    const gapW=Math.max(C.width*.1,lerp(C.width*.2,C.width*.11,prog));
    const numGaps=Math.random()<.3?2:1;this.gaps=[];
    if(numGaps===1){this.gaps.push({x:rnd(20,C.width-gapW-20),w:gapW});}
    else{
      const g1w=gapW*.88,g2w=gapW*.88;
      this.gaps.push({x:rnd(15,C.width/2-g1w-15),w:g1w});
      this.gaps.push({x:rnd(C.width/2+15,C.width-g2w-15),w:g2w});
    }
    this.shardX=null;this.shardCollected=false;
    if(Math.random()<.55){const g=this.gaps[Math.floor(Math.random()*this.gaps.length)];this.shardX=g.x+g.w/2;}
  }
  update(){this.y-=gs.mazeSpeed;if(this.y<-this.thickness-5)this.dead=true;}
  draw(){
    const rampT=Math.min(gs.mazeScrolled/5000,1),heat=lerp(.3,1,rampT);
    ctx.save();
    // Glow pass
    ctx.strokeStyle=`rgba(255,${Math.floor(140*heat)},0,${.25*heat})`;ctx.lineWidth=this.thickness+8;ctx.filter='blur(4px)';
    let px=0;const sorted=[...this.gaps].sort((a,b)=>a.x-b.x);
    for(const g of sorted){if(g.x>px){ctx.beginPath();ctx.moveTo(px,this.y);ctx.lineTo(g.x,this.y);ctx.stroke();}px=g.x+g.w;}
    if(px<C.width){ctx.beginPath();ctx.moveTo(px,this.y);ctx.lineTo(C.width,this.y);ctx.stroke();}
    ctx.filter='none';
    // Solid wall
    ctx.strokeStyle=`rgb(${Math.floor(lerp(80,200,heat))},${Math.floor(lerp(30,60,heat))},0)`;
    ctx.lineWidth=this.thickness;ctx.shadowBlur=16;ctx.shadowColor=`rgba(255,${Math.floor(120*heat)},0,.8)`;
    px=0;for(const g of sorted){
      if(g.x>px){ctx.beginPath();ctx.moveTo(px,this.y);ctx.lineTo(g.x,this.y);ctx.stroke();}
      // Gap light rim
      ctx.save();ctx.strokeStyle=`rgba(255,${Math.floor(180*heat)},0,.18)`;ctx.lineWidth=2;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(g.x,this.y-this.thickness/2);ctx.lineTo(g.x,this.y+this.thickness/2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(g.x+g.w,this.y-this.thickness/2);ctx.lineTo(g.x+g.w,this.y+this.thickness/2);ctx.stroke();
      ctx.restore();
      // Shard in gap
      if(this.shardX&&!this.shardCollected){ctx.save();ctx.shadowBlur=18;ctx.shadowColor='#ff9944';ctx.fillStyle='#ffbb66';ctx.beginPath();ctx.arc(this.shardX,this.y,Math.max(0.1,5+Math.sin(gs.frame*.1)*1.5),0,tau);ctx.fill();ctx.restore();}
      px=g.x+g.w;
    }
    if(px<C.width){ctx.beginPath();ctx.moveTo(px,this.y);ctx.lineTo(C.width,this.y);ctx.stroke();}
    // Fracture sparks at wall ends
    if(Math.random()<.12*heat){const wx=sorted.length?sorted[0].x:0;const sy2=this.y+rnd(-4,4);ctx.save();ctx.fillStyle=`rgba(255,${Math.floor(200*heat)},50,.8)`;ctx.beginPath();ctx.arc(wx+rnd(-2,2),sy2,Math.max(0.1,rnd(1,2.5)),0,tau);ctx.fill();ctx.restore();}
    ctx.restore();
  }
  collidesWithPlayer(){
    if(Math.abs(P.y-this.y)>P.r*.62+this.thickness/2)return false;
    for(const g of this.gaps){if(P.x>g.x+P.r*.45&&P.x<g.x+g.w-P.r*.45)return false;}
    return true;
  }
  shardInRange(){return this.shardX&&!this.shardCollected&&Math.hypot(P.x-this.shardX,P.y-this.y)<P.r+8;}
}

  }
  update(){
    this.age++;

      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;

  }

}

class GhostEcho{

  }

}

class Enemy{

function genWander(){
  const pts=[];
  // Pick random corner/edge start so ghosts traverse the whole canvas
  const startX=rnd(C.width*.05,C.width*.95),startY=rnd(C.height*.05,C.height*.95);
  let x=startX,y=startY,vx=rnd(-2.5,2.5)||1.5,vy=rnd(-2.5,2.5)||1.5;
  // Random waypoints across screen quadrants for wide traversal
  const waypoints=[[rnd(C.width*.1,C.width*.45),rnd(C.height*.1,C.height*.45)],[rnd(C.width*.55,C.width*.9),rnd(C.height*.1,C.height*.45)],[rnd(C.width*.55,C.width*.9),rnd(C.height*.55,C.height*.9)],[rnd(C.width*.1,C.width*.45),rnd(C.height*.55,C.height*.9)],[startX,startY]];
  let wpIdx=0,wpTimer=0;
  for(let i=0;i<900;i++){
    const wp=waypoints[wpIdx];
    vx+=(wp[0]-x)*.008+rnd(-.4,.4);vy+=(wp[1]-y)*.008+rnd(-.4,.4);
    vx=Math.max(-3.5,Math.min(3.5,vx));vy=Math.max(-3.5,Math.min(3.5,vy));
    x+=vx;y+=vy;
    x=Math.max(15,Math.min(C.width-15,x));y=Math.max(15,Math.min(C.height-15,y));
    wpTimer++;if(wpTimer>180){wpTimer=0;wpIdx=(wpIdx+1)%waypoints.length;}
    if(i%3===0)pts.push({x:Math.round(x),y:Math.round(y),sw:C.width,sh:C.height});
  }
  return pts;
}

  }
  // Stats
  const rows=buildStats();
  rows.forEach(([k,v],i)=>{
    const a2=fade*Math.min((since-58-i*3)/18,1);ctx.save();ctx.globalAlpha=Math.max(0,a2)*.88;ctx.textAlign='center';ctx.font=`400 12px 'Share Tech Mono'`;ctx.fillStyle='#fff';ctx.fillText(`${k}   ${v}`,cx,cy+(gs.act===5?98:60)+i*20);ctx.restore();
  });
  // Run timeline
  const tlY=cy+(gs.act===5?98:60)+rows.length*20+16;
  drawTimeline(cx,tlY,fade,since);
  // Universal closing line
  const tlBot=tlY+gs.actLog.length*20+38;
  ctx.save();ctx.globalAlpha=fade*.25;ctx.textAlign='center';ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle=ds.color;ctx.fillText('the light remembers everything',cx,tlBot);ctx.restore();
  // Tip jar
  deathHits=[];
  if(gs.highScore>800&&since>130){
    const tjFade=Math.min((since-130)/30,1)*fade;
    const tbx=cx-72,tby=tlBot+14,tbw=144,tbh=28;
    ctx.save();ctx.globalAlpha=tjFade*.85;ctx.strokeStyle='#ffdd00';ctx.lineWidth=1.2;ctx.shadowBlur=10;ctx.shadowColor='#ffdd00';ctx.strokeRect(tbx,tby,tbw,tbh);ctx.font=`700 10px 'Orbitron'`;ctx.fillStyle='#ffdd00';ctx.textAlign='center';ctx.shadowBlur=6;ctx.fillText('SUPPORT  $3  ☕',cx,tby+tbh/2+4);ctx.restore();
    deathHits.push({x:tbx,y:tby,w:tbw,h:tbh,fn:()=>window.open(STRIPE,'_blank')});
  }
  const retY=tlBot+(gs.highScore>800?58:24);
  ctx.save();ctx.globalAlpha=fade*(.45+Math.sin(gs.frame*.055)*.38);ctx.textAlign='center';ctx.font=`400 11px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.28)';ctx.fillText('TAP TO RETURN',cx,retY);ctx.restore();
}
function buildStats(){
  const rows=[];
  const runScore=gs.act===1?gs.score:gs.act===5?gs.act5Score:0;
  rows.push(['SCORE',runScore.toLocaleString()]);
  if(gs.totalScore>runScore)rows.push(['TOTAL RUN',gs.totalScore.toLocaleString()]);
  if(gs.act===1){rows.push(['EPOCH REACHED',EPOCHS[gs.epochReached].name]);rows.push(['MAX COMBO',`${gs.maxCombo}×`]);rows.push(['SHARDS',String(gs.shardsCollected)]);}
  if(gs.act>=2)rows.push(['ACTS COMPLETED',String(gs.actLog.length)]);
  rows.push(['TIME ALIVE',fmtTime(gs.frame)]);
  if(gs.highScore>0)rows.push(['BEST RUN',gs.highScore.toLocaleString()]);
  return rows;
}
function drawTimeline(cx,y,fade,since){
  if(gs.actLog.length===0)return;
  const maxW=Math.min(C.width*.7,340),rH=18;
  const AC={1:'#00d4ff',2:'#ffff88',3:'#ff6600',4:'#44ffaa',5:'#cc88ff'};
  ctx.save();ctx.globalAlpha=fade*.38;ctx.font=`400 8px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.28)';ctx.textAlign='center';ctx.fillText('YOUR RUN',cx,y-4);ctx.restore();
  gs.actLog.forEach((entry,i)=>{
    const a2=fade*Math.min((since-80-i*8)/28,1);if(a2<=0)return;
    const ry=y+i*rH+8,c=AC[entry.act]||'#fff',bx=cx-maxW/2;
    const fp=entry.act===1?Math.min(entry.score/5500,1):Math.min(entry.frames/5400,1);
    ctx.save();ctx.globalAlpha=a2*.08;ctx.fillStyle=c;ctx.fillRect(bx,ry-11,maxW,rH-2);ctx.restore();
    ctx.save();ctx.globalAlpha=a2*.38;ctx.fillStyle=c;ctx.shadowBlur=3;ctx.shadowColor=c;ctx.fillRect(bx,ry-11,maxW*fp,rH-2);ctx.restore();
    ctx.save();ctx.globalAlpha=a2*.75;ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle=c;ctx.textAlign='left';ctx.fillText(`${ACTS[entry.act].num}  ${entry.label}`,bx+4,ry);ctx.textAlign='right';ctx.fillText(fmtTime(entry.frames),bx+maxW-4,ry);ctx.restore();
  });
  const deadY=y+gs.actLog.length*rH+8;ctx.save();ctx.globalAlpha=fade*.35;ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.28)';ctx.textAlign='center';ctx.fillText('— died here —',cx,deadY);ctx.restore();
}
// ── TITLE ─────────────────────────────────────────────────────────────────────
function drawTitle(){
  drawBG();drawStars();titleHits=[];
  const cx=C.width/2,cy=C.height*.37,c=EPOCHS[0].player,t=gs.frame;
  for(let i=0;i<14;i++){const a=tau/14*i+t*.0018,or=Math.min(C.width,C.height)*.38;ctx.save();ctx.globalAlpha=.18+Math.sin(t*.025+i)*.17;ctx.shadowBlur=16;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx+Math.cos(a)*or,cy+Math.sin(a)*or,3.5,0,tau);ctx.fill();ctx.restore();}
  if(t%2===0){const pa=rnd(0,tau),pr=rnd(60,Math.min(C.width,C.height)*.5);particles.push(new Particle(cx+Math.cos(pa)*pr,cy+Math.sin(pa)*pr,rnd(-.3,.3),rnd(-.3,.3),c,rnd(1,2.5),rnd(60,100),6));}
  if(particles.length>150)particles=particles.slice(-120);particles.forEach(p=>p.update());particles=particles.filter(p=>p.life>0);particles.forEach(p=>p.draw());
  ctx.save();ctx.textAlign='center';ctx.shadowBlur=55;ctx.shadowColor=c;ctx.font=`900 ${Math.min(C.width*.18,100)}px 'Orbitron'`;ctx.fillStyle='#fff';ctx.fillText('ETHER',cx,cy);ctx.restore();
  ctx.save();ctx.textAlign='center';ctx.font=`400 ${Math.min(C.width*.03,12)}px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.32)';ctx.fillText('FIVE ACTS  ·  ONE JOURNEY',cx,cy+26);ctx.restore();
  const lbY=cy+44;const lbEntries=lbData.slice(0,5);
  if(lbEntries.length>0){
    ctx.save();ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;ctx.strokeRect(cx-110,lbY-4,220,lbEntries.length*18+12);ctx.restore();
    lbEntries.forEach((e2,i)=>{ctx.save();ctx.textAlign='center';ctx.font=`400 10px 'Share Tech Mono'`;ctx.fillStyle=i===0?c:'rgba(255,255,255,.32)';ctx.fillText(`${i+1}  ${(e2.player_name||'UNKNOWN').slice(0,8).padEnd(8,' ')}  ${String(e2.score||0).padStart(7,'0')}`,cx,lbY+10+i*18);ctx.restore();});
  }
  const ctaY=lbY+(lbEntries.length>0?lbEntries.length*18+24:16);
  ctx.save();ctx.textAlign='center';ctx.globalAlpha=.58+Math.sin(t*.05)*.38;ctx.font=`400 14px 'Share Tech Mono'`;ctx.fillStyle=c;ctx.shadowBlur=12;ctx.shadowColor=c;ctx.fillText('TAP TO BEGIN',cx,ctaY);ctx.restore();
  if(gs.highScore>0){ctx.save();ctx.textAlign='center';ctx.font=`400 10px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillText(`BEST  ${gs.highScore.toLocaleString()}`,cx,ctaY+20);ctx.restore();}
  const sbx=cx-45,sby=C.height-52,sbw=90,sbh=28;
  ctx.save();ctx.strokeStyle=UNLOCKED?'#ffdd00':'rgba(255,255,255,.22)';ctx.lineWidth=1;if(UNLOCKED){ctx.shadowBlur=10;ctx.shadowColor='#ffdd00';}
  ctx.strokeRect(sbx,sby,sbw,sbh);ctx.font=`400 10px 'Share Tech Mono'`;ctx.fillStyle=UNLOCKED?'#ffdd00':'rgba(255,255,255,.42)';ctx.textAlign='center';ctx.fillText(UNLOCKED?'SKINS ★':'SKINS',cx,sby+sbh/2+4);ctx.restore();
  titleHits.push({x:sbx,y:sby,w:sbw,h:sbh,fn:()=>gs.state='skins'});
  if(playerName){ctx.save();ctx.textAlign='right';ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.16)';ctx.fillText('PILOT: '+playerName,C.width-18,C.height-18);ctx.restore();}
}
// ── SKINS ─────────────────────────────────────────────────────────────────────
function drawSkins(){
  drawBG();drawStars();skinsHits=[];
  const cx=C.width/2,c='#00d4ff',sc=Math.max(.78,Math.min(1,C.height/700));
  const cellW=Math.min(Math.floor((C.width-80)/3),Math.round(118*sc)),cellH=Math.round(68*sc),gap=9;
  const totalW=cellW*3+gap*2,startX=cx-totalW/2;
  const trailY=Math.round(100*sc),orbY=trailY+(cellH+gap)*2+Math.round(44*sc);
  ctx.save();ctx.textAlign='center';ctx.font=`700 ${Math.round(20*sc)}px 'Orbitron'`;ctx.fillStyle='#fff';ctx.shadowBlur=20;ctx.shadowColor=c;ctx.fillText('YOUR LOADOUT',cx,Math.round(38*sc));ctx.restore();
  ctx.save();ctx.textAlign='center';ctx.font=`400 10px 'Share Tech Mono'`;ctx.fillStyle=UNLOCKED?'#00ffcc':'rgba(255,255,255,.32)';ctx.fillText(UNLOCKED?'ALL SKINS UNLOCKED ✓':'UNLOCK ALL SKINS FOR $3',cx,Math.round(60*sc));ctx.restore();
  function sLbl(txt,ly){ctx.save();ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillText(txt,startX,ly-5);ctx.restore();}
  sLbl('TRAILS',trailY);sLbl('ORB COLOR',orbY);
  const TCOLS={classic:EPOCHS[0].player,crystal:'#aaddff',plasma:'#4488ff',void:'#6622aa',aurora:'#88ffcc',comet:'#ffaa44'};
  function cell(item,ix,iy,sel,pc,isOrb){
    const locked=!item.free&&!UNLOCKED;
    ctx.save();ctx.globalAlpha=locked?.36:1;ctx.strokeStyle=sel?pc:'rgba(255,255,255,.16)';ctx.lineWidth=sel?2:1;if(sel){ctx.shadowBlur=14;ctx.shadowColor=pc;}ctx.strokeRect(ix,iy,cellW,cellH);
    ctx.save();ctx.beginPath();ctx.rect(ix+2,iy+2,cellW-4,cellH-20);ctx.clip();
    if(isOrb){const oc=item.color==='CYCLE'?`hsl(${gs.frame*2%360},100%,65%)`:item.color||EPOCHS[0].player;ctx.shadowBlur=14;ctx.shadowColor=oc;ctx.fillStyle=oc;ctx.beginPath();ctx.arc(ix+cellW/2,iy+(cellH-20)/2+2,12,0,tau);ctx.fill();}
    else{
      const mid=iy+(cellH-20)/2+2,tid2=item.id;
      for(let pi=0;pi<10;pi++){
        const f=pi/10,px2=ix+8+f*(cellW-16),py2=mid+Math.sin(f*Math.PI*1.5)*7*(1-f*.5);ctx.globalAlpha=(locked?.1:.52)*f;
        if(tid2==='crystal'){ctx.save();ctx.translate(px2,py2);ctx.rotate(pi*.3);ctx.strokeStyle=pc;ctx.lineWidth=1;const s2=4*f;ctx.beginPath();ctx.moveTo(0,-s2);ctx.lineTo(s2*.6,0);ctx.lineTo(0,s2);ctx.lineTo(-s2*.6,0);ctx.closePath();ctx.stroke();ctx.restore();}
        else if(tid2==='plasma'){ctx.strokeStyle=pc;ctx.lineWidth=1.5;if(pi>0){ctx.beginPath();ctx.moveTo(ix+8+(pi-1)/10*(cellW-16),mid+Math.sin((pi-1)/10*Math.PI*1.5)*7*.75+Math.sin(pi*.9)*3);ctx.lineTo(px2,py2+Math.sin(pi*1.2)*3);ctx.stroke();}}
        else if(tid2==='void'){ctx.fillStyle=`rgba(0,0,30,.8)`;ctx.beginPath();ctx.arc(px2,py2,Math.max(0.1,5*f),0,tau);ctx.fill();}
        else if(tid2==='aurora'){ctx.fillStyle=pc;ctx.globalAlpha=(locked?.08:.38)*f;ctx.beginPath();ctx.arc(px2,py2,Math.max(0.1,8*f),0,tau);ctx.fill();}
        else if(tid2==='comet'){ctx.save();ctx.translate(px2,py2);ctx.rotate(.1);ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(0,0,Math.max(0.1,9*f),Math.max(0.1,3*f),0,0,tau);ctx.fill();ctx.restore();}
        else{ctx.fillStyle=pc;ctx.shadowBlur=4;ctx.shadowColor=pc;ctx.beginPath();ctx.arc(px2,py2,Math.max(0.1,4*f),0,tau);ctx.fill();}
      }
    }
    ctx.restore();
    ctx.font=`700 ${Math.round(8*sc)}px 'Share Tech Mono'`;ctx.textAlign='center';ctx.fillStyle=sel?pc:'rgba(255,255,255,.62)';ctx.fillText(item.name+(locked?' 🔒':''),ix+cellW/2,iy+cellH-5);ctx.restore();
    skinsHits.push({x:ix,y:iy,w:cellW,h:cellH,fn:()=>{if(locked)window.open(STRIPE,'_blank');else if(isOrb){selOrb=item.id;localStorage.setItem('ether_orb',item.id);}else{selTrail=item.id;localStorage.setItem('ether_trail',item.id);}}});
  }
  TRAILS.forEach((t,i)=>{const col=i%3,row=Math.floor(i/3);cell(t,startX+col*(cellW+gap),trailY+row*(cellH+gap),selTrail===t.id,TCOLS[t.id]||'#fff',false);});
  ORBS.forEach((o,i)=>{const col=i%3,row=Math.floor(i/3);const pc=o.color==='CYCLE'?`hsl(${gs.frame*2%360},100%,65%)`:o.color||EPOCHS[0].player;cell(o,startX+col*(cellW+gap),orbY+row*(cellH+gap),selOrb===o.id,pc,true);});
  const bel=orbY+(cellH+gap)*2;
  if(!UNLOCKED){const ubx=cx-100,uby=bel+10,ubw=200,ubh=36;ctx.save();ctx.strokeStyle='#ffdd00';ctx.lineWidth=1.5;ctx.shadowBlur=12;ctx.shadowColor='#ffdd00';ctx.strokeRect(ubx,uby,ubw,ubh);ctx.font=`700 11px 'Orbitron'`;ctx.fillStyle='#ffdd00';ctx.textAlign='center';ctx.shadowBlur=6;ctx.fillText('UNLOCK ALL — $3',cx,uby+ubh/2+4);ctx.restore();skinsHits.push({x:ubx,y:uby,w:ubw,h:ubh,fn:()=>window.open(STRIPE,'_blank')});}
  const bbx=cx-45,bby=Math.max(bel+(UNLOCKED?12:60),C.height-52),bbw=90,bbh=28;
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.26)';ctx.lineWidth=1;ctx.strokeRect(bbx,bby,bbw,bbh);ctx.font=`400 10px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.42)';ctx.textAlign='center';ctx.fillText('BACK',cx,bby+bbh/2+4);ctx.restore();
  skinsHits.push({x:bbx,y:bby,w:bbw,h:bbh,fn:()=>gs.state='title'});
}
// ── OVERLAYS ──────────────────────────────────────────────────────────────────
function drawOverlays(){
  if(gs.flash>0){ctx.save();ctx.fillStyle=`rgba(255,255,255,${gs.flash})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();gs.flash=Math.max(0,gs.flash-.04);}
  if(gs.transAlpha>0){ctx.save();ctx.fillStyle=`rgba(255,255,255,${gs.transAlpha})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();gs.transAlpha=Math.max(0,gs.transAlpha-.024);}
}
// ── INIT ACT ──────────────────────────────────────────────────────────────────
function initAct(n){
  gs.act=n;document.body.style.cursor='none';
  if(n===2){
    gs.state='playing';bgC={r:2,g:4,b:10};gs.lives=3;gs.act2Timer=0;gs.act2Depth=0;gs.act2Exposure=0;
    P.x=C.width/2;P.y=C.height/2;P.trail=[];P.inv=true;P.invTime=120;
    lightPools=[];particles=[];floatTexts=[];obstacles=[];shards=[];
    gs.shake={x:0,y:0};playMusic(2);
  }else if(n===3){
    gs.state='playing';bgC={r:2,g:4,b:12};gs.lives=3;
    gs.waveNum=0;gs.waveKills=0;gs.waveTotalKills=0;gs.waveEnemiesThisWave=0;gs.waveActive=false;gs.waveTimer=0;gs.waveBetweenTimer=0;gs.bullets=[];gs.enemies=[];gs.lastShot=0;
    P.x=C.width/2;P.y=C.height*.6;P.trail=[];P.inv=true;P.invTime=90;
    particles=[];floatTexts=[];obstacles=[];shards=[];playMusic(3);
    setTimeout(()=>startWave(),1200);
  }else if(n===4){
    gs.state='playing';bgC={r:2,g:8,b:14};gs.lives=3;gs.constellations=0;gs.act4Win=false;gs.act4WinTimer=0;gs.act4Perfect=0;gs.act4Missed=0;
    act4NextF=gs.frame+180;P.x=C.width/2;P.y=C.height/2;P.trail=[];P.inv=true;P.invTime=90;
    constellationShards=[];breathObstacles=[];particles=[];floatTexts=[];startDrone(110);playMusic(4);
  }else if(n===5){initAct5();}
}
// ── START GAME ────────────────────────────────────────────────────────────────
function startGame(){
  if(!playerName){playerName=(prompt('ETHER  //  Enter your pilot name:','')||'PILOT').slice(0,12).toUpperCase();localStorage.setItem('ether_name',playerName);}
  document.body.style.cursor='none';
  Object.assign(gs,{
    state:'playing',act:1,frame:0,score:0,combo:0,maxCombo:0,lives:3,epoch:0,epochReached:0,
    shield:false,shieldTime:0,magnet:false,magnetTime:0,novaRing:null,
    shardsCollected:0,closestCall:999,powerupsUsed:0,nearMisses:0,nearCooldown:0,
    hitStop:0,gridPulse:0,bossWave:false,bossTime:0,bossCalm:0,nextBossAt:1500,omegaTimer:0,playFrames:0,
    dissolveActive:false,dissProgress:0,act2Timer:0,act2Depth:0,act2Exposure:0,
    mazeSpeed:1.5,mazeScrolled:0,mazeLives:3,mazeWallTouches:0,
    breathScale:1.0,constellations:0,act4Win:false,act4WinTimer:0,act4Perfect:0,act4Missed:0,
    act5Timer:0,act5Recording:[],act5Score:0,act5MaxCombo:0,
    runRecording:[],cinematicFrame:0,cinematicParticles:[],cinematicFrom:0,cinematicTo:0,cinematicOrbX:0,cinematicOrbY:0,cinematicDone:false,
    shake:{x:0,y:0},flash:0,transAlpha:0,actLog:[],totalScore:0,
  });
  camZoom=1.0;bgC={r:2,g:4,b:10};
  P.x=C.width/2;P.y=C.height/2;P.px=P.x;P.py=P.y;P.vx=0;P.vy=0;P.trail=[];P.inv=false;P.invTime=0;
  mx=C.width/2;my=C.height/2;
  particles=[];shards=[];obstacles=[];powerups=[];floatTexts=[];lightPools=[];mazeWalls=[];constellationShards=[];breathObstacles=[];ghostEchoes=[];deathParts=[];
  act4NextF=0;act4Sub='';
  startDrone(110);playMusic(1);tone(220,440,'sine',0.06,0.8);tone(330,660,'triangle',0.04,0.8,0.1);showEpochCard(0);
}
// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);gs.frame++;
  if(gs.state==='title'){drawTitle();return;}
  if(gs.state==='skins'){drawSkins();return;}
  if(gs.state==='dead'){drawDeath();return;}
  if(gs.state==='cinematic'){drawCinematic();return;}
  if(gs.state==='epochCard'){
    if(gs.act===1||gs.act===5){renderAct1();}
    else if(gs.act===3){drawAct3();}
    else if(gs.act===4){drawAct4();}
    drawEpochCard();drawOverlays();return;
  }
  if(gs.state==='actCard'){drawActCard();return;}
  if(gs.state==='dissolution'){
    updateDissolution();
    P.x=lerp(P.x,mx,.11);P.y=lerp(P.y,my,.11);P.trail.push({x:P.x,y:P.y});if(P.trail.length>24)P.trail.shift();
    drawDissolution();drawHUD();return;
  }
  if(gs.act===1){
    if(gs.hitStop>0){gs.hitStop--;renderAct1();drawHUD();return;}
    updateAct1();renderAct1();drawHUD();drawOverlays();
  }else if(gs.act===2){updateAct2();drawAct2();drawHUD();}
  else if(gs.act===3){updateAct3();drawAct3();drawHUD();}
  else if(gs.act===4){updateAct4();drawAct4();drawHUD();}
  else if(gs.act===5){
    if(gs.hitStop>0){gs.hitStop--;drawAct5();drawHUD();return;}
    updateAct5();drawAct5();drawHUD();drawOverlays();
  }
}
mx=C.width/2;my=C.height/2;
loop();
</script>
