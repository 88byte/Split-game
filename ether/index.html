function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}

function tone(freq,endFreq,type,vol,dur,delay=0){
  if(!AC)return;try{
    const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='lowpass';f.frequency.value=5000;o.connect(f);f.connect(g);g.connect(AC.destination);
    const t=AC.currentTime+delay;o.type=type;o.frequency.setValueAtTime(freq,t);
    if(endFreq)o.frequency.exponentialRampToValueAtTime(Math.max(endFreq,10),t+dur);
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}

let musicAudio=null,musicFadeTimer=null,musicCurrentAct=0;

function playMusic(actNum){
  const url=MUSIC[actNum];
  if(!url||actNum===musicCurrentAct)return;
  musicCurrentAct=actNum;
  const oldAudio=musicAudio;
  const newAudio=new Audio(url);
  newAudio.loop=true;newAudio.volume=0;
  newAudio.play().catch(()=>{}); // mobile: may need user gesture
  musicAudio=newAudio;
  // Crossfade over 1.5 seconds
  const dur=1500,start=Date.now(),fromVol=oldAudio?oldAudio.volume:0;
  if(musicFadeTimer)clearInterval(musicFadeTimer);
  musicFadeTimer=setInterval(()=>{
    const t=Math.min((Date.now()-start)/dur,1);
    newAudio.volume=t*0.45;
    if(oldAudio)oldAudio.volume=fromVol*(1-t);
    if(t>=1){
      clearInterval(musicFadeTimer);musicFadeTimer=null;
      if(oldAudio){oldAudio.pause();oldAudio.src='';}
    }
  },16);
}

function fadeOutMusic(durMs=2000){
  if(!musicAudio)return;
  const audio=musicAudio,start=Date.now(),fromVol=audio.volume;
  musicCurrentAct=0;
  const iv=setInterval(()=>{
    const t=Math.min((Date.now()-start)/durMs,1);
    audio.volume=fromVol*(1-t);
    if(t>=1){clearInterval(iv);audio.pause();if(musicAudio===audio)musicAudio=null;}
  },16);
}

function stopMusic(){
  if(musicAudio){musicAudio.pause();musicAudio.src='';musicAudio=null;}
  if(musicFadeTimer){clearInterval(musicFadeTimer);musicFadeTimer=null;}
  musicCurrentAct=0;
}

const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rnd=(a,b)=>Math.random()*(b-a)+a;
const tau=Math.PI*2;
const E=()=>EPOCHS[Math.min(gs.epoch,5)];
const GLITCH='!@#$%^&*><[]{}|\\/?~`';
function glitchStr(s,n){return s.split('').map(c=>Math.random()<n?GLITCH[Math.floor(Math.random()*GLITCH.length)]:c).join('');}
function pColor(){
  if(gs.act===2)return'#111130';

  return o.color;
}
function poly(sides,r,x=0,y=0,rot=0){
  ctx.beginPath();
  for(let i=0;i<=sides;i++){const a=tau/sides*i+rot;i?ctx.lineTo(Math.cos(a)*r+x,Math.sin(a)*r+y):ctx.moveTo(Math.cos(a)*r+x,Math.sin(a)*r+y);}
  ctx.closePath();ctx.stroke();
}
function fmtTime(f){const s=Math.floor(f/60),m=Math.floor(s/60);return`${m}:${String(s%60).padStart(2,'0')}`;}

let stars=[];
function initStars(){
  stars=[];
  [[90,.7,.012],[55,1.3,.028],[22,2.1,.055]].forEach(([n,sz,par])=>{
    for(let i=0;i<n;i++)stars.push({x:rnd(0,C.width),y:rnd(0,C.height),sz,par,tw:rnd(0,tau),tws:rnd(.02,.05)});
  });
}
initStars();
function drawStars(inv=false){
  const dx=P.x-C.width/2,dy=P.y-C.height/2;
  stars.forEach(s=>{
    s.tw+=s.tws;
    const sx=((s.x-dx*s.par)%C.width+C.width)%C.width;
    const sy=((s.y-dy*s.par)%C.height+C.height)%C.height;
    ctx.save();ctx.globalAlpha=(.15+Math.sin(s.tw)*.13)*(inv?.55:1);ctx.fillStyle=inv?'rgba(0,0,60,.9)':'#fff';
    ctx.beginPath();ctx.arc(sx,sy,s.sz,0,tau);ctx.fill();ctx.restore();
  });
}

let bgC={r:2,g:4,b:10};
function drawBG(){
  let tr,tg,tb;
  if(gs.act===2){tr=238;tg=238;tb=255;}
  else if(gs.act===3){tr=4;tg=2;tb=8;}
  else if(gs.act===4){tr=2;tg=8;tb=14;}
  else{const e=E();[tr,tg,tb]=e.bgRGB;}
  bgC.r=lerp(bgC.r,tr,.015);bgC.g=lerp(bgC.g,tg,.015);bgC.b=lerp(bgC.b,tb,.015);
  ctx.fillStyle=`rgb(${bgC.r|0},${bgC.g|0},${bgC.b|0})`;ctx.fillRect(0,0,C.width,C.height);
  if(gs.act!==3){
    ctx.save();
    ctx.strokeStyle=gs.act===2?`rgba(0,0,80,${.015+gs.gridPulse*.05})`:`rgba(255,255,255,${.02+gs.gridPulse*.09})`;
    ctx.lineWidth=1;const sz=55,ox=(gs.frame*.22)%sz,oy=(gs.frame*.14)%sz;
    for(let x=ox-sz;x<C.width+sz;x+=sz){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,C.height);ctx.stroke();}
    for(let y=oy-sz;y<C.height+sz;y+=sz){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(C.width,y);ctx.stroke();}
    ctx.restore();gs.gridPulse*=.96;
  }
  if(gs.bossWave){ctx.save();ctx.fillStyle=`rgba(220,0,0,${.07+Math.sin(gs.frame*.04)*.04})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
}

class Particle{
  constructor(x,y,vx,vy,color,size,life,glow=8){Object.assign(this,{x,y,vx,vy,color,size,life,maxLife:life,glow});}
  update(){this.x+=this.vx;this.y+=this.vy;this.vx*=.93;this.vy*=.93;this.life--;}
  draw(){
    const a=this.life/this.maxLife;if(a<=0||this.size<=0)return;
    ctx.save();ctx.globalAlpha=a*.9;ctx.shadowBlur=this.glow;ctx.shadowColor=this.color;
    ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,Math.max(0.1,this.size*a),0,tau);ctx.fill();ctx.restore();
  }
}
function burst(x,y,color,n=12,sMin=1,sMax=5,szMin=1.5,szMax=4,lMin=20,lMax=45){
  for(let i=0;i<n;i++){const a=rnd(0,tau),s=rnd(sMin,sMax);particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,color,rnd(szMin,szMax),rnd(lMin,lMax)));}
}
class FloatText{
  constructor(x,y,text,color,size=22){Object.assign(this,{x,y,text,color,size,vy:-1.3,life:65,maxLife:65});}
  update(){this.y+=this.vy;this.vy*=.97;this.life--;}
  draw(){
    const a=this.life/this.maxLife;ctx.save();ctx.globalAlpha=a;ctx.font=`700 ${this.size}px 'Orbitron'`;
    ctx.fillStyle=this.color;ctx.shadowBlur=14;ctx.shadowColor=this.color;ctx.textAlign='center';ctx.fillText(this.text,this.x,this.y);ctx.restore();
  }
}
// ── ACT 1 ENTITIES ────────────────────────────────────────────────────────────
class Shard{
  constructor(){
    const a=rnd(0,tau),d=Math.min(C.width,C.height)*rnd(.12,.52);
    this.x=C.width/2+Math.cos(a)*d;this.y=C.height/2+Math.sin(a)*d;
    this.angle=a;this.dist=d;this.speed=rnd(.003,.008)*(Math.random()>.5?1:-1);
    this.r=rnd(4.5,8);this.pulse=rnd(0,tau);this.collected=false;this.dead=false;
  }
  update(){
    this.pulse+=.065;
    if(!this.collected){
      if(gs.magnet){
        const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
        const spd=Math.min(6,100/d),sp=Math.max(0,(d-30)/180)*3;
        this.x+=dx/d*spd+(-dy/d)*sp;this.y+=dy/d*spd+(dx/d)*sp;
      }else{this.angle+=this.speed;this.x=C.width/2+Math.cos(this.angle)*this.dist;this.y=C.height/2+Math.sin(this.angle)*this.dist;}
    }else{this.x=lerp(this.x,P.x,.25);this.y=lerp(this.y,P.y,.25);if(dist(this,P)<8)this.dead=true;}
  }
  draw(){
    const c=E().shard,pr=this.r+Math.sin(this.pulse)*2;
    ctx.save();ctx.shadowBlur=22;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(this.x,this.y,pr*.35,0,tau);ctx.fill();ctx.restore();
  }
}
const OTYPES=['ring','triangle','hex','dart','cross','cluster'];
class Obstacle{
  constructor(){
    const av=Math.min(gs.epoch+2,OTYPES.length);
    this.type=OTYPES[Math.floor(Math.random()*av)];
    const side=Math.floor(Math.random()*4),m=80;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    // 70% of obstacles aim near player, 30% aim toward center for variety
    const usePlayer=Math.random()<0.7;
    const tx=(usePlayer?P.x:C.width/2)+rnd(-120,120);
    const ty=(usePlayer?P.y:C.height/2)+rnd(-120,120);
    const a=Math.atan2(ty-this.y,tx-this.x),sp=rnd(1.8,3.2)*E().speed;
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.r=rnd(18,32);this.rot=0;this.rotS=rnd(-.04,.04);
    this.alive=true;this.age=0;this.homing=this.type==='dart'&&gs.epoch>=2;this.color=E().obstacle;
  }
  update(){
    this.age++;
    if(this.homing&&this.age>40){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1,h=.025*E().speed;
      this.vx=lerp(this.vx,dx/d*3.5*E().speed,h);this.vy=lerp(this.vy,dy/d*3.5*E().speed,h);
    }
    // All obstacles drift toward player position (not just homing darts)
    // Increases with epoch so early game is forgiving, late game punishes standing still
    if(!this.homing&&this.age>60&&gs.epoch>=1){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
      const drift=0.004*gs.epoch; // 0 in void, ramps up per epoch
      this.vx+=dx/d*drift;this.vy+=dy/d*drift;
      // Cap speed so they don't rocket
      const spd=Math.hypot(this.vx,this.vy),maxSpd=E().speed*3.5;
      if(spd>maxSpd){this.vx=this.vx/spd*maxSpd;this.vy=this.vy/spd*maxSpd;}
    }
    this.x+=this.vx;this.y+=this.vy;this.rot+=this.rotS;
    if(this.x<-300||this.x>C.width+300||this.y<-300||this.y>C.height+300){
      if(this.alive)burst(Math.max(0,Math.min(C.width,this.x)),Math.max(0,Math.min(C.height,this.y)),this.color,4,.5,2.5,1,2.5,12,25);
      this.alive=false;
    }
  }
  draw(){
    const fi=Math.min(this.age/25,1),r=this.r,pd=dist(P,this),prx=Math.max(0,1-pd/220);
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.globalAlpha=fi;ctx.strokeStyle=this.color;ctx.lineWidth=2.5+prx*2.5;ctx.shadowBlur=22+prx*30;ctx.shadowColor=this.color;
    if(this.type==='ring'){ctx.beginPath();ctx.arc(0,0,r,0,tau);ctx.stroke();ctx.beginPath();ctx.arc(0,0,r*.55,0,tau);ctx.stroke();}
    else if(this.type==='triangle'){poly(3,r);}else if(this.type==='hex'){poly(6,r);}
    else if(this.type==='dart'){
      ctx.beginPath();ctx.moveTo(0,-r*1.6);ctx.lineTo(r*.55,0);ctx.lineTo(0,r*.8);ctx.lineTo(-r*.55,0);ctx.closePath();ctx.stroke();
      if(this.homing&&pd<240){
        ctx.save();ctx.strokeStyle=`rgba(255,50,50,${(240-pd)/240*.55})`;ctx.lineWidth=1;ctx.setLineDash([3,3]);
        const dl=Math.hypot(P.x-this.x,P.y-this.y)||1;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo((P.x-this.x)/dl*Math.min(pd,70),(P.y-this.y)/dl*Math.min(pd,70));ctx.stroke();ctx.setLineDash([]);ctx.restore();
      }
    }
    else if(this.type==='cross'){const l=r*1.2,w=r*.3;ctx.beginPath();ctx.rect(-w,-l,w*2,l*2);ctx.stroke();ctx.beginPath();ctx.rect(-l,-w,l*2,w*2);ctx.stroke();}
    else{for(let i=0;i<3;i++){const a2=tau/3*i+this.rot*2;ctx.beginPath();ctx.arc(Math.cos(a2)*r*.7,Math.sin(a2)*r*.7,r*.33,0,tau);ctx.stroke();}}
    ctx.restore();
  }
  get hitR(){return this.r*.72;}
}
const PU_CFG={nova:{color:'#ff6600',label:'NOVA'},shield:{color:'#00ffff',label:'SHIELD'},magnet:{color:'#ffaa00',label:'MAGNET'},life:{color:'#ff88ff',label:'+LIFE'}};
class PowerUp{
  constructor(){
    this.type=['nova','shield','magnet','magnet','magnet','life'][Math.floor(Math.random()*6)];
    const a=rnd(0,tau),d=rnd(80,Math.min(C.width,C.height)*.38);
    this.x=C.width/2+Math.cos(a)*d;this.y=C.height/2+Math.sin(a)*d;
    this.angle=a;this.dist=d;this.r=11;this.pulse=rnd(0,tau);this.dead=false;this.life=700;
    this.color=PU_CFG[this.type].color;this.label=PU_CFG[this.type].label;
  }
  update(){
    this.pulse+=.055;this.life--;if(this.life<=0)this.dead=true;
    this.angle+=.003;this.x=C.width/2+Math.cos(this.angle)*this.dist;this.y=C.height/2+Math.sin(this.angle)*this.dist;
  }
  draw(){
    const al=Math.min(this.life/60,1),pr=this.r+Math.sin(this.pulse)*3;
    ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=this.color;ctx.lineWidth=2.2;ctx.shadowBlur=28;ctx.shadowColor=this.color;
    if(this.type==='nova'){ctx.beginPath();for(let i=0;i<8;i++){const a2=tau/8*i-tau/16,r2=i%2===0?pr*1.6:pr*.6;ctx.lineTo(Math.cos(a2)*r2+this.x,Math.sin(a2)*r2+this.y);}ctx.closePath();ctx.stroke();}
    else if(this.type==='shield'){poly(6,pr,this.x,this.y,this.pulse*.18);}
    else if(this.type==='life'){ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.stroke();ctx.beginPath();ctx.arc(this.x,this.y,pr*.5,0,tau);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(this.x,this.y-pr*1.5);ctx.lineTo(this.x+pr,this.y);ctx.lineTo(this.x,this.y+pr*1.5);ctx.lineTo(this.x-pr,this.y);ctx.closePath();ctx.stroke();}
    ctx.font=`700 9px 'Share Tech Mono'`;ctx.fillStyle=this.color;ctx.textAlign='center';ctx.shadowBlur=6;ctx.fillText(this.label,this.x,this.y+pr+17);ctx.restore();
  }
}

class Wraith{
  constructor(tier){
    const side=Math.floor(Math.random()*4),m=60;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    // Tier 3+ can spawn from inside darkness (random position far from player)
    if(tier>=3&&Math.random()<.3){
      do{this.x=rnd(0,C.width);this.y=rnd(0,C.height);}
      while(dist({x:this.x,y:this.y},P)<200);
    }
    this.speed=lerp(.7,2.2,Math.min(tier/3,1));
    this.vx=0;this.vy=0;this.r=rnd(20,38);this.alive=true;this.age=0;
    this.trail=[];this.maxTrail=lerp(60,130,tier/3)|0;
    this.pulse=rnd(0,tau);this.hue=rnd(160,280);
    this.color=`hsl(${this.hue|0},55%,68%)`;
    // Tier 4: wraiths leave long lingering trails
    this.trailDecay=tier>=4?0.003:0.008;
    this.uniqueOffset={x:rnd(-80,80),y:rnd(-80,80)};
  }
  update(){
    this.age++;this.pulse+=.04;
    const tx=P.x+this.uniqueOffset.x,ty=P.y+this.uniqueOffset.y;
    const dx=tx-this.x,dy=ty-this.y,d=Math.hypot(dx,dy)||1;
    this.vx=lerp(this.vx,dx/d*this.speed,.055);
    this.vy=lerp(this.vy,dy/d*this.speed,.055);
    this.vx+=Math.sin(gs.frame*.03+this.age*.07)*.08;
    this.vy+=Math.cos(gs.frame*.025+this.age*.05)*.08;
    this.x+=this.vx;this.y+=this.vy;
    this.trail.push({x:this.x,y:this.y,a:1});
    if(this.trail.length>this.maxTrail)this.trail.shift();
    // Fade trail points
    this.trail.forEach(t=>t.a=Math.max(0,t.a-this.trailDecay));
    if(this.x<-300||this.x>C.width+300||this.y<-300||this.y>C.height+300)this.alive=false;
  }
  draw(lightX,lightY,lightR){
    // Only visible if trail or body intersects player's light radius
    const bodyDist=Math.hypot(this.x-lightX,this.y-lightY);
    // Draw trail segments near light
    if(this.trail.length>1){
      for(let i=1;i<this.trail.length;i++){
        const t=this.trail[i],td=Math.hypot(t.x-lightX,t.y-lightY);
        if(td>lightR+this.r*2)continue;
        const f=i/this.trail.length,vis=Math.max(0,1-(td-lightR*.5)/(lightR*.8));
        ctx.save();ctx.globalAlpha=f*t.a*.22*vis;
        ctx.strokeStyle=this.color;ctx.lineWidth=this.r*f*.5;ctx.shadowBlur=10;ctx.shadowColor=this.color;
        ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);ctx.lineTo(t.x,t.y);ctx.stroke();ctx.restore();
      }
    }
    // Body — only visible if inside light radius
    if(bodyDist<lightR+this.r){
      const vis=Math.max(0,1-(bodyDist-lightR*.3)/(lightR*.9));
      const fi=Math.min(this.age/40,1);
      const pr=this.r*(1+Math.sin(this.pulse)*.12);
      ctx.save();ctx.globalAlpha=fi*.8*vis;ctx.shadowBlur=30;ctx.shadowColor=this.color;ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,pr),0,tau);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,pr*.25),0,tau);ctx.fill();
      ctx.restore();
    }
  }
  get hitR(){return this.r*.8;}
  trailNear(ox,oy,radius){
    for(let i=this.trail.length-1;i>=Math.max(0,this.trail.length-25);i--){
      if(Math.hypot(this.trail[i].x-ox,this.trail[i].y-oy)<radius)return true;
    }
    return false;
  }
}
class MemFrag{

    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,pr),0,tau);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,pr*.35),0,tau);ctx.fill();

}

class TheVoid{
  // Act 3 version — appears powerful, cannot truly be killed, fake-kills player at 60s
  // Act 5 version — scarred (one ring missing), phase 4 is beatable
  constructor(scarred=false){
    this.x=C.width*.5;this.y=-120; // enters from above
    this.targetY=C.height*.32;this.r=60;this.alive=true;this.age=0;
    this.orbitAngle=0;this.orbitR=Math.min(C.width,C.height)*.25;
    this.hp=200;this.maxHp=200;this.phase=0;this.flashTimer=0;this.scarred=scarred;
    this.weakAngles=[0,tau/3,tau*2/3];
    this.weakOpen=false;this.weakTimer=0;this.attackTimer=0;
    this.fakeKillTimer=0;this.fakeKilling=false;this.entered=false;
    this.beamAngle=0;this.beamCharging=false;this.beamCharge=0;
  }
  update(){
    this.age++;this.flashTimer=Math.max(0,this.flashTimer-1);
    // Dramatic entrance — descend from top
    if(!this.entered){
      this.y=lerp(this.y,this.targetY,.022);
      if(Math.abs(this.y-this.targetY)<3){this.entered=true;sfx.boss();burst(this.x,this.y,'#ff0044',40,3,10,3,8,40,100);}
      return;
    }
    // Orbit
    this.orbitAngle+=.006+this.phase*.002;
    this.x=lerp(this.x,C.width/2+Math.cos(this.orbitAngle)*this.orbitR,.035);
    this.y=lerp(this.y,this.targetY+Math.sin(this.orbitAngle*1.3)*40,.035);
    this.weakAngles=this.weakAngles.map(a=>a+.018+this.phase*.008);
    this.attackTimer++;
    const atkInt=120-this.phase*20;
    if(this.attackTimer>=atkInt&&!this.fakeKilling){
      this.attackTimer=0;this.weakOpen=true;this.weakTimer=60-this.phase*8;
      const shotCount=3+this.phase*2;
      for(let i=0;i<shotCount;i++){
        const a=Math.atan2(P.y-this.y,P.x-this.x)+(i-shotCount/2)*.3;
        // Use voidShots array — works in both Act 3 and Act 5
        if(!gs.voidShots)gs.voidShots=[];
        gs.voidShots.push({x:this.x,y:this.y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,r:7,alive:true,color:'#ff0044'});
      }
    }
    if(this.weakOpen){this.weakTimer--;if(this.weakTimer<=0)this.weakOpen=false;}
    // Phase transitions based on damage taken
    if(this.hp<this.maxHp*.75&&this.phase===0){this.phase=1;floatTexts.push(new FloatText(C.width/2,C.height*.22,'—','#ff0044',22));}
    if(this.hp<this.maxHp*.5&&this.phase===1){this.phase=2;floatTexts.push(new FloatText(C.width/2,C.height*.22,'——','#ff0044',22));}
    if(this.hp<this.maxHp*.25&&this.phase===2&&!this.scarred){
      // Act 3: phase 3 reached — THE VOID laughs and starts charging fake kill
      this.phase=3;this.fakeKilling=true;this.fakeKillTimer=180; // 3s of beam charge
      this.beamCharging=true;
      floatTexts.push(new FloatText(C.width/2,C.height*.2,'THE VOID AWAKENS','#ff0044',24));
    }
    if(this.hp<this.maxHp*.25&&this.phase===2&&this.scarred){
      // Act 5: phase 3 opens — truly killable now
      this.phase=3;this.weakOpen=true;this.weakTimer=9999;
      floatTexts.push(new FloatText(C.width/2,C.height*.2,'FINAL PHASE','#ff0044',24));sfx.boss();
    }
    // Fake kill sequence (Act 3 only)
    if(this.fakeKilling){
      this.fakeKillTimer--;
      this.beamCharge=Math.min(1,1-this.fakeKillTimer/180);
      if(this.fakeKillTimer<=0){
        // FIRE — fake kill player
        gs.voidFakeKill=true;gs.voidFakeKillTimer=240; // 4s cinematic
        this.fakeKilling=false;this.weakOpen=false;
        sfx.death();burst(P.x,P.y,pColor(),120,2,12,2,10,50,150);
        P.inv=true;P.invTime=9999;
      }
    }
    // 60 second hard cutoff (no timer shown) — force fake kill if hp still high
    if(gs.act===3&&this.age===3600&&!this.fakeKilling&&!gs.voidFakeKill){
      this.phase=Math.max(this.phase,3);this.fakeKilling=true;this.fakeKillTimer=180;this.beamCharging=true;
      floatTexts.push(new FloatText(C.width/2,C.height*.2,'THE VOID AWAKENS','#ff0044',24));
    }
  }
  draw(){
    if(!this.entered&&this.age<5)return;
    const fi=Math.min(this.age/50,1);
    ctx.save();ctx.globalAlpha=fi;ctx.translate(this.x,this.y);
    const c=this.flashTimer>0?'#fff':'#ff0044';
    const rings=this.scarred?[1,.7,.42]:[1,.72,.44]; // scarred version missing middle ring
    rings.forEach((s,i)=>{
      if(this.scarred&&i===1&&Math.sin(gs.frame*.08)>.5)return; // scarred ring flickers
      ctx.save();ctx.rotate(this.orbitAngle*(i%2===0?1:-1)*(1+i*.3));
      ctx.strokeStyle=c;ctx.lineWidth=i===0?3.5:2;ctx.shadowBlur=i===0?50:22;ctx.shadowColor=c;
      poly(3+i*2,this.r*s);ctx.restore();
    });
    // Weak points
    if(this.weakOpen){
      this.weakAngles.forEach(a=>{
        const wx=Math.cos(a)*this.r*.62,wy=Math.sin(a)*this.r*.62;
        ctx.save();ctx.shadowBlur=28;ctx.shadowColor='#fff';ctx.fillStyle='#fff';
        ctx.globalAlpha=.75+Math.sin(gs.frame*.2)*.25;ctx.beginPath();ctx.arc(wx,wy,9,0,tau);ctx.fill();ctx.restore();
      });
    }
    // Beam charging visual
    if(this.beamCharging&&this.beamCharge>0){
      ctx.save();const bc=this.beamCharge;
      ctx.strokeStyle=`rgba(255,0,68,${bc*.8})`;ctx.lineWidth=6*bc;ctx.shadowBlur=40*bc;ctx.shadowColor='#ff0044';
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,C.height*2);ctx.stroke(); // beam downward
      ctx.fillStyle=`rgba(255,0,68,${bc*.4})`;ctx.beginPath();ctx.arc(0,0,this.r*bc*1.5,0,tau);ctx.fill();
      ctx.restore();
    }
    // Health bar (fades when invincible)
    const hpAlpha=this.phase===3&&!this.scarred?.2:1;
    ctx.save();ctx.globalAlpha=fi*hpAlpha;ctx.rotate(-this.orbitAngle);
    const hw=this.r*2.6,hx=-hw/2,hy=this.r+16;
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(hx,hy,hw,5);
    ctx.fillStyle=c;ctx.shadowBlur=6;ctx.shadowColor=c;ctx.fillRect(hx,hy,hw*(this.hp/this.maxHp),5);
    ctx.font=`400 8px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,0,68,.7)';ctx.textAlign='center';ctx.fillText('VOID',0,hy+16);
    ctx.restore();
    ctx.restore();
  }
  hit(dmg=5){
    if(this.phase===3&&!this.scarred)return false; // unkillable in act 3 phase 3
    this.hp=Math.max(0,this.hp-dmg);this.flashTimer=8;
    if(this.scarred&&this.hp<=0){this.alive=false;return true;} // truly dies in act 5
    return false;
  }
  hitWeak(bx,by){
    if(!this.weakOpen)return false;
    return this.weakAngles.some(a=>{const wx=this.x+Math.cos(a)*this.r*.62,wy=this.y+Math.sin(a)*this.r*.62;return Math.hypot(bx-wx,by-wy)<16;});
  }
}

class FractureEnemy{
  constructor(wave){
    const side=Math.floor(Math.random()*4),m=40;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    this.wave=wave;this.alive=true;this.age=0;this.rot=0;this.flashTimer=0;
    const sp=lerp(1.0,3.8,Math.min((wave-1)/7,1));
    const baseAngle=Math.atan2(P.y-this.y,P.x-this.x);
    // Unique offset so enemies form a ring not a stack
    const spread=100+gs.waveNum*18;const oa=rnd(0,tau);this.targetOffset={x:Math.cos(oa)*spread,y:Math.sin(oa)*spread};
    this.vx=Math.cos(baseAngle+rnd(-.2,.2))*sp;this.vy=Math.sin(baseAngle+rnd(-.2,.2))*sp;this.baseSpd=sp;
    const roll=Math.random();
    if(wave>=8&&roll<.25){this.type='heavy';this.hp=6;this.r=22;this.rotSpd=.02;this.pulseHits=3;}
    else if(wave>=6&&roll<.2){this.type='splitter';this.hp=2;this.r=16;this.rotSpd=.08;this.pulseHits=1;}
    else if(wave>=4&&roll<.28){this.type='tracker';this.hp=3;this.r=14;this.rotSpd=.1;this.pulseHits=2;}
    else{this.type='drifter';this.hp=1;this.r=11;this.rotSpd=.06;this.pulseHits=1;}
    this.maxHp=this.hp;
    this.color=this.type==='heavy'?'#ff6600':this.type==='splitter'?'#ff00ff':this.type==='tracker'?'#00ffcc':'#4488ff';
  }
  update(){
    this.age++;this.rot+=this.rotSpd;this.flashTimer=Math.max(0,this.flashTimer-1);
    const tx=P.x+this.targetOffset.x,ty=P.y+this.targetOffset.y;
    if(this.type==='tracker'&&this.age%55===0){
      const a=Math.atan2(ty-this.y,tx-this.x);this.vx=Math.cos(a)*this.baseSpd;this.vy=Math.sin(a)*this.baseSpd;
    }else{
      const dx=tx-this.x,dy=ty-this.y,d=Math.hypot(dx,dy)||1;
      const pull=this.type==='heavy'?.018:.032;
      this.vx+=dx/d*pull;this.vy+=dy/d*pull;
      const spd=Math.hypot(this.vx,this.vy);
      if(spd>this.baseSpd*1.5){this.vx=this.vx/spd*this.baseSpd*1.5;this.vy=this.vy/spd*this.baseSpd*1.5;}
    }
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<-120||this.x>C.width+120||this.y<-120||this.y>C.height+120)this.alive=false;
  }
  draw(){
    const fi=Math.min(this.age/20,1);ctx.save();ctx.globalAlpha=fi;ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    const c=this.flashTimer>0?'#fff':this.color;
    ctx.strokeStyle=c;ctx.lineWidth=this.type==='heavy'?3:2;ctx.shadowBlur=14;ctx.shadowColor=c;
    if(this.type==='drifter'||this.type==='tracker'){ctx.beginPath();ctx.arc(0,0,this.r,0,tau);ctx.stroke();}
    else if(this.type==='heavy'){poly(6,this.r);ctx.beginPath();ctx.arc(0,0,this.r*.5,0,tau);ctx.stroke();}
    else{poly(4,this.r);}
    if(this.maxHp>1){ctx.save();ctx.rotate(-this.rot);const hw=this.r*2,hx=-hw/2,hy=this.r+5;ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(hx,hy,hw,4);ctx.fillStyle=this.color;ctx.fillRect(hx,hy,hw*(this.hp/this.maxHp),4);ctx.restore();}
    ctx.restore();
  }
  hitByPulse(strength){
    const dmg=Math.ceil(strength*this.pulseHits);
    this.hp-=dmg;this.flashTimer=10;

// ── ACT 4 ENTITIES — THE RISE (debris fragments falling) ─────────────────────
class RisingDebris{
  constructor(speed){
    // Debris falls from top (hero climbs up, so debris comes from above = top)
    this.w=rnd(20,120)|0;this.h=rnd(8,22)|0;
    this.x=rnd(0,C.width);this.y=-this.h-rnd(0,C.height*.3);
    this.vy=speed*(rnd(.7,1.4));this.vx=rnd(-1,1);
    this.rot=rnd(0,tau);this.rotS=rnd(-.025,.025);
    this.color=`hsl(${20+rnd(0,30)|0},${70+rnd(0,30)|0}%,${35+rnd(0,25)|0}%)`;
    this.alive=true;this.glow=Math.random()<.15; // some fragments glow ember-hot
  }
  update(){
    this.y+=this.vy;this.x+=this.vx;this.rot+=this.rotS;
    if(this.y>C.height+this.h+20)this.alive=false;
  }
  draw(){
    ctx.save();ctx.translate(this.x+this.w/2,this.y+this.h/2);ctx.rotate(this.rot);
    if(this.glow){ctx.shadowBlur=18;ctx.shadowColor='#ff6600';}
    ctx.fillStyle=this.color;ctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
    if(this.glow){ctx.strokeStyle='rgba(255,150,0,.4)';ctx.lineWidth=1;ctx.strokeRect(-this.w/2,-this.h/2,this.w,this.h);}
    ctx.restore();
  }
  // Check collision with player (rectangle vs circle)
  hitsPlayer(){
    const cx=this.x+this.w/2,cy=this.y+this.h/2;
    const cos=Math.cos(-this.rot),sin=Math.sin(-this.rot);
    const dx=P.x-cx,dy=P.y-cy;
    const lx=cos*dx-sin*dy,ly=sin*dx+cos*dy;
    const nearX=Math.max(-this.w/2,Math.min(this.w/2,lx));
    const nearY=Math.max(-this.h/2,Math.min(this.h/2,ly));
    return Math.hypot(lx-nearX,ly-nearY)<P.r*.7;
  }
}

class GhostEcho{
  constructor(data,offset=0){
    this.data=data;this.frame=offset%Math.max(1,data.length);
    const p=data[this.frame]||{x:C.width/2,y:C.height/2,sw:C.width,sh:C.height};
    this.x=p.x*(C.width/(p.sw||C.width));this.y=p.y*(C.height/(p.sh||C.height));
    this.trail=[];this.alpha=0;
  }
  update(){
    this.frame=(this.frame+1)%Math.max(1,this.data.length);
    const p=this.data[this.frame];
    if(p){this.x=p.x*(C.width/(p.sw||C.width));this.y=p.y*(C.height/(p.sh||C.height));}
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>12)this.trail.shift();
    this.alpha=Math.min(this.alpha+.007,.28);
  }
  draw(){
    const c=pColor();
    this.trail.forEach((t,i)=>{ctx.save();ctx.globalAlpha=Math.max(0,i/this.trail.length*this.alpha*.5);ctx.fillStyle=c;ctx.beginPath();ctx.arc(t.x,t.y,Math.max(.1,P.r*(i/this.trail.length)*.6),0,tau);ctx.fill();ctx.restore();});
    ctx.save();ctx.globalAlpha=this.alpha;ctx.shadowBlur=16;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.arc(this.x,this.y,P.r*.7,0,tau);ctx.fill();ctx.restore();
  }
  get hitR(){return P.r*.65;}
}

  ctx.font=`400 8px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.3)';ctx.textAlign='center';ctx.fillText('ASCENDING',C.width/2,by+bh+10);ctx.textAlign='left';ctx.restore();
  for(let li=0;li<gs.lives;li++){ctx.save();ctx.fillStyle='#ff6600';ctx.shadowBlur=6;ctx.shadowColor='#ff6600';ctx.beginPath();ctx.arc(22+li*14,C.height-22,5,0,tau);ctx.fill();ctx.restore();}
}
function updateAct4(){
  P.px=P.x;P.py=P.y;P.x=lerp(P.x,mx,.11);P.y=lerp(P.y,my,.11);
  // Clamp player to screen
  P.x=Math.max(P.r,Math.min(C.width-P.r,P.x));P.y=Math.max(P.r*2,Math.min(C.height-P.r,P.y));
  P.trail.push({x:P.x,y:P.y});if(P.trail.length>14)P.trail.shift();
  if(P.inv){P.invTime--;if(P.invTime<=0)P.inv=false;}
  if(!gs.act4Dist)gs.act4Dist=0;
  if(!gs.act4MaxDist)gs.act4MaxDist=8000;
  if(!gs.act4Debris)gs.act4Debris=[];
  if(!gs.act4Speed)gs.act4Speed=1.8;
  // Speed escalates with progress
  const prog=Math.min(gs.act4Dist/gs.act4MaxDist,1);
  gs.act4Speed=lerp(1.8,5.5,prog*prog); // ease-in — starts calm, gets intense
  gs.act4Dist+=gs.act4Speed;
  // Spawn debris from top at rate that scales with speed
  const spawnRate=Math.max(8,Math.floor(lerp(30,8,prog)));
  if(gs.frame%spawnRate===0){
    const d=new RisingDebris(gs.act4Speed);
    // Denser debris clusters in middle-to-late climb
    if(prog>.4&&Math.random()<.3){// spawn a cluster
      for(let i=0;i<3;i++){const d2=new RisingDebris(gs.act4Speed);d2.x=d.x+rnd(-80,80);d2.y=d.y-rnd(40,150);gs.act4Debris.push(d2);}
    }
    gs.act4Debris.push(d);
  }
  gs.act4Debris.forEach(d=>d.update());gs.act4Debris=gs.act4Debris.filter(d=>d.alive);
  // Collision — no invincibility frames
  if(!P.inv){
    for(const d of gs.act4Debris){
      if(d.hitsPlayer()){
        gs.lives--;sfx.hit();burst(P.x,P.y,'#ff6600',16,2,6,2,5);gs.shake={x:rnd(-12,12),y:rnd(-12,12)};
        if(navigator.vibrate)navigator.vibrate([100,30,60]);
        if(gs.lives<=0){if(ACT4_RESET_ON_DEATH){initAct(4);}else{killPlayer(4);}return;}
        // 3-second debris surge after hit
        gs.act4SurgeTimer=180;
        P.inv=true;P.invTime=1; // minimal — keep pressure on
        d.alive=false;break;
      }
    }
  }
  if(gs.act4SurgeTimer>0){gs.act4SurgeTimer--;if(gs.frame%4===0){const d=new RisingDebris(gs.act4Speed*1.5);gs.act4Debris.push(d);}}
  gs.shake.x*=.8;gs.shake.y*=.8;
  particles.forEach(p=>p.update());particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(t=>t.update());floatTexts=floatTexts.filter(t=>t.life>0);
  // Win: reach the top
  if(gs.act4Dist>=gs.act4MaxDist){
    gs.actLog.push({act:4,frames:gs.frame,score:gs.totalScore,label:'the rise complete'});
    showActCinematic(4,5);
  }
}
function drawAct4(){

  gs.act5Recording=[];gs.lives=3;gs.act5Phase='waves';gs.act5Projectiles=[];gs.originBoss=null;
  gs.act5Wave=0;gs.act5WaveKills=0;gs.act5WaveActive=false;gs.act5WaveSides=[];gs.act5WaveEnemyCount=0;
  bgC={r:2,g:4,b:10};obstacles=[];shards=[];particles=[];floatTexts=[];ghostEchoes=[];
  gs.enemies=[];gs.bullets=[];gs.lastShot=0;

  setTimeout(()=>{if(gs.state==='playing'&&gs.act===5)startAct5Wave();},2000);

function startAct5Wave(){
  gs.act5Wave++;gs.act5WaveKills=0;gs.act5WaveActive=true;
  const isFinal=gs.act5Wave>=8;
  const sides=isFinal?[0,1,2,3]: // all 4 sides on wave 8
    [Math.floor(Math.random()*4)]; // random single side for waves 1-7, no repeat
  gs.act5WaveSides=sides;
  const perSide=isFinal?8:5+gs.act5Wave*2;
  gs.act5WaveEnemyCount=perSide*sides.length;
  floatTexts.push(new FloatText(C.width/2,C.height*.38,isFinal?'ALL SIDES — FINAL WAVE':`WAVE ${gs.act5Wave} / 8`,'#cc88ff',24));
  sfx.boss();
  sides.forEach(side=>{
    for(let i=0;i<perSide;i++){
      setTimeout(()=>{
        if(gs.state!=='playing'||gs.act!==5)return;
        const e=new FractureEnemy(gs.act5Wave);
        // Force spawn from specific side
        const m=40;
        if(side===0){e.x=rnd(0,C.width);e.y=-m;}
        else if(side===1){e.x=C.width+m;e.y=rnd(0,C.height);}
        else if(side===2){e.x=rnd(0,C.width);e.y=C.height+m;}
        else{e.x=-m;e.y=rnd(0,C.height);}
        const a=Math.atan2(P.y-e.y,P.x-e.x)+rnd(-.2,.2);
        const sp=lerp(1.2,3.8,Math.min((gs.act5Wave-1)/7,1));
        e.vx=Math.cos(a)*sp;e.vy=Math.sin(a)*sp;
        gs.enemies.push(e);
      },i*150+sides.indexOf(side)*300);
    }
  });
}
function updateAct5(){
  P.px=P.x;P.py=P.y;P.x=lerp(P.x,mx,.11);P.y=lerp(P.y,my,.11);P.vx=P.x-P.px;P.vy=P.y-P.py;

    }

    // Player-enemy collision

      }else{

        setTimeout(startAct5Wave,2200);
      }
    }
  }else if(gs.act5Phase==='boss'){
    const boss=gs.originBoss;

    }

    gs.bullets=gs.bullets.filter(b=>b.alive);
    // Boss shots hurt player
    if(!P.inv){if(!gs.voidShots)gs.voidShots=[];gs.voidShots.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<-30||b.x>C.width+30||b.y<-30||b.y>C.height+30)b.alive=false;});gs.voidShots=gs.voidShots.filter(b=>b.alive);for(const b of gs.voidShots){if(dist(P,b)<P.r+b.r){gs.lives--;sfx.hit();P.inv=true;P.invTime=130;burst(P.x,P.y,'#ff0044',12,2,5,2,4);b.alive=false;if(gs.lives<=0)killPlayer(5);break;}}}
    // Player bullets vs boss weak points
    for(const b of gs.bullets){
      if(b.alive&&boss.hitWeak(b.x,b.y)){b.alive=false;const killed=boss.hit(5);burst(b.x,b.y,'#ffffff',6,1,3,1,2.5,8,18);
        if(killed){burst(boss.x,boss.y,'#ff0044',100,3,16,3,12,60,200);burst(boss.x,boss.y,'#ffffff',60,5,14,3,10,80,200);sfx.boss();sfx.death();}}

  }

  ];

function drawTrail(c){
  const trail=P.trail;if(trail.length<2)return;
  const tid=UNLOCKED?selTrail:'classic';
  if(tid==='classic'){
    for(let i=0;i<trail.length;i++){
      const f=i/trail.length,tc=(gs.combo>=15&&gs.act===1)?`hsl(${(gs.frame*3+i*12)%360},100%,65%)`:c;
      ctx.save();ctx.globalAlpha=f*.38;ctx.fillStyle=tc;ctx.shadowBlur=6;ctx.shadowColor=tc;ctx.beginPath();ctx.arc(trail[i].x,trail[i].y,Math.max(0.1,P.r*f*.75),0,tau);ctx.fill();ctx.restore();
    }
  }else if(tid==='crystal'){
    for(let i=1;i<trail.length;i++){
      const f=i/trail.length,t=trail[i],sz=P.r*f*.6,ro=i*.26+gs.frame*.015;
      ctx.save();ctx.globalAlpha=f*.45;ctx.translate(t.x,t.y);ctx.rotate(ro);ctx.strokeStyle=c;ctx.lineWidth=1.2;ctx.shadowBlur=8;ctx.shadowColor=c;
      ctx.beginPath();ctx.moveTo(0,-sz);ctx.lineTo(sz*.6,0);ctx.lineTo(0,sz);ctx.lineTo(-sz*.6,0);ctx.closePath();ctx.stroke();ctx.restore();
    }
  }else if(tid==='plasma'){
    ctx.save();ctx.shadowBlur=18;ctx.shadowColor=c;ctx.strokeStyle=c;ctx.lineWidth=2;ctx.globalAlpha=.7;ctx.beginPath();
    trail.forEach((t,i)=>{const jt=i/trail.length>.2?Math.sin(gs.frame*.3+i*1.7)*5*(1-i/trail.length):0;i===0?ctx.moveTo(t.x+jt,t.y):ctx.lineTo(t.x+jt,t.y);});
    ctx.stroke();ctx.restore();
  }else if(tid==='void'){
    for(let i=0;i<trail.length;i++){
      const f=i/trail.length,t=trail[i];ctx.save();ctx.globalAlpha=f*.5;ctx.fillStyle=`rgba(0,0,20,${f*.8})`;ctx.shadowBlur=12;ctx.shadowColor='rgba(0,0,80,.5)';ctx.beginPath();ctx.arc(t.x,t.y,Math.max(0.1,P.r*f*.9),0,tau);ctx.fill();ctx.restore();
    }
  }else if(tid==='aurora'){
    if(trail.length>=4){
      [[P.r*2.5,.08],[P.r*1.5,.14],[P.r*.7,.22]].forEach(([lw,al])=>{
        ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.lineCap='round';ctx.shadowBlur=20;ctx.shadowColor=c;ctx.beginPath();ctx.moveTo(trail[0].x,trail[0].y);
        for(let i=1;i<trail.length-1;i++)ctx.quadraticCurveTo(trail[i].x,trail[i].y,(trail[i].x+trail[i+1].x)/2,(trail[i].y+trail[i+1].y)/2);
        ctx.stroke();ctx.restore();
      });
    }
  }else{
    for(let i=1;i<trail.length;i++){
      const f=i/trail.length,t=trail[i],pv=trail[i-1],ddx=t.x-pv.x,ddy=t.y-pv.y,len=Math.hypot(ddx,ddy)||1;
      ctx.save();ctx.translate(t.x,t.y);ctx.rotate(Math.atan2(ddy,ddx));ctx.globalAlpha=f*.5;ctx.fillStyle=c;ctx.shadowBlur=8;ctx.shadowColor=c;
      ctx.beginPath();ctx.ellipse(0,0,Math.max(len*3,4),P.r*f*.4,0,0,tau);ctx.fill();ctx.restore();
    }
  }
}
function drawPlayer(){

function showActCinematic(fromAct,toAct){

  gs.cinematicParticles=[];fadeOutMusic(1200);

}
function drawCinematic(){
  const f=gs.cinematicFrame,from=gs.cinematicFrom,to=gs.cinematicTo;
  const cx=C.width/2,cy=C.height/2,dur=600; // 10s at 60fps
  gs.cinematicFrame++;
  // Safety: if from/to pair unrecognised, don't sit on black — jump to act
  const validPairs=[[1,2],[2,3],[3,4],[4,5]];
  if(!validPairs.some(([a,b])=>a===from&&b===to)){
    if(!gs.cinematicDone){gs.cinematicDone=true;setTimeout(()=>{gs.cinematicDone=false;playMusic(to||2);initAct(to||2);},100);}
    drawBG();return;
  }
  gs.cinematicOrbX=lerp(gs.cinematicOrbX,cx,.04);
  gs.cinematicOrbY=lerp(gs.cinematicOrbY,cy,.04);

  if(from===1&&to===2){
    // ── 1→2: Orb shatters, darkness floods in, dark orb breathes ────────────
    ctx.fillStyle='#000';ctx.fillRect(0,0,C.width,C.height);
    const phase=f/dur;
    if(phase<.25){
      // Orb glowing bright then shatters
      const intense=phase/.25;
      ctx.save();ctx.shadowBlur=80*intense;ctx.shadowColor='#fff';ctx.fillStyle='#fff';
      ctx.globalAlpha=intense;ctx.beginPath();ctx.arc(cx,cy,P.r*(1+intense*3),0,tau);ctx.fill();ctx.restore();
      if(phase>.15&&gs.frame%2===0){
        const a=rnd(0,tau),sp=rnd(4,12);
        gs.cinematicParticles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:rnd(30,80),maxLife:80,color:'#ffffff',size:rnd(2,5)});
      }
    }else if(phase<.55){
      // Particles fly outward, darkness blooms
      const dp=(phase-.25)/.3;
      ctx.save();ctx.fillStyle=`rgba(0,0,0,${dp*.9})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();
    }else if(phase<.85){
      // Dark orb materializes, breathes
      const bp=(phase-.55)/.3,breathe=Math.sin(f*.08)*4;
      ctx.save();ctx.shadowBlur=30+breathe*3;ctx.shadowColor='#223';ctx.fillStyle='#111130';
      ctx.globalAlpha=bp;ctx.beginPath();ctx.arc(cx,cy,P.r+breathe,0,tau);ctx.fill();
      ctx.strokeStyle='rgba(50,50,80,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(cx,cy,P.r*2+breathe*2,0,tau);ctx.stroke();
      ctx.restore();
    }else{
      // White void bleeds in from edges, title fades
      const wp=(phase-.85)/.15;
      ctx.save();ctx.fillStyle=`rgba(238,238,255,${wp*.85})`;ctx.fillRect(0,0,C.width,C.height);
      const ta=Math.max(0,wp-.5)/.5;ctx.globalAlpha=ta;ctx.textAlign='center';ctx.font=`900 ${Math.min(C.width*.1,48)}px 'Orbitron'`;ctx.fillStyle='rgba(0,0,40,.7)';ctx.shadowBlur=0;ctx.fillText('THE OTHER SIDE',cx,cy+8);ctx.font=`400 11px 'Share Tech Mono'`;ctx.fillStyle='rgba(0,0,40,.45)';ctx.fillText('you are the dark now',cx,cy+32);ctx.restore();
    }
    // Particle system
    gs.cinematicParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life--;const a=p.life/p.maxLife;ctx.save();ctx.globalAlpha=a*.8;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.1,p.size*a),0,tau);ctx.fill();ctx.restore();});
    gs.cinematicParticles=gs.cinematicParticles.filter(p=>p.life>0);

  }else if(from===2&&to===3){

      gs.cinematicParticles.push({x:rnd(0,C.width),y:-20,vx:rnd(-1.5,1.5),vy:rnd(2,5),rot:rnd(0,tau),rotS:rnd(-.08,.08),life:Math.floor(C.height/3),maxLife:Math.floor(C.height/3),color:col,size:rnd(4,14),type:'debris'});

      const a=Math.min(p.life/p.maxLife*3,1);

      ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.shadowBlur=8;ctx.shadowColor=p.color;

    });

    // Orb in center — weapon arc materializes around it

        ctx.beginPath();ctx.arc(cx,cy,P.r+22,aimA-arcSpan/2,aimA+arcSpan/2);ctx.stroke();

        ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx+Math.cos(aimA)*(P.r+28),cy+Math.sin(aimA)*(P.r+28),Math.max(.1,3*ap),0,tau);ctx.fill();
        // Fire a test shot upward during cinematic
        if(f===Math.floor(dur*.65)&&ap>.8){
          for(let i=0;i<5;i++)gs.cinematicParticles.push({x:cx,y:cy-P.r-22,vx:rnd(-.5,.5),vy:rnd(-6,-3),life:40,maxLife:40,color:c,size:3,rot:0,rotS:0,type:'shot'});

        }
      }

    }

      ctx.font=`900 ${Math.min(C.width*.1,48)}px 'Orbitron'`;ctx.fillStyle='#44aaff';ctx.shadowBlur=30;ctx.shadowColor='#44aaff';ctx.fillText('FRACTURE',cx,cy+C.height*.3);
      ctx.font=`400 11px 'Share Tech Mono'`;ctx.fillStyle='rgba(100,200,255,.6)';ctx.shadowBlur=0;ctx.fillText('the weapon is yours now',cx,cy+C.height*.3+28);ctx.restore();

    // Phase 1: silence — just debris and dim hero (0-0.25)

    if(phase>.25){
      const sp=Math.min((phase-.25)/.15,1);

      ctx.save();ctx.globalAlpha=sp*.95;ctx.shadowBlur=40*sp;ctx.shadowColor='#fff';ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,starY,starSize,0,tau);ctx.fill();

    ctx.restore();

    const lines=[
      {t:.12,txt:'This is a surprise.',y:C.height*.48},
      {t:.28,txt:'No matter.',y:C.height*.56},
      {t:.44,txt:'THE VOID CANNOT BE STOPPED.',y:C.height*.64},
    ];
    lines.forEach(line=>{
      if(phase>line.t){

    }

  const holdExtra=(from===2&&to===3)?180:0;
  if(f>=dur+holdExtra&&!gs.cinematicDone){
    gs.cinematicDone=true;
    setTimeout(()=>{ gs.cinematicDone=false; playMusic(gs.cinematicTo); initAct(gs.cinematicTo); },100);
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);gs.frame++;
  if(gs.state==='title'){drawTitle();return;}
  if(gs.state==='skins'){drawSkins();return;}
  if(gs.state==='dead'){drawDeath();return;}
  if(gs.state==='victory'){drawVictory();return;}
  if(gs.state==='cinematic'){drawCinematic();return;}
  if(gs.state==='epochCard'){
    if(gs.act===1||gs.act===5){renderAct1();}
    else if(gs.act===3){drawAct3();}
    else if(gs.act===4){drawAct4();}
    drawEpochCard();drawOverlays();return;
  }
  if(gs.state==='actCard'){drawActCard();return;}
  if(gs.state==='dissolution'){
    updateDissolution();
    P.x=lerp(P.x,mx,.11);P.y=lerp(P.y,my,.11);P.trail.push({x:P.x,y:P.y});if(P.trail.length>24)P.trail.shift();
    drawDissolution();drawHUD();return;
  }
  if(gs.act===1){
    if(gs.hitStop>0){gs.hitStop--;renderAct1();drawHUD();return;}
    updateAct1();renderAct1();drawHUD();drawOverlays();
  }else if(gs.act===2){updateAct2();drawAct2();drawHUD();}
  else if(gs.act===3){updateAct3();drawAct3();drawHUD();}
  else if(gs.act===4){updateAct4();drawAct4();drawHUD();}
  else if(gs.act===5){
    if(gs.hitStop>0){gs.hitStop--;drawAct5();drawHUD();return;}
    updateAct5();drawAct5();drawHUD();drawOverlays();
  }
}

// ── DISSOLUTION ───────────────────────────────────────────────────────────────
function initDissolution(){
  gs.dissolveActive=true;gs.dissProgress=0;gs.state='dissolution';stopDrone();fadeOutMusic(3500);
  gs.tearPoints=[];gs.dissFlash=1; // white flash on trigger
  [[0,0],[C.width,0],[0,C.height],[C.width,C.height]].forEach(([ox,oy])=>{
    const pts=[];for(let i=0;i<8;i++)pts.push({dx:rnd(-180,180),dy:rnd(-180,180)});
    gs.tearPoints.push({pts,ox,oy});
  });
  // Give each obstacle a shake velocity and a fall direction
  obstacles.forEach(o=>{
    o.dissShakeX=rnd(-8,8);o.dissShakeY=rnd(-8,8);
    const a=Math.atan2(o.y-C.height/2,o.x-C.width/2)+rnd(-.4,.4);
    o.dissFallVX=Math.cos(a)*rnd(2,5);o.dissFallVY=Math.sin(a)*rnd(2,5);
    o.dissRotSpd=rnd(.08,.22)*(Math.random()<.5?1:-1);
    o.dissDelay=rnd(0,.25); // stagger the falls slightly
  });
}
function updateDissolution(){
  gs.dissProgress=Math.min(1,gs.dissProgress+1/1800); // 30s total
  gs.dissFlash=Math.max(0,(gs.dissFlash||0)-.06);
  // Update shaking/falling enemies — they react to the world breaking
  obstacles.forEach(o=>{
    if(!o.alive)return;
    const p=gs.dissProgress;
    if(p>o.dissDelay){
      const fp=(p-o.dissDelay)/.6;
      // Shake phase: violent jitter early
      if(fp<.3){o.x+=Math.sin(gs.frame*.4+o.rot)*8*(1-fp/.3)*rnd(.5,1.5);o.y+=Math.cos(gs.frame*.35+o.rot)*8*(1-fp/.3)*rnd(.5,1.5);}
      // Fall phase: drift off screen
      if(fp>.15){const fall=Math.min((fp-.15)/.6,1);o.x+=o.dissFallVX*fall*2;o.y+=o.dissFallVY*fall*2;o.rot+=o.dissRotSpd*fall;}
      // Particle trail as they fall
      if(fp>.25&&gs.frame%6===0)burst(o.x,o.y,o.color,3,.5,2.5,1,2,10,20);
      // Mark dead once off screen
      if(o.x<-200||o.x>C.width+200||o.y<-200||o.y>C.height+200)o.alive=false;
    }
  });
  if(gs.dissProgress>=1){
    gs.actLog.push({act:1,frames:gs.playFrames,score:gs.score,label:`${gs.score.toLocaleString()} pts`});
    gs.totalScore+=gs.score;gs.dissolveActive=false;showActCinematic(1,2);
  }
}
function drawDissolution(){
  renderAct1();
  // White flash on trigger — tells player something just happened
  if(gs.dissFlash>0){ctx.save();ctx.fillStyle=`rgba(255,255,255,${gs.dissFlash})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}

    ctx.fillStyle='#fff';ctx.shadowBlur=28;ctx.shadowColor=E().player;

  }

    const np=Math.min((gs.dissProgress-.42)/.35,1);ctx.save();ctx.globalAlpha=np*.38;
    for(let i=0;i<180;i++){const nx=rnd(0,C.width),ny=rnd(0,C.height),ns=rnd(1,4);ctx.fillStyle=Math.random()<.5?'#fff':'#000';ctx.fillRect(nx,ny,ns,ns);}

  }

    for(let y=0;y<C.height;y+=3){ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,y,C.width,1);}ctx.restore();
  }

    }

}

const MAX_OBS=20;
function spawnAct1(){
  const e=E();let sr=e.spawnRate;if(gs.bossWave)sr=Math.ceil(sr/2);
  const on=obstacles.filter(o=>o.alive).length;if(on>=MAX_OBS)return;
  if(gs.frame%sr===0)obstacles.push(new Obstacle());
  if(gs.epoch>=3&&gs.frame%(e.spawnRate*3)===0&&on<MAX_OBS-2)obstacles.push(new Obstacle());
  if(gs.epoch>=5&&gs.frame%(e.spawnRate*4)===0&&on<MAX_OBS-4)obstacles.push(new Obstacle());
  const mxS=10+gs.epoch*2;
  if(gs.frame%20===0&&shards.filter(s=>!s.collected&&!s.dead).length<mxS)shards.push(new Shard());
  // Emergency spawn: never let screen drop below 4 shards
  if(gs.frame%30===0&&shards.filter(s=>!s.collected&&!s.dead).length<4){for(let i=0;i<4;i++)shards.push(new Shard());}
  if(gs.frame%1200===600){for(let i=0;i<14;i++)shards.push(new Shard());sfx.surge();gs.gridPulse=.8;floatTexts.push(new FloatText(C.width/2,C.height*.38,'SURGE!',E().shard,32));}
  if(gs.frame%1350===675&&Math.random()<.66)powerups.push(new PowerUp());
  if(gs.epoch>=3&&gs.frame%1200===600&&Math.random()<.4){const pu=new PowerUp();pu.type='life';pu.color=PU_CFG.life.color;pu.label=PU_CFG.life.label;powerups.push(pu);} // bonus life in hard epochs
  if(!gs.bossWave&&!gs.bossCalm&&gs.score>=gs.nextBossAt&&gs.score>0){

    floatTexts.push(new FloatText(C.width/2,C.height*.32,'WAVE PROTOCOL',E().obstacle,26));sfx.boss();gs.gridPulse=1.0;
  }
  if(gs.bossWave){gs.bossTime--;if(gs.bossTime<=0){gs.bossWave=false;gs.bossCalm=220;floatTexts.push(new FloatText(C.width/2,C.height*.38,'PROTOCOL ENDED',E().shard,18));}}
  if(gs.bossCalm>0)gs.bossCalm--;
}
function collideAct1(){
  // Obstacle collision only when not invincible
  if(!P.inv){
    if(gs.nearCooldown>0)gs.nearCooldown--;
    for(const o of obstacles){
      if(!o.alive)continue;const d=dist(P,o)-o.hitR;
      if(d<gs.closestCall)gs.closestCall=d;
      if(d<14&&d>0&&gs.nearCooldown===0){gs.nearMisses++;gs.nearCooldown=30;gs.gridPulse=Math.max(gs.gridPulse,.65);}
      if(d<=0){
        gs.lives--;gs.combo=0;const ddx=P.x-o.x,ddy=P.y-o.y,dl=Math.hypot(ddx,ddy)||1;
        gs.shake={x:ddx/dl*12,y:ddy/dl*12};gs.hitStop=3;P.inv=true;P.invTime=115;
        burst(P.x,P.y,'#ff2255',22,2,7,2,5);sfx.hit();if(navigator.vibrate)navigator.vibrate([80,20,40]);
        if(gs.lives<=0)killPlayer(1);break;
      }
    }
  }
  // Shards + powerups always collectable (shield doesn't block these)
  for(const s of shards){
    if(s.collected||s.dead)continue;
    if(dist(P,s)<(gs.magnet?P.r+s.r+90:P.r+s.r+18)){
      s.collected=true;gs.combo++;gs.shardsCollected++;if(gs.combo>gs.maxCombo)gs.maxCombo=gs.combo;
      const mult=Math.floor(gs.combo/5)+1,pts=10*mult;gs.score+=pts;
      burst(s.x,s.y,E().shard,9,1,3.5,1.5,3,14,30);sfx.collect(gs.combo);if(navigator.vibrate)navigator.vibrate(18);
      if(mult>1)floatTexts.push(new FloatText(s.x,s.y-22,`×${mult}`,E().shard,18));
      if([10,25,50,100].includes(gs.combo)){gs.flash=.55;gs.gridPulse=.8;sfx.milestone();floatTexts.push(new FloatText(C.width/2,C.height*.38,`COMBO ${gs.combo}!`,pColor(),30));}
      let ne=0;for(let ei=EPOCHS.length-1;ei>=0;ei--){if(gs.score>=EPOCHS[ei].threshold){ne=ei;break;}}
      if(ne>gs.epoch){gs.epoch=ne;gs.transAlpha=.88;obstacles=[];sfx.epoch();gs.gridPulse=1.0;updateDrone(gs.epoch);showEpochCard(ne);}
    }
  }
  for(const pu of powerups){if(!pu.dead&&dist(P,pu)<P.r+pu.r+16){pu.dead=true;activatePU(pu.type);}}
}
function activatePU(type){
  sfx.powerup();gs.powerupsUsed++;
  if(type==='nova'){
    gs.novaRing={r:0,x:P.x,y:P.y,maxR:Math.max(C.width,C.height)*1.3};sfx.nova();
    obstacles.forEach(o=>{burst(Math.max(0,Math.min(C.width,o.x)),Math.max(0,Math.min(C.height,o.y)),E().obstacle,12,2,6,1.5,4,22,50);o.alive=false;});
    gs.score+=50;gs.flash=.4;gs.gridPulse=1.0;camZoom=.88;floatTexts.push(new FloatText(C.width/2,C.height*.38,'NOVA!','#ff6600',30));
  }else if(type==='shield'){gs.shield=true;gs.shieldTime=480;P.inv=true;P.invTime=480;floatTexts.push(new FloatText(C.width/2,C.height*.38,'SHIELD!','#00ffff',28));}
  else if(type==='life'){gs.lives=Math.min(5,gs.lives+1);sfx.milestone();gs.flash=.3;floatTexts.push(new FloatText(C.width/2,C.height*.38,`+1 LIFE  (${gs.lives})✦`,'#ff88ff',26));}
  else{gs.magnet=true;gs.magnetTime=380;floatTexts.push(new FloatText(C.width/2,C.height*.38,'MAGNET!','#ffaa00',28));}
}
function drawEdgeIndicators(){
  const pad=22;obstacles.forEach(o=>{
    if(o.x>0&&o.x<C.width&&o.y>0&&o.y<C.height)return;
    const ex=Math.max(pad,Math.min(C.width-pad,o.x<0?pad:o.x>C.width?C.width-pad:o.x));
    const ey=Math.max(pad,Math.min(C.height-pad,o.y<0?pad:o.y>C.height?C.height-pad:o.y));
    ctx.save();ctx.translate(ex,ey);ctx.rotate(Math.atan2(o.vy,o.vx));ctx.globalAlpha=.4+Math.sin(gs.frame*.12)*.3;
    ctx.fillStyle=o.color;ctx.shadowBlur=8;ctx.shadowColor=o.color;ctx.beginPath();ctx.moveTo(7,0);ctx.lineTo(-5,-4);ctx.lineTo(-5,4);ctx.closePath();ctx.fill();ctx.restore();
  });
}
function drawNovaRing(){
  if(!gs.novaRing)return;const nr=gs.novaRing;nr.r+=26;
  if(nr.r>nr.maxR){gs.novaRing=null;return;}
  const al=(1-nr.r/nr.maxR)*.85;ctx.save();ctx.strokeStyle='#ff6600';ctx.lineWidth=3.5;ctx.globalAlpha=al;ctx.shadowBlur=35;ctx.shadowColor='#ff8800';ctx.beginPath();ctx.arc(nr.x,nr.y,nr.r,0,tau);ctx.stroke();ctx.restore();
}
function drawVignette(){
  if(gs.lives===1){const g=ctx.createRadialGradient(C.width/2,C.height/2,C.height*.28,C.width/2,C.height/2,C.height*.88);g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(170,0,0,${.18+Math.sin(gs.frame*.055)*.12})`);ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
  if(gs.combo>=20){const pc=pColor();const al=Math.min((gs.combo-20)/70,.26);const g=ctx.createRadialGradient(C.width/2,C.height/2,C.height*.28,C.width/2,C.height/2,C.height*.88);g.addColorStop(0,'transparent');g.addColorStop(1,pc.startsWith('#')?`rgba(${parseInt(pc.slice(1,3),16)},${parseInt(pc.slice(3,5),16)},${parseInt(pc.slice(5,7),16)},${al})`:pc.replace(')',`,${al})`).replace('hsl(','hsla('));ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
}

mx=C.width/2;my=C.height/2;
loop();
