function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}

function tone(freq,endFreq,type,vol,dur,delay=0){
  if(!AC)return;try{
    const o=AC.createOscillator(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='lowpass';f.frequency.value=5000;o.connect(f);f.connect(g);g.connect(AC.destination);
    const t=AC.currentTime+delay;o.type=type;o.frequency.setValueAtTime(freq,t);
    if(endFreq)o.frequency.exponentialRampToValueAtTime(Math.max(endFreq,10),t+dur);
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}

let musicAudio=null,musicFadeTimer=null,musicCurrentAct=0;

function playMusic(actNum){
  const url=MUSIC[actNum];
  if(!url||actNum===musicCurrentAct)return;
  musicCurrentAct=actNum;
  const oldAudio=musicAudio;
  const newAudio=new Audio(url);
  newAudio.loop=true;newAudio.volume=0;
  newAudio.play().catch(()=>{}); // mobile: may need user gesture
  musicAudio=newAudio;
  // Crossfade over 1.5 seconds
  const dur=1500,start=Date.now(),fromVol=oldAudio?oldAudio.volume:0;
  if(musicFadeTimer)clearInterval(musicFadeTimer);
  musicFadeTimer=setInterval(()=>{
    const t=Math.min((Date.now()-start)/dur,1);
    newAudio.volume=t*0.45;
    if(oldAudio)oldAudio.volume=fromVol*(1-t);
    if(t>=1){
      clearInterval(musicFadeTimer);musicFadeTimer=null;
      if(oldAudio){oldAudio.pause();oldAudio.src='';}
    }
  },16);
}

function fadeOutMusic(durMs=2000){
  if(!musicAudio)return;
  const audio=musicAudio,start=Date.now(),fromVol=audio.volume;
  musicCurrentAct=0;
  const iv=setInterval(()=>{
    const t=Math.min((Date.now()-start)/durMs,1);
    audio.volume=fromVol*(1-t);
    if(t>=1){clearInterval(iv);audio.pause();if(musicAudio===audio)musicAudio=null;}
  },16);
}

function stopMusic(){
  if(musicAudio){musicAudio.pause();musicAudio.src='';musicAudio=null;}
  if(musicFadeTimer){clearInterval(musicFadeTimer);musicFadeTimer=null;}
  musicCurrentAct=0;
}

const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rnd=(a,b)=>Math.random()*(b-a)+a;
const tau=Math.PI*2;
const E=()=>EPOCHS[Math.min(gs.epoch,5)];
const GLITCH='!@#$%^&*><[]{}|\\/?~`';
function glitchStr(s,n){return s.split('').map(c=>Math.random()<n?GLITCH[Math.floor(Math.random()*GLITCH.length)]:c).join('');}
function pColor(){
  if(gs.act===2)return'#111130';

  if(o.color==='CYCLE')return`hsl(${gs.frame*2%360},100%,65%)`;
  return o.color;
}
function poly(sides,r,x=0,y=0,rot=0){
  ctx.beginPath();
  for(let i=0;i<=sides;i++){const a=tau/sides*i+rot;i?ctx.lineTo(Math.cos(a)*r+x,Math.sin(a)*r+y):ctx.moveTo(Math.cos(a)*r+x,Math.sin(a)*r+y);}
  ctx.closePath();ctx.stroke();
}
function fmtTime(f){const s=Math.floor(f/60),m=Math.floor(s/60);return`${m}:${String(s%60).padStart(2,'0')}`;}

let stars=[];
function initStars(){
  stars=[];
  [[90,.7,.012],[55,1.3,.028],[22,2.1,.055]].forEach(([n,sz,par])=>{
    for(let i=0;i<n;i++)stars.push({x:rnd(0,C.width),y:rnd(0,C.height),sz,par,tw:rnd(0,tau),tws:rnd(.02,.05)});
  });
}
initStars();
function drawStars(inv=false){
  const dx=P.x-C.width/2,dy=P.y-C.height/2;
  stars.forEach(s=>{
    s.tw+=s.tws;
    const sx=((s.x-dx*s.par)%C.width+C.width)%C.width;
    const sy=((s.y-dy*s.par)%C.height+C.height)%C.height;
    ctx.save();ctx.globalAlpha=(.15+Math.sin(s.tw)*.13)*(inv?.55:1);ctx.fillStyle=inv?'rgba(0,0,60,.9)':'#fff';
    ctx.beginPath();ctx.arc(sx,sy,s.sz,0,tau);ctx.fill();ctx.restore();
  });
}

let bgC={r:2,g:4,b:10};
function drawBG(){
  let tr,tg,tb;
  if(gs.act===2){tr=238;tg=238;tb=255;}
  else if(gs.act===3){tr=4;tg=2;tb=8;}
  else if(gs.act===4){tr=2;tg=8;tb=14;}
  else{const e=E();[tr,tg,tb]=e.bgRGB;}
  bgC.r=lerp(bgC.r,tr,.015);bgC.g=lerp(bgC.g,tg,.015);bgC.b=lerp(bgC.b,tb,.015);
  ctx.fillStyle=`rgb(${bgC.r|0},${bgC.g|0},${bgC.b|0})`;ctx.fillRect(0,0,C.width,C.height);
  if(gs.act!==3){
    ctx.save();
    ctx.strokeStyle=gs.act===2?`rgba(0,0,80,${.015+gs.gridPulse*.05})`:`rgba(255,255,255,${.02+gs.gridPulse*.09})`;
    ctx.lineWidth=1;const sz=55,ox=(gs.frame*.22)%sz,oy=(gs.frame*.14)%sz;
    for(let x=ox-sz;x<C.width+sz;x+=sz){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,C.height);ctx.stroke();}
    for(let y=oy-sz;y<C.height+sz;y+=sz){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(C.width,y);ctx.stroke();}
    ctx.restore();gs.gridPulse*=.96;
  }
  if(gs.bossWave){ctx.save();ctx.fillStyle=`rgba(220,0,0,${.07+Math.sin(gs.frame*.04)*.04})`;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
}

class Particle{
  constructor(x,y,vx,vy,color,size,life,glow=8){Object.assign(this,{x,y,vx,vy,color,size,life,maxLife:life,glow});}
  update(){this.x+=this.vx;this.y+=this.vy;this.vx*=.93;this.vy*=.93;this.life--;}
  draw(){
    const a=this.life/this.maxLife;if(a<=0||this.size<=0)return;
    ctx.save();ctx.globalAlpha=a*.9;ctx.shadowBlur=this.glow;ctx.shadowColor=this.color;
    ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,Math.max(0.1,this.size*a),0,tau);ctx.fill();ctx.restore();
  }
}
function burst(x,y,color,n=12,sMin=1,sMax=5,szMin=1.5,szMax=4,lMin=20,lMax=45){
  for(let i=0;i<n;i++){const a=rnd(0,tau),s=rnd(sMin,sMax);particles.push(new Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,color,rnd(szMin,szMax),rnd(lMin,lMax)));}
}
class FloatText{
  constructor(x,y,text,color,size=22){Object.assign(this,{x,y,text,color,size,vy:-1.3,life:65,maxLife:65});}
  update(){this.y+=this.vy;this.vy*=.97;this.life--;}
  draw(){
    const a=this.life/this.maxLife;ctx.save();ctx.globalAlpha=a;ctx.font=`700 ${this.size}px 'Orbitron'`;
    ctx.fillStyle=this.color;ctx.shadowBlur=14;ctx.shadowColor=this.color;ctx.textAlign='center';ctx.fillText(this.text,this.x,this.y);ctx.restore();
  }
}
// ── ACT 1 ENTITIES ────────────────────────────────────────────────────────────
class Shard{
  constructor(){
    const a=rnd(0,tau),d=Math.min(C.width,C.height)*rnd(.15,.42);
    this.x=C.width/2+Math.cos(a)*d;this.y=C.height/2+Math.sin(a)*d;
    this.angle=a;this.dist=d;this.speed=rnd(.003,.008)*(Math.random()>.5?1:-1);
    this.r=rnd(4.5,8);this.pulse=rnd(0,tau);this.collected=false;this.dead=false;
  }
  update(){
    this.pulse+=.065;
    if(!this.collected){
      if(gs.magnet){
        const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
        const spd=Math.min(6,100/d),sp=Math.max(0,(d-30)/180)*3;
        this.x+=dx/d*spd+(-dy/d)*sp;this.y+=dy/d*spd+(dx/d)*sp;
      }else{this.angle+=this.speed;this.x=C.width/2+Math.cos(this.angle)*this.dist;this.y=C.height/2+Math.sin(this.angle)*this.dist;}
    }else{this.x=lerp(this.x,P.x,.25);this.y=lerp(this.y,P.y,.25);if(dist(this,P)<8)this.dead=true;}
  }
  draw(){
    const c=E().shard,pr=this.r+Math.sin(this.pulse)*2;
    ctx.save();ctx.shadowBlur=22;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(this.x,this.y,pr*.35,0,tau);ctx.fill();ctx.restore();
  }
}
const OTYPES=['ring','triangle','hex','dart','cross','cluster'];
class Obstacle{
  constructor(){
    const av=Math.min(gs.epoch+2,OTYPES.length);
    this.type=OTYPES[Math.floor(Math.random()*av)];
    const side=Math.floor(Math.random()*4),m=80;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    // 70% of obstacles aim near player, 30% aim toward center for variety
    const usePlayer=Math.random()<0.7;
    const tx=(usePlayer?P.x:C.width/2)+rnd(-120,120);
    const ty=(usePlayer?P.y:C.height/2)+rnd(-120,120);
    const a=Math.atan2(ty-this.y,tx-this.x),sp=rnd(1.8,3.2)*E().speed;
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.r=rnd(18,32);this.rot=0;this.rotS=rnd(-.04,.04);
    this.alive=true;this.age=0;this.homing=this.type==='dart'&&gs.epoch>=2;this.color=E().obstacle;
  }
  update(){
    this.age++;
    if(this.homing&&this.age>40){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1,h=.025*E().speed;
      this.vx=lerp(this.vx,dx/d*3.5*E().speed,h);this.vy=lerp(this.vy,dy/d*3.5*E().speed,h);
    }
    // All obstacles drift toward player position (not just homing darts)
    // Increases with epoch so early game is forgiving, late game punishes standing still
    if(!this.homing&&this.age>60&&gs.epoch>=1){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
      const drift=0.004*gs.epoch; // 0 in void, ramps up per epoch
      this.vx+=dx/d*drift;this.vy+=dy/d*drift;
      // Cap speed so they don't rocket
      const spd=Math.hypot(this.vx,this.vy),maxSpd=E().speed*3.5;
      if(spd>maxSpd){this.vx=this.vx/spd*maxSpd;this.vy=this.vy/spd*maxSpd;}
    }
    this.x+=this.vx;this.y+=this.vy;this.rot+=this.rotS;
    if(this.x<-300||this.x>C.width+300||this.y<-300||this.y>C.height+300){
      if(this.alive)burst(Math.max(0,Math.min(C.width,this.x)),Math.max(0,Math.min(C.height,this.y)),this.color,4,.5,2.5,1,2.5,12,25);
      this.alive=false;
    }
  }
  draw(){
    const fi=Math.min(this.age/25,1),r=this.r,pd=dist(P,this),prx=Math.max(0,1-pd/220);
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.globalAlpha=fi;ctx.strokeStyle=this.color;ctx.lineWidth=2.5+prx*2.5;ctx.shadowBlur=22+prx*30;ctx.shadowColor=this.color;
    if(this.type==='ring'){ctx.beginPath();ctx.arc(0,0,r,0,tau);ctx.stroke();ctx.beginPath();ctx.arc(0,0,r*.55,0,tau);ctx.stroke();}
    else if(this.type==='triangle'){poly(3,r);}else if(this.type==='hex'){poly(6,r);}
    else if(this.type==='dart'){
      ctx.beginPath();ctx.moveTo(0,-r*1.6);ctx.lineTo(r*.55,0);ctx.lineTo(0,r*.8);ctx.lineTo(-r*.55,0);ctx.closePath();ctx.stroke();
      if(this.homing&&pd<240){
        ctx.save();ctx.strokeStyle=`rgba(255,50,50,${(240-pd)/240*.55})`;ctx.lineWidth=1;ctx.setLineDash([3,3]);
        const dl=Math.hypot(P.x-this.x,P.y-this.y)||1;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo((P.x-this.x)/dl*Math.min(pd,70),(P.y-this.y)/dl*Math.min(pd,70));ctx.stroke();ctx.setLineDash([]);ctx.restore();
      }
    }
    else if(this.type==='cross'){const l=r*1.2,w=r*.3;ctx.beginPath();ctx.rect(-w,-l,w*2,l*2);ctx.stroke();ctx.beginPath();ctx.rect(-l,-w,l*2,w*2);ctx.stroke();}
    else{for(let i=0;i<3;i++){const a2=tau/3*i+this.rot*2;ctx.beginPath();ctx.arc(Math.cos(a2)*r*.7,Math.sin(a2)*r*.7,r*.33,0,tau);ctx.stroke();}}
    ctx.restore();
  }
  get hitR(){return this.r*.72;}
}
const PU_CFG={nova:{color:'#ff6600',label:'NOVA'},shield:{color:'#00ffff',label:'SHIELD'},magnet:{color:'#ffaa00',label:'MAGNET'},life:{color:'#ff88ff',label:'+LIFE'}};
class PowerUp{
  constructor(){
    this.type=['nova','shield','magnet','magnet','magnet','life'][Math.floor(Math.random()*6)];
    const a=rnd(0,tau),d=rnd(80,Math.min(C.width,C.height)*.38);
    this.x=C.width/2+Math.cos(a)*d;this.y=C.height/2+Math.sin(a)*d;
    this.angle=a;this.dist=d;this.r=11;this.pulse=rnd(0,tau);this.dead=false;this.life=700;
    this.color=PU_CFG[this.type].color;this.label=PU_CFG[this.type].label;
  }
  update(){
    this.pulse+=.055;this.life--;if(this.life<=0)this.dead=true;
    this.angle+=.003;this.x=C.width/2+Math.cos(this.angle)*this.dist;this.y=C.height/2+Math.sin(this.angle)*this.dist;
  }
  draw(){
    const al=Math.min(this.life/60,1),pr=this.r+Math.sin(this.pulse)*3;
    ctx.save();ctx.globalAlpha=al;ctx.strokeStyle=this.color;ctx.lineWidth=2.2;ctx.shadowBlur=28;ctx.shadowColor=this.color;
    if(this.type==='nova'){ctx.beginPath();for(let i=0;i<8;i++){const a2=tau/8*i-tau/16,r2=i%2===0?pr*1.6:pr*.6;ctx.lineTo(Math.cos(a2)*r2+this.x,Math.sin(a2)*r2+this.y);}ctx.closePath();ctx.stroke();}
    else if(this.type==='shield'){poly(6,pr,this.x,this.y,this.pulse*.18);}
    else if(this.type==='life'){ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.stroke();ctx.beginPath();ctx.arc(this.x,this.y,pr*.5,0,tau);ctx.stroke();}
    else{ctx.beginPath();ctx.moveTo(this.x,this.y-pr*1.5);ctx.lineTo(this.x+pr,this.y);ctx.lineTo(this.x,this.y+pr*1.5);ctx.lineTo(this.x-pr,this.y);ctx.closePath();ctx.stroke();}
    ctx.font=`700 9px 'Share Tech Mono'`;ctx.fillStyle=this.color;ctx.textAlign='center';ctx.shadowBlur=6;ctx.fillText(this.label,this.x,this.y+pr+17);ctx.restore();
  }
}

// ── ACT 2 ENTITIES — WRAITHS ──────────────────────────────────────────────────
class Wraith{
  constructor(intensity){
    // Start from a random screen edge
    const side=Math.floor(Math.random()*4);
    const m=60;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    // Long arcing path toward and past center with drift
    const cx=C.width/2+rnd(-C.width*.25,C.width*.25);
    const cy=C.height/2+rnd(-C.height*.25,C.height*.25);
    const a=Math.atan2(cy-this.y,cx-this.x);
    const sp=rnd(0.55,1.2)*(1+intensity*.8);
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.vx+=rnd(-.18,.18);this.vy+=rnd(-.18,.18);
    this.r=rnd(18,36);this.alive=true;this.age=0;
    this.trail=[];this.maxTrail=120;
    this.hue=rnd(160,280);
    this.color=`hsl(${this.hue|0},60%,72%)`;
    this.pulse=rnd(0,tau);
  }
  update(){
    this.age++;this.pulse+=.04;
    // Gentle drift — wraiths don't turn, just float
    this.vx+=rnd(-.012,.012);this.vy+=rnd(-.012,.012);
    this.x+=this.vx;this.y+=this.vy;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>this.maxTrail)this.trail.shift();
    if(this.x<-200||this.x>C.width+200||this.y<-200||this.y>C.height+200)this.alive=false;
  }
  draw(){
    const fi=Math.min(this.age/40,1);
    // Draw lingering trail
    if(this.trail.length>1){
      for(let i=1;i<this.trail.length;i++){
        const f=i/this.trail.length;
        ctx.save();ctx.globalAlpha=f*.22*fi;
        ctx.strokeStyle=this.color;ctx.lineWidth=this.r*f*.6;
        ctx.shadowBlur=12;ctx.shadowColor=this.color;
        ctx.beginPath();ctx.moveTo(this.trail[i-1].x,this.trail[i-1].y);ctx.lineTo(this.trail[i].x,this.trail[i].y);ctx.stroke();ctx.restore();
      }
    }
    // Body
    const pr=this.r*(1+Math.sin(this.pulse)*.15);
    ctx.save();ctx.globalAlpha=fi*.72;
    ctx.shadowBlur=35;ctx.shadowColor=this.color;ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,pr,0,tau);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.arc(this.x,this.y,pr*.3,0,tau);ctx.fill();
    ctx.restore();
  }
  get hitR(){return this.r*.85;}
}

class MemoryFragment{

    this.x=rnd(C.width*.1,C.width*.9);this.y=rnd(C.height*.1,C.height*.9);
    this.r=6;this.pulse=rnd(0,tau);this.life=rnd(200,380)|0;this.maxLife=this.life;this.dead=false;
  }

  draw(){
    const al=(this.life/this.maxLife)*(Math.sin(this.pulse)*.3+.7);
    ctx.save();ctx.globalAlpha=al*.8;ctx.fillStyle='rgba(200,200,255,.9)';
    ctx.shadowBlur=18;ctx.shadowColor='#aaaaff';
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.r+Math.sin(this.pulse)*2),0,tau);ctx.fill();ctx.restore();
  }
}

// ── ACT 3 ENTITIES — WAVE SHOOTER ────────────────────────────────────────────
class Enemy{
  constructor(wave){
    const side=Math.floor(Math.random()*4),m=40;
    if(side===0){this.x=rnd(0,C.width);this.y=-m;}
    else if(side===1){this.x=C.width+m;this.y=rnd(0,C.height);}
    else if(side===2){this.x=rnd(0,C.width);this.y=C.height+m;}
    else{this.x=-m;this.y=rnd(0,C.height);}
    this.wave=wave;
    const sp=lerp(0.9,3.2,Math.min((wave-1)/7,1));
    const a=Math.atan2(P.y-this.y,P.x-this.x)+rnd(-.25,.25);
    this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.baseSpd=sp;
    // Types: drifter, tracker, heavy, splitter, boss
    const roll=Math.random();
    if(wave>=8){this.type='boss';this.hp=60;this.r=55;this.phase=0;this.phaseTimer=0;}
    else if(wave>=6&&roll<.15){this.type='splitter';this.hp=2;this.r=16;}
    else if(wave>=4&&roll<.25){this.type='heavy';this.hp=5;this.r=22;}
    else if(wave>=3&&roll<.35){this.type='tracker';this.hp=2;this.r=13;}
    else{this.type='drifter';this.hp=1;this.r=11;}
    this.maxHp=this.hp;this.alive=true;this.age=0;this.rot=0;this.rotS=rnd(-.06,.06);
    this.color=this.type==='boss'?'#ff0044':this.type==='heavy'?'#ff6600':this.type==='splitter'?'#ff00ff':this.type==='tracker'?'#00ffcc':'#4488ff';
    this.dodgeTimer=0;this.flashTimer=0;
  }
  update(){
    this.age++;this.rot+=this.rotS;this.flashTimer=Math.max(0,this.flashTimer-1);
    if(this.type==='boss'){
      this.phaseTimer++;
      // Boss orbits center and fires at player
      this.rot+=.008;
      const tx=C.width/2+Math.cos(this.rot*2)*C.width*.28;
      const ty=C.height/2+Math.sin(this.rot*2)*C.height*.22;
      this.vx=lerp(this.vx,(tx-this.x)*.04,.08);this.vy=lerp(this.vy,(ty-this.y)*.04,.08);
      // Phase transitions
      if(this.phaseTimer>600&&this.phase<3){this.phase++;this.phaseTimer=0;floatTexts.push(new FloatText(C.width/2,C.height*.3,['','PHASE II','PHASE III','FINAL PHASE'][this.phase],this.color,24));}
    }else if(this.type==='tracker'&&this.age%50===0){
      const a=Math.atan2(P.y-this.y,P.x-this.x);
      this.vx=Math.cos(a)*this.baseSpd;this.vy=Math.sin(a)*this.baseSpd;
    }else if(this.type==='drifter'||this.type==='splitter'){
      // Drift toward player with slight homing
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
      this.vx+=dx/d*.04;this.vy+=dy/d*.04;
      const spd=Math.hypot(this.vx,this.vy);
      if(spd>this.baseSpd*1.5){this.vx=this.vx/spd*this.baseSpd*1.5;this.vy=this.vy/spd*this.baseSpd*1.5;}
    }else if(this.type==='heavy'){
      const dx=P.x-this.x,dy=P.y-this.y,d=Math.hypot(dx,dy)||1;
      this.vx+=dx/d*.025;this.vy+=dy/d*.025;
      const spd=Math.hypot(this.vx,this.vy);
      if(spd>this.baseSpd){this.vx=this.vx/spd*this.baseSpd;this.vy=this.vy/spd*this.baseSpd;}
    }
    this.x+=this.vx;this.y+=this.vy;
    if(this.type!=='boss'&&(this.x<-100||this.x>C.width+100||this.y<-100||this.y>C.height+100))this.alive=false;
  }
  draw(){
    const fi=Math.min(this.age/20,1);
    ctx.save();ctx.globalAlpha=fi;ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    const flashC=this.flashTimer>0?'#fff':this.color;
    ctx.strokeStyle=flashC;ctx.lineWidth=this.type==='boss'?3:2;ctx.shadowBlur=this.type==='boss'?40:14;ctx.shadowColor=flashC;
    if(this.type==='drifter'){ctx.beginPath();ctx.arc(0,0,this.r,0,tau);ctx.stroke();}
    else if(this.type==='tracker'){poly(3,this.r);}
    else if(this.type==='heavy'){poly(6,this.r);ctx.beginPath();ctx.arc(0,0,this.r*.45,0,tau);ctx.stroke();}
    else if(this.type==='splitter'){poly(4,this.r);}
    else if(this.type==='boss'){
      // Multi-ring composite boss
      [1,.72,.44].forEach((s,i)=>{ctx.save();ctx.rotate(this.rot*(i%2===0?1:-1));poly(3+i*2,this.r*s);ctx.restore();});
      // Health bar
      ctx.save();ctx.rotate(-this.rot);
      const hw=this.r*2,hx=-hw/2,hy=this.r+10;
      ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(hx,hy,hw,5);
      ctx.fillStyle=this.color;ctx.fillRect(hx,hy,hw*(this.hp/this.maxHp),5);
      ctx.restore();
      // Phase glow
      const phaseColors=['#ff0044','#ff8800','#ff00ff','#ffffff'];
      ctx.shadowBlur=60+Math.sin(gs.frame*.08)*20;ctx.shadowColor=phaseColors[this.phase];
    }
    ctx.restore();
  }
  hit(){
    this.hp--;this.flashTimer=6;
    if(this.hp<=0){this.alive=false;return true;}
    return false;
  }
  get hitR(){return this.type==='boss'?this.r*.6:this.r*.75;}
}
class Bullet{
  constructor(x,y,tx,ty){
    const a=Math.atan2(ty-y,tx-x),sp=11;
    this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
    this.alive=true;this.r=4;this.color=pColor();this.age=0;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.age++;if(this.x<-20||this.x>C.width+20||this.y<-20||this.y>C.height+20)this.alive=false;}
  draw(){ctx.save();ctx.fillStyle=this.color;ctx.shadowBlur=14;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,tau);ctx.fill();ctx.restore();}
}

// ── ACT 4 ENTITIES — PULSE ────────────────────────────────────────────────────
class PulseShard{
  constructor(angle,dist,patternIdx){
    this.angle=angle;this.dist=dist;this.patternIdx=patternIdx;
    this.x=C.width/2+Math.cos(angle)*dist;this.y=C.height/2+Math.sin(angle)*dist;
    this.r=8;this.pulse=rnd(0,tau);this.collected=false;this.dead=false;
    this.spawnF=gs.frame;this.windowOpen=true; // only collectible during exhale window
  }
  update(){
    this.pulse+=.07;
    if(!this.windowOpen&&!this.collected)this.dead=true; // vanish on next inhale
    if(this.collected){this.r=lerp(this.r,0,.18);if(this.r<.3)this.dead=true;}
  }
  draw(){
    if(this.collected)return;
    const al=this.windowOpen?.9:.2;
    ctx.save();ctx.globalAlpha=al;ctx.shadowBlur=22;ctx.shadowColor='#44ffaa';ctx.fillStyle='#88ffdd';
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.r+Math.sin(this.pulse)*2),0,tau);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(this.x,this.y,this.r*.3,0,tau);ctx.fill();
    ctx.restore();
  }
}
class PulseObstacle{
  constructor(beatNum){
    this.angle=rnd(0,tau);
    this.orbit=rnd(C.width*.15,C.width*.42);
    this.x=C.width/2+Math.cos(this.angle)*this.orbit;this.y=C.height/2+Math.sin(this.angle)*this.orbit;
    this.speed=rnd(.006,.014)*(Math.random()<.5?1:-1)*(1+beatNum*.05);
    this.r=rnd(14,22);this.rot=0;this.rotS=rnd(-.025,.025);this.age=0;
    this.type=['ring','tri','hex'][Math.floor(Math.random()*3)];
    this.beatSync=Math.random()<.5; // moves ONLY on beat pulses for extra challenge
    this.orbiting=true;
  }
  update(onBeat){
    this.age++;this.rot+=this.rotS;
    if(!this.beatSync||onBeat){
      this.angle+=this.speed;
      this.orbit=Math.max(C.width*.09,this.orbit-.05); // slowly spiral inward
    }
    this.x=C.width/2+Math.cos(this.angle)*this.orbit;this.y=C.height/2+Math.sin(this.angle)*this.orbit;
  }
  draw(){
    const fi=Math.min(this.age/40,1),pd=dist(P,this),prx=Math.max(0,1-pd/200);
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.globalAlpha=fi;
    ctx.strokeStyle='#225544';ctx.lineWidth=1.8+prx*2.5;ctx.shadowBlur=14+prx*25;ctx.shadowColor='#44ffaa';
    if(this.type==='ring'){ctx.beginPath();ctx.arc(0,0,this.r,0,tau);ctx.stroke();}
    else if(this.type==='tri'){poly(3,this.r);}
    else{poly(6,this.r);}
    ctx.restore();
  }
  get hitR(){return this.r*.68;}
}

// ── ACT 5 ENTITIES — THE ORIGIN (FINAL BOSS) ─────────────────────────────────
class GhostEcho{
  constructor(data,offset=0){
    this.data=data;this.frame=offset%Math.max(1,data.length);
    const p=data[this.frame]||{x:C.width/2,y:C.height/2,sw:C.width,sh:C.height};
    this.x=p.x*(C.width/(p.sw||C.width));this.y=p.y*(C.height/(p.sh||C.height));
    this.trail=[];this.alpha=0;
  }
  update(){
    this.frame=(this.frame+1)%Math.max(1,this.data.length);
    const p=this.data[this.frame];
    if(p){this.x=p.x*(C.width/(p.sw||C.width));this.y=p.y*(C.height/(p.sh||C.height));}
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>12)this.trail.shift();
    this.alpha=Math.min(this.alpha+.007,.28);
  }
  draw(){
    const c=pColor();
    this.trail.forEach((t,i)=>{ctx.save();ctx.globalAlpha=Math.max(0,i/this.trail.length*this.alpha*.5);ctx.fillStyle=c;ctx.beginPath();ctx.arc(t.x,t.y,Math.max(.1,P.r*(i/this.trail.length)*.6),0,tau);ctx.fill();ctx.restore();});
    ctx.save();ctx.globalAlpha=this.alpha;ctx.shadowBlur=16;ctx.shadowColor=c;ctx.fillStyle=c;ctx.beginPath();ctx.arc(this.x,this.y,P.r*.7,0,tau);ctx.fill();ctx.restore();
  }
  get hitR(){return P.r*.65;}
}
class TheOrigin{
  constructor(){
    this.x=C.width/2;this.y=C.height*.28;
    this.r=70;this.rot=0;this.alive=true;
    this.phase=0; // 0-3
    this.hp=[80,60,50,40];this.maxHp=[80,60,50,40];
    this.phaseHp=this.hp[0];this.phaseMaxHp=this.maxHp[0];
    this.weakOpen=false;this.weakTimer=0;this.weakAngle=0;
    this.attackTimer=0;this.flashTimer=0;
    this.pulseRings=[];this.laserSweep=null;this.gravPull=0;
    this.age=0;
  }
  get color(){return['#ff2255','#ff8800','#cc00ff','#ffffff'][this.phase];}
  update(){
    this.age++;this.rot+=.005+this.phase*.003;this.flashTimer=Math.max(0,this.flashTimer-1);
    this.attackTimer++;
    // Orbit slowly
    this.x=lerp(this.x,C.width/2+Math.sin(this.age*.008)*C.width*.18,.025);
    this.y=lerp(this.y,C.height*.3+Math.cos(this.age*.006)*C.height*.1,.025);
    // Weak window cycles
    if(this.weakOpen){this.weakTimer--;if(this.weakTimer<=0){this.weakOpen=false;this.weakTimer=0;}}
    // Attack patterns per phase
    const atk=180-this.phase*30;
    if(this.attackTimer>=atk){
      this.attackTimer=0;
      if(this.phase===0){
        // Ring burst
        for(let i=0;i<6;i++){const a=tau/6*i+this.rot;gs.act5Projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*2.2,vy:Math.sin(a)*2.2,r:8,life:160,type:'ring',color:this.color});}
        this.weakOpen=true;this.weakTimer=90;this.weakAngle=rnd(0,tau);
      }else if(this.phase===1){
        // Laser sweep
        gs.act5Projectiles.push({x:this.x,y:this.y,angle:Math.atan2(P.y-this.y,P.x-this.x),sweepDir:Math.random()<.5?1:-1,sweepSpeed:.028,length:C.width*.8,thickness:14,life:120,type:'laser',color:this.color});
        this.weakOpen=true;this.weakTimer=70;this.weakAngle=rnd(0,tau);
      }else if(this.phase===2){
        // Gravity pull + spiral shots
        this.gravPull=120;
        for(let i=0;i<8;i++){const a=tau/8*i;gs.act5Projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*1.8,vy:Math.sin(a)*1.8,r:7,life:200,type:'spiral',spiralV:.04,color:this.color});}
        this.weakOpen=true;this.weakTimer=80;this.weakAngle=rnd(0,tau);
      }else{
        // Phase 4: erratic burst pattern
        for(let i=0;i<12;i++){const a=rnd(0,tau);gs.act5Projectiles.push({x:this.x,y:this.y,vx:Math.cos(a)*rnd(1.5,4),vy:Math.sin(a)*rnd(1.5,4),r:6,life:180,type:'ring',color:this.color});}
        this.weakOpen=true;this.weakTimer=60;this.weakAngle=Math.atan2(P.y-this.y,P.x-this.x);
      }
    }
    if(this.gravPull>0){
      this.gravPull--;
      const dx=this.x-P.x,dy=this.y-P.y,d=Math.hypot(dx,dy)||1;
      if(d>this.r+P.r+20){P.x+=dx/d*.55;P.y+=dy/d*.55;}
    }
  }
  hit(){
    if(!this.weakOpen)return false;
    this.phaseHp--;this.flashTimer=8;
    if(this.phaseHp<=0){
      if(this.phase<3){
        this.phase++;this.phaseHp=this.hp[this.phase];this.phaseMaxHp=this.maxHp[this.phase];
        this.weakOpen=false;this.attackTimer=0;this.gravPull=0;
        burst(this.x,this.y,this.color,40,3,12,2,8,40,100);sfx.boss();
        floatTexts.push(new FloatText(C.width/2,C.height*.4,['','PHASE II','PHASE III','FINAL PHASE'][this.phase],this.color,28));
        return false;
      }else{
        this.alive=false;return true; // dead
      }
    }
    return false;
  }
  draw(){
    const fi=Math.min(this.age/40,1);
    ctx.save();ctx.globalAlpha=fi;ctx.translate(this.x,this.y);
    // Multi-layer composite body
    const rings=[{n:3,s:1,extra:0},{n:5,s:.75,extra:this.rot*1.5},{n:6,s:.52,extra:-this.rot*2},{n:4,s:.34,extra:this.rot*3}];
    rings.forEach((rl,ri)=>{
      ctx.save();ctx.rotate(this.rot*(ri%2===0?1:-1)+rl.extra);

    });
    // Weak point
    if(this.weakOpen){
      const wx=Math.cos(this.weakAngle)*this.r*.6,wy=Math.sin(this.weakAngle)*this.r*.6;
      ctx.save();ctx.shadowBlur=30;ctx.shadowColor='#fff';ctx.fillStyle='#fff';
      ctx.globalAlpha=.7+Math.sin(gs.frame*.15)*.3;ctx.beginPath();ctx.arc(wx,wy,9,0,tau);ctx.fill();ctx.restore();
    }
    // Phase health bar
    ctx.save();ctx.rotate(-this.rot);
    const hw=this.r*2.2,hx=-hw/2,hy=this.r+16;
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(hx,hy,hw,6);
    ctx.fillStyle=this.color;ctx.shadowBlur=8;ctx.shadowColor=this.color;
    ctx.fillRect(hx,hy,hw*(this.phaseHp/this.phaseMaxHp),6);
    ctx.font=`400 8px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.45)';ctx.textAlign='center';
    ctx.fillText(['VOID','LIGHT','WEIGHT','BREATH'][this.phase],0,hy+16);
    ctx.restore();
    ctx.restore();
  }
}

// ── ACT 4 LOGIC — PULSE ──────────────────────────────────────────────────────
function hudAct4(){
  ctx.save();ctx.font=`700 16px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.7)';ctx.textAlign='center';ctx.shadowBlur=8;ctx.shadowColor='#44ffaa';
  ctx.fillText(`BEAT ${gs.beatCount||0}`,C.width/2,36);ctx.restore();
  ctx.save();ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.22)';ctx.textAlign='center';
  ctx.fillText(`PERFECT ×${gs.beatPerfect||0}`,C.width/2,52);ctx.restore();
  for(let li=0;li<gs.lives;li++){ctx.save();ctx.fillStyle='#44ffaa';ctx.shadowBlur=6;ctx.shadowColor='#44ffaa';ctx.beginPath();ctx.arc(22+li*14,36,5,0,tau);ctx.fill();ctx.restore();}
  ctx.save();ctx.font=`400 9px 'Share Tech Mono'`;ctx.fillStyle='rgba(255,255,255,.25)';ctx.textAlign='right';ctx.fillText(`score ${gs.totalScore.toLocaleString()}`,C.width-22,C.height-18);ctx.textAlign='left';ctx.restore();
}
function updateAct4(){
  P.px=P.x;P.py=P.y;P.x=lerp(P.x,mx,.08);P.y=lerp(P.y,my,.08);
  P.trail.push({x:P.x,y:P.y});if(P.trail.length>14)P.trail.shift();
  if(P.inv){P.invTime--;if(P.invTime<=0)P.inv=false;}
  if(!gs.beatCount)gs.beatCount=0;if(!gs.beatPerfect)gs.beatPerfect=0;
  // Pulse engine: BPM ramps from 40 to 72 over the act
  const progress=Math.min((gs.beatCount||0)/80,1);
  const bpm=lerp(40,72,progress);
  const beatInterval=Math.round(3600/bpm);
  // Detect beat
  const onBeat=gs.frame%beatInterval===0;
  const exhaleStart=gs.frame%beatInterval;
  const exhaleLen=Math.round(beatInterval*.55); // 55% of each cycle is "exhale" (safe to collect)
  const isExhale=exhaleStart<exhaleLen;
  const beatFraction=exhaleStart/beatInterval; // 0-1 within current beat
  if(onBeat){
    gs.beatCount++;
    gs.beatPulseRing={r:0,maxR:Math.max(C.width,C.height)*.85,born:gs.frame};
    // Close windows on inhale
    if(gs.act4Shards)gs.act4Shards.forEach(s=>{s.windowOpen=isExhale;});
    // Spawn new constellation every 5 beats
    if(gs.beatCount%5===1){spawnPulseConstellation(progress);}
    // Spawn obstacles every 3 beats after beat 3
    if(gs.beatCount>3&&gs.beatCount%3===0&&(!gs.act4Obstacles||gs.act4Obstacles.length<6+Math.floor(progress*8))){
      if(!gs.act4Obstacles)gs.act4Obstacles=[];
      gs.act4Obstacles.push(new PulseObstacle(gs.beatCount));
    }
    sfx.collect(1);
  }
  if(!gs.act4Shards)gs.act4Shards=[];
  if(!gs.act4Obstacles)gs.act4Obstacles=[];
  gs.act4Shards.forEach(s=>{s.windowOpen=isExhale;s.update();});
  gs.act4Shards=gs.act4Shards.filter(s=>!s.dead);
  gs.act4Obstacles.forEach(o=>o.update(onBeat));
  particles.forEach(p=>p.update());particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(t=>t.update());floatTexts=floatTexts.filter(t=>t.life>0);
  // Collect pulse shards
  if(isExhale){
    gs.act4Shards.filter(s=>!s.collected).forEach(s=>{
      if(dist(P,s)<P.r+s.r+10){
        s.collected=true;const perfect=beatFraction<.3||beatFraction>.8;
        const pts=perfect?80:30;gs.totalScore+=pts;
        if(perfect)gs.beatPerfect++;
        sfx.collect(gs.beatPerfect);burst(s.x,s.y,'#44ffaa',8,1,3,1.5,3,10,22);
        if(perfect)floatTexts.push(new FloatText(s.x,s.y-22,'PERFECT','#44ffaa',16));
      }
    });
  }
  // Obstacle collision
  if(!P.inv){
    for(const o of gs.act4Obstacles){
      if(dist(P,o)<P.r+o.hitR){
        gs.lives--;sfx.hit();P.inv=true;P.invTime=100;
        burst(P.x,P.y,'#44ffaa',10,1,4,1.5,3,12,28);if(navigator.vibrate)navigator.vibrate([60,20,40]);
        if(gs.lives<=0)killPlayer(4);break;
      }
    }
  }
  // Win at beat 80
  if((gs.beatCount||0)>=80){
    gs.actLog.push({act:4,frames:gs.frame,score:gs.totalScore,label:`${gs.beatCount} beats survived`});
    showActCinematic(4,5);
  }
  if(gs.frame%3===0&&gs.runRecording.length<8000)gs.runRecording.push({x:Math.round(P.x),y:Math.round(P.y),sw:C.width,sh:C.height});
}
function spawnPulseConstellation(progress){
  const count=Math.floor(lerp(4,8,progress));
  const cx=C.width*rnd(.2,.8),cy=C.height*rnd(.2,.8);
  for(let i=0;i<count;i++){
    const a=tau/count*i,d=rnd(50,110);
    if(!gs.act4Shards)gs.act4Shards=[];
    gs.act4Shards.push(new PulseShard(a,0,i));
    const s=gs.act4Shards[gs.act4Shards.length-1];
    s.x=cx+Math.cos(a)*d;s.y=cy+Math.sin(a)*d;
  }
}
function drawAct4(){
  drawBG();drawStars();
  // Draw pulse ring
  if(gs.beatPulseRing){
    const pr=gs.beatPulseRing;const age=gs.frame-pr.born;const prog=age/25;
    if(prog<1){ctx.save();ctx.strokeStyle='rgba(68,255,170,.45)';ctx.lineWidth=3;ctx.shadowBlur=18;ctx.shadowColor='#44ffaa';ctx.globalAlpha=1-prog;ctx.beginPath();ctx.arc(C.width/2,C.height/2,pr.maxR*prog,0,tau);ctx.stroke();ctx.restore();}
    else{gs.beatPulseRing=null;}
  }
  if(gs.act4Obstacles)gs.act4Obstacles.forEach(o=>o.draw());
  if(gs.act4Shards)gs.act4Shards.forEach(s=>s.draw());
  particles.forEach(p=>p.draw());drawPlayer();
  floatTexts.forEach(t=>t.draw());
}

// ── ACT 5 LOGIC — THE ORIGIN ──────────────────────────────────────────────────
function hudAct5(){

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);gs.frame++;
  if(gs.state==='title'){drawTitle();return;}
  if(gs.state==='skins'){drawSkins();return;}
  if(gs.state==='dead'){drawDeath();return;}
  if(gs.state==='victory'){drawVictory();return;}
  if(gs.state==='cinematic'){drawCinematic();return;}
  if(gs.state==='epochCard'){
    if(gs.act===1||gs.act===5){renderAct1();}
    else if(gs.act===3){drawAct3();}
    else if(gs.act===4){drawAct4();}
    drawEpochCard();drawOverlays();return;
  }
  if(gs.state==='actCard'){drawActCard();return;}
  if(gs.state==='dissolution'){
    updateDissolution();
    P.x=lerp(P.x,mx,.11);P.y=lerp(P.y,my,.11);P.trail.push({x:P.x,y:P.y});if(P.trail.length>24)P.trail.shift();
    drawDissolution();drawHUD();return;
  }
  if(gs.act===1){
    if(gs.hitStop>0){gs.hitStop--;renderAct1();drawHUD();return;}
    updateAct1();renderAct1();drawHUD();drawOverlays();
  }else if(gs.act===2){updateAct2();drawAct2();drawHUD();}
  else if(gs.act===3){updateAct3();drawAct3();drawHUD();}
  else if(gs.act===4){updateAct4();drawAct4();drawHUD();}
  else if(gs.act===5){
    if(gs.hitStop>0){gs.hitStop--;drawAct5();drawHUD();return;}
    updateAct5();drawAct5();drawHUD();drawOverlays();
  }
}

const MAX_OBS=20;

  if(gs.epoch>=5&&gs.frame%(e.spawnRate*4)===0&&on<MAX_OBS-4)obstacles.push(new Obstacle());
  const mxS=10+gs.epoch*2;
  if(gs.frame%20===0&&shards.filter(s=>!s.collected&&!s.dead).length<mxS)shards.push(new Shard());
  // Emergency spawn: never let screen drop below 4 shards
  if(gs.frame%30===0&&shards.filter(s=>!s.collected&&!s.dead).length<4){for(let i=0;i<4;i++)shards.push(new Shard());}
  if(gs.frame%1200===600){for(let i=0;i<14;i++)shards.push(new Shard());sfx.surge();gs.gridPulse=.8;floatTexts.push(new FloatText(C.width/2,C.height*.38,'SURGE!',E().shard,32));}

  }

function collideAct1(){

      if(!o.alive)continue;const d=dist(P,o)-o.hitR;

      if(d<=0){
        gs.lives--;gs.combo=0;const ddx=P.x-o.x,ddy=P.y-o.y,dl=Math.hypot(ddx,ddy)||1;
        gs.shake={x:ddx/dl*12,y:ddy/dl*12};gs.hitStop=3;P.inv=true;P.invTime=115;
        burst(P.x,P.y,'#ff2255',22,2,7,2,5);sfx.hit();if(navigator.vibrate)navigator.vibrate([80,20,40]);
        if(gs.lives<=0)killPlayer(1);break;
      }
    }
  }
  // Shards + powerups always collectable (shield doesn't block these)
  for(const s of shards){
    if(s.collected||s.dead)continue;
    if(dist(P,s)<(gs.magnet?P.r+s.r+90:P.r+s.r+18)){
      s.collected=true;gs.combo++;gs.shardsCollected++;if(gs.combo>gs.maxCombo)gs.maxCombo=gs.combo;
      const mult=Math.floor(gs.combo/5)+1,pts=10*mult;gs.score+=pts;
      burst(s.x,s.y,E().shard,9,1,3.5,1.5,3,14,30);sfx.collect(gs.combo);if(navigator.vibrate)navigator.vibrate(18);
      if(mult>1)floatTexts.push(new FloatText(s.x,s.y-22,`×${mult}`,E().shard,18));
      if([10,25,50,100].includes(gs.combo)){gs.flash=.55;gs.gridPulse=.8;sfx.milestone();floatTexts.push(new FloatText(C.width/2,C.height*.38,`COMBO ${gs.combo}!`,pColor(),30));}
      let ne=0;for(let ei=EPOCHS.length-1;ei>=0;ei--){if(gs.score>=EPOCHS[ei].threshold){ne=ei;break;}}
      if(ne>gs.epoch){gs.epoch=ne;gs.transAlpha=.88;obstacles=[];sfx.epoch();gs.gridPulse=1.0;updateDrone(gs.epoch);showEpochCard(ne);}
    }
  }
  for(const pu of powerups){if(!pu.dead&&dist(P,pu)<P.r+pu.r+16){pu.dead=true;activatePU(pu.type);}}
}
function activatePU(type){
  sfx.powerup();gs.powerupsUsed++;
  if(type==='nova'){
    gs.novaRing={r:0,x:P.x,y:P.y,maxR:Math.max(C.width,C.height)*1.3};sfx.nova();
    obstacles.forEach(o=>{burst(Math.max(0,Math.min(C.width,o.x)),Math.max(0,Math.min(C.height,o.y)),E().obstacle,12,2,6,1.5,4,22,50);o.alive=false;});
    gs.score+=50;gs.flash=.4;gs.gridPulse=1.0;camZoom=.88;floatTexts.push(new FloatText(C.width/2,C.height*.38,'NOVA!','#ff6600',30));
  }else if(type==='shield'){gs.shield=true;gs.shieldTime=480;P.inv=true;P.invTime=480;floatTexts.push(new FloatText(C.width/2,C.height*.38,'SHIELD!','#00ffff',28));}
  else if(type==='life'){gs.lives=Math.min(5,gs.lives+1);sfx.milestone();gs.flash=.3;floatTexts.push(new FloatText(C.width/2,C.height*.38,`+1 LIFE  (${gs.lives})✦`,'#ff88ff',26));}
  else{gs.magnet=true;gs.magnetTime=380;floatTexts.push(new FloatText(C.width/2,C.height*.38,'MAGNET!','#ffaa00',28));}
}
function drawEdgeIndicators(){
  const pad=22;obstacles.forEach(o=>{
    if(o.x>0&&o.x<C.width&&o.y>0&&o.y<C.height)return;
    const ex=Math.max(pad,Math.min(C.width-pad,o.x<0?pad:o.x>C.width?C.width-pad:o.x));
    const ey=Math.max(pad,Math.min(C.height-pad,o.y<0?pad:o.y>C.height?C.height-pad:o.y));
    ctx.save();ctx.translate(ex,ey);ctx.rotate(Math.atan2(o.vy,o.vx));ctx.globalAlpha=.4+Math.sin(gs.frame*.12)*.3;
    ctx.fillStyle=o.color;ctx.shadowBlur=8;ctx.shadowColor=o.color;ctx.beginPath();ctx.moveTo(7,0);ctx.lineTo(-5,-4);ctx.lineTo(-5,4);ctx.closePath();ctx.fill();ctx.restore();
  });
}
function drawNovaRing(){
  if(!gs.novaRing)return;const nr=gs.novaRing;nr.r+=26;
  if(nr.r>nr.maxR){gs.novaRing=null;return;}
  const al=(1-nr.r/nr.maxR)*.85;ctx.save();ctx.strokeStyle='#ff6600';ctx.lineWidth=3.5;ctx.globalAlpha=al;ctx.shadowBlur=35;ctx.shadowColor='#ff8800';ctx.beginPath();ctx.arc(nr.x,nr.y,nr.r,0,tau);ctx.stroke();ctx.restore();
}
function drawVignette(){
  if(gs.lives===1){const g=ctx.createRadialGradient(C.width/2,C.height/2,C.height*.28,C.width/2,C.height/2,C.height*.88);g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(170,0,0,${.18+Math.sin(gs.frame*.055)*.12})`);ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
  if(gs.combo>=20){const pc=pColor(),r=parseInt(pc.slice(1,3),16),gv=parseInt(pc.slice(3,5),16),b=parseInt(pc.slice(5,7),16);const g=ctx.createRadialGradient(C.width/2,C.height/2,C.height*.28,C.width/2,C.height/2,C.height*.88);g.addColorStop(0,'transparent');g.addColorStop(1,`rgba(${r},${gv},${b},${Math.min((gs.combo-20)/70,.26)})`);ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,C.width,C.height);ctx.restore();}
}

mx=C.width/2;my=C.height/2;
