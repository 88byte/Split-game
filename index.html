<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Split Games</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#05060a;
  --purple:rgba(180,80,255,1);
  --purpleD:rgba(180,80,255,.08);
  --cyan:rgba(0,220,255,1);
  --cyanD:rgba(0,220,255,.08);
  --gold:#c8a850;
  --dim:rgba(255,255,255,.3);
  --dim2:rgba(255,255,255,.12);
}
html,body{
  width:100%;min-height:100vh;
  background:var(--bg);
  color:#fff;
  font-family:'Cormorant Garamond',Georgia,serif;
  overflow-x:hidden;
}

/* ── STARS ─────────────────────────────────────── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:var(--lo,.05);}50%{opacity:var(--hi,.25);}}

/* ── LAYOUT ─────────────────────────────────────── */
.shell{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 80px;
}

/* ── HEADER ─────────────────────────────────────── */
header{
  width:100%;max-width:900px;
  display:flex;align-items:center;justify-content:center;
  padding:52px 0 24px;
  flex-direction:column;
  gap:10px;
}
.studio-eyebrow{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:8px;text-transform:uppercase;
  color:var(--dim);
  animation:fadeUp .8s ease both;
}
.studio-name{
  font-family:'Cinzel',serif;
  font-size:clamp(22px,5vw,38px);
  font-weight:700;
  letter-spacing:10px;
  text-transform:uppercase;
  color:#fff;
  animation:fadeUp .8s .1s ease both;
}
.studio-rule{
  width:1px;height:40px;
  background:linear-gradient(to bottom,transparent,var(--dim2),transparent);
  margin-top:8px;
  animation:fadeUp .8s .2s ease both;
}
.studio-tagline{
  font-style:italic;
  font-size:13px;
  color:var(--dim);
  letter-spacing:2px;
  animation:fadeUp .8s .3s ease both;
}

/* ── GAMES GRID ─────────────────────────────────── */
.games{
  width:100%;max-width:900px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:52px;
}

/* ── GAME CARD ──────────────────────────────────── */
.game-card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  aspect-ratio:9/14;
  cursor:pointer;
  text-decoration:none;
  display:block;
  animation:fadeUp .9s ease both;
}
.game-card:nth-child(2){animation-delay:.15s;}

/* Card border glow */
.game-card::before{
  content:'';
  position:absolute;inset:0;
  border-radius:20px;
  padding:1px;
  background:var(--card-border,linear-gradient(135deg,rgba(180,80,255,.4),rgba(180,80,255,.08),rgba(180,80,255,.3)));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
  transition:opacity .3s;
}
.game-card:hover::before{opacity:1.5;}

/* Card inner */
.card-inner{
  width:100%;height:100%;
  background:var(--card-bg,rgba(20,10,35,.9));
  border-radius:20px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:28px 24px;
  position:relative;
  overflow:hidden;
  transition:transform .4s cubic-bezier(.2,.8,.2,1);
}
.game-card:hover .card-inner{transform:scale(1.015);}

/* Card background image area */
.card-img{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:24px 24px 100px;
}
.card-img img{
  width:100%;height:100%;
  object-fit:contain;
  transition:transform .5s cubic-bezier(.2,.8,.2,1),opacity .4s;
  opacity:.92;
}
.game-card:hover .card-img img{transform:scale(1.04);opacity:1;}

/* Gradient overlay at bottom */
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,
    var(--overlay-dark,rgba(5,4,12,.98)) 0%,
    var(--overlay-dark,rgba(5,4,12,.8)) 28%,
    transparent 60%
  );
  pointer-events:none;
}

/* Card content */
.card-content{position:relative;z-index:2;width:100%;text-align:center;}
.card-status{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;
  border:1px solid var(--status-border,rgba(180,80,255,.4));
  color:var(--status-color,rgba(180,80,255,.9));
  background:var(--status-bg,rgba(180,80,255,.08));
  margin-bottom:12px;
}
.card-title{
  font-family:'Cinzel',serif;
  font-size:clamp(18px,4vw,28px);
  font-weight:700;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#fff;
  margin-bottom:8px;
  text-shadow:0 0 40px var(--title-glow,rgba(180,80,255,.6));
}
.card-desc{
  font-style:italic;
  font-size:12px;
  color:var(--dim);
  letter-spacing:1.5px;
  line-height:1.6;
  margin-bottom:20px;
}
.card-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:3px;text-transform:uppercase;
  padding:10px 24px;
  border-radius:30px;
  border:1px solid var(--btn-border,rgba(255,255,255,.2));
  background:var(--btn-bg,rgba(255,255,255,.06));
  color:#fff;
  transition:all .25s;
}
.game-card:hover .card-btn{
  background:var(--btn-hover,rgba(180,80,255,.2));
  border-color:var(--btn-border-hover,rgba(180,80,255,.6));
  transform:translateY(-1px);
}
.card-btn-arrow{
  font-size:14px;
  transition:transform .25s;
}
.game-card:hover .card-btn-arrow{transform:translateX(3px);}

/* ── SPLIT CARD THEME ───────────────────────────── */
.card-split{
  --card-bg:rgba(12,6,22,.95);
  --card-border:linear-gradient(135deg,rgba(180,80,255,.5),rgba(120,40,200,.1),rgba(180,80,255,.4));
  --overlay-dark:rgba(8,4,18,.95);
  --status-border:rgba(180,80,255,.5);
  --status-color:rgba(200,130,255,.9);
  --status-bg:rgba(180,80,255,.1);
  --title-glow:rgba(180,80,255,.7);
  --btn-hover:rgba(180,80,255,.18);
  --btn-border-hover:rgba(180,80,255,.7);
}
.card-split .card-inner::after{
  content:'';
  position:absolute;
  top:-60px;left:50%;transform:translateX(-50%);
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(180,80,255,.18) 0%,transparent 70%);
  pointer-events:none;
}

/* ── ETHER CARD THEME ───────────────────────────── */
.card-ether{
  --card-bg:rgba(4,10,14,.95);
  --card-border:linear-gradient(135deg,rgba(0,220,255,.4),rgba(0,180,200,.08),rgba(0,220,255,.3));
  --overlay-dark:rgba(3,8,12,.95);
  --status-border:rgba(0,220,255,.4);
  --status-color:rgba(0,220,255,.9);
  --status-bg:rgba(0,220,255,.08);
  --title-glow:rgba(0,220,255,.6);
  --btn-hover:rgba(0,220,255,.12);
  --btn-border-hover:rgba(0,220,255,.6);
}
.card-ether::before{
  background:linear-gradient(135deg,rgba(0,220,255,.35),rgba(0,180,200,.06),rgba(255,60,80,.2));
}
.card-ether .card-inner::after{
  content:'';
  position:absolute;
  top:-60px;left:50%;transform:translateX(-50%);
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(0,220,255,.12) 0%,transparent 70%);
  pointer-events:none;
}
.card-ether .card-btn{
  --btn-border:rgba(0,220,255,.25);
}

/* ── FOOTER ─────────────────────────────────────── */
footer{
  margin-top:60px;
  text-align:center;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.15);
  animation:fadeUp 1s .5s ease both;
}

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:none;}
}

/* ── MOBILE ─────────────────────────────────────── */
@media(max-width:600px){
  .games{
    grid-template-columns:1fr;
    max-width:340px;
    gap:16px;
  }
  .game-card{aspect-ratio:3/4;}
  header{padding:40px 0 16px;}
  .studio-name{letter-spacing:6px;}
}
</style>
</head>
<body>

<!-- STAR FIELD -->
<div class="stars" id="stars"></div>

<div class="shell">
  <header>
    <div class="studio-eyebrow">Est. 2025</div>
    <div class="studio-name">Split Games</div>
    <div class="studio-rule"></div>
    <div class="studio-tagline">Games that feel like something</div>
  </header>

  <div class="games">

    <!-- SPLIT ORIGIN -->
    <a class="game-card card-split" href="/splitorigin">
      <div class="card-inner">
        <div class="card-img">
          <img src="/split_logo.png" alt="Split Origin">
        </div>
        <div class="card-overlay"></div>
        <div class="card-content">
          <div class="card-status">Available Now</div>
          <div class="card-title">Split</div>
          <div class="card-desc">Nothing stays whole.<br>Everything transforms.</div>
          <div class="card-btn">
            Play Now
            <span class="card-btn-arrow">→</span>
          </div>
        </div>
      </div>
    </a>

    <!-- ETHER -->
    <a class="game-card card-ether" href="/ether" onclick="return false;" style="cursor:default;">
      <div class="card-inner">
        <div class="card-img">
          <img src="/EtherLogo.png" alt="Ether">
        </div>
        <div class="card-overlay"></div>
        <div class="card-content">
          <div class="card-status" style="--status-border:rgba(0,220,255,.4);--status-color:rgba(0,220,255,.9);--status-bg:rgba(0,220,255,.08);">Coming Soon</div>
          <div class="card-title" style="--title-glow:rgba(0,220,255,.6);">Ether</div>
          <div class="card-desc">A new kind of challenge<br>is forming.</div>
          <div class="card-btn" style="opacity:.55;cursor:default;">
            Coming Soon
          </div>
        </div>
      </div>
    </a>

  </div>

  <footer>
    &copy; 2025 Split Games · split.games
  </footer>
</div>

<script>
// Generate star field
(function(){
  var container=document.getElementById('stars');
  var count=180;
  for(var i=0;i<count;i++){
    var s=document.createElement('div');
    s.className='star';
    var size=Math.random()<.85?1:Math.random()<.7?1.5:2;
    var lo=(Math.random()*.06+.02).toFixed(2);
    var hi=(Math.random()*.2+.08).toFixed(2);
    var dur=(Math.random()*4+2).toFixed(1);
    var delay=(Math.random()*6).toFixed(1);
    s.style.cssText=[
      'width:'+size+'px',
      'height:'+size+'px',
      'left:'+(Math.random()*100)+'%',
      'top:'+(Math.random()*100)+'%',
      '--lo:'+lo,
      '--hi:'+hi,
      '--dur:'+dur+'s',
      'animation-delay:'+delay+'s',
    ].join(';');
    container.appendChild(s);
  }
})();
</script>
</body>
</html>
