<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Split Games</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;min-height:100vh;
  background:#04050a;
  color:#fff;
  font-family:'Cormorant Garamond',Georgia,serif;
  overflow-x:hidden;
}

/* ── CANVAS BACKGROUND ──────────────────────────── */
#bgCanvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  z-index:0;
  pointer-events:none;
}

/* ── SHELL ───────────────────────────────────────── */
.shell{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 80px;
}

/* ── HEADER ──────────────────────────────────────── */
header{
  width:100%;max-width:960px;
  display:flex;flex-direction:column;align-items:center;
  padding:52px 0 20px;
  gap:14px;
  animation:fadeUp .9s ease both;
}
.studio-logo{
  width:72px;height:72px;
  border-radius:50%;
  overflow:hidden;
  border:1px solid rgba(180,80,255,.25);
  box-shadow:0 0 40px rgba(180,80,255,.15),0 0 80px rgba(180,80,255,.06);
  transition:box-shadow .4s;
}
.studio-logo:hover{
  box-shadow:0 0 60px rgba(180,80,255,.3),0 0 120px rgba(180,80,255,.12);
}
.studio-logo img{width:100%;height:100%;object-fit:cover;}
.studio-name{
  font-family:'Cinzel',serif;
  font-size:clamp(13px,2.8vw,20px);
  font-weight:600;
  letter-spacing:10px;
  text-transform:uppercase;
  color:rgba(255,255,255,.88);
  animation:fadeUp .9s .08s ease both;
}
.studio-rule{
  width:1px;height:32px;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,.15),transparent);
}
.studio-tagline{
  font-style:italic;
  font-size:14px;
  color:rgba(255,255,255,.28);
  letter-spacing:2px;
  animation:fadeUp .9s .16s ease both;
}

/* ── GAMES GRID ──────────────────────────────────── */
.games{
  width:100%;max-width:820px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
  margin-top:48px;
}

/* ── GAME CARD ───────────────────────────────────── */
.game-card{
  position:relative;
  border-radius:22px;
  overflow:hidden;
  aspect-ratio:9/14;
  cursor:pointer;
  text-decoration:none;
  display:block;
  animation:fadeUp 1s ease both;
  transition:transform .4s cubic-bezier(.2,.8,.2,1);
}
.game-card:nth-child(2){animation-delay:.14s;}
.game-card:hover{transform:translateY(-6px);}

/* Glass border */
.game-card::before{
  content:'';
  position:absolute;inset:0;
  border-radius:22px;
  border:1px solid var(--border-col,rgba(180,80,255,.28));
  pointer-events:none;
  z-index:3;
  transition:border-color .3s;
}
.game-card:hover::before{border-color:var(--border-hover,rgba(180,80,255,.55));}

/* Card inner */
.card-inner{
  width:100%;height:100%;
  background:var(--card-bg,rgba(12,6,22,.95));
  border-radius:22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:0 0 28px;
  position:relative;
  overflow:hidden;
}

/* Logo image — fills most of card */
.card-img{
  position:absolute;inset:0;
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:0;
}
.card-img img{
  width:100%;height:85%;
  object-fit:cover;
  object-position:center top;
  transition:transform .6s cubic-bezier(.2,.8,.2,1),opacity .4s;
  opacity:.95;
}
.game-card:hover .card-img img{transform:scale(1.04);opacity:1;}

/* Fade from image to dark at bottom */
.card-fade{
  position:absolute;
  bottom:0;left:0;right:0;
  height:55%;
  background:linear-gradient(to top,
    var(--card-bg,rgba(12,6,22,1)) 0%,
    var(--card-bg,rgba(12,6,22,.96)) 35%,
    transparent 100%
  );
  pointer-events:none;
  z-index:1;
}

/* Content sits above fade */
.card-content{
  position:relative;z-index:2;
  width:100%;
  text-align:center;
  padding:0 20px;
}
.card-status{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:7px;letter-spacing:3.5px;text-transform:uppercase;
  padding:4px 13px;border-radius:20px;
  border:1px solid var(--status-border,rgba(180,80,255,.45));
  color:var(--status-color,rgba(210,140,255,.9));
  background:var(--status-bg,rgba(180,80,255,.1));
  margin-bottom:11px;
}
.card-title{
  font-family:'Cinzel',serif;
  font-size:clamp(16px,3.5vw,26px);
  font-weight:700;
  letter-spacing:5px;
  text-transform:uppercase;
  color:#fff;
  margin-bottom:7px;
  text-shadow:0 0 30px var(--title-glow,rgba(180,80,255,.5));
}
.card-desc{
  font-style:italic;
  font-size:12px;
  color:rgba(255,255,255,.38);
  letter-spacing:1px;
  line-height:1.7;
  margin-bottom:18px;
}
.card-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Cinzel',serif;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  padding:10px 22px;
  border-radius:30px;
  border:1px solid var(--btn-border,rgba(255,255,255,.18));
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.8);
  transition:all .25s;
}
.game-card:hover .card-btn{
  background:var(--btn-hover,rgba(180,80,255,.18));
  border-color:var(--btn-border-hover,rgba(180,80,255,.6));
  color:#fff;
}
.card-btn-arrow{transition:transform .25s;}
.game-card:hover .card-btn-arrow{transform:translateX(3px);}

/* ── SPLIT ORIGIN THEME ──────────────────────────── */
.card-split{
  --card-bg:#07040f;
  --border-col:rgba(180,80,255,.22);
  --border-hover:rgba(200,100,255,.55);
  --status-border:rgba(180,80,255,.5);
  --status-color:rgba(210,140,255,.95);
  --status-bg:rgba(180,80,255,.1);
  --title-glow:rgba(180,80,255,.55);
  --btn-hover:rgba(180,80,255,.2);
  --btn-border-hover:rgba(180,80,255,.65);
}

/* ── ETHER THEME ─────────────────────────────────── */
.card-ether{
  --card-bg:#030c10;
  --border-col:rgba(0,200,255,.18);
  --border-hover:rgba(0,220,255,.5);
  --status-border:rgba(0,200,255,.4);
  --status-color:rgba(0,220,255,.9);
  --status-bg:rgba(0,200,255,.08);
  --title-glow:rgba(0,220,255,.5);
  --btn-hover:rgba(0,200,255,.12);
  --btn-border-hover:rgba(0,220,255,.55);
}

/* ── FOOTER ──────────────────────────────────────── */
footer{
  margin-top:64px;
  text-align:center;
  display:flex;flex-direction:column;gap:6px;
  animation:fadeUp 1s .4s ease both;
}
.footer-name{
  font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:5px;text-transform:uppercase;
  color:rgba(255,255,255,.22);
}
.footer-legal{
  font-size:10px;letter-spacing:2px;
  color:rgba(255,255,255,.1);
}

/* ── ANIMATIONS ──────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:none;}
}

/* ── MOBILE ──────────────────────────────────────── */
@media(max-width:580px){
  .games{grid-template-columns:1fr;max-width:320px;gap:18px;}
  .game-card{aspect-ratio:3/4;}
  .card-img img{height:80%;}
  header{padding:36px 0 16px;}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="shell">
  <header>
    <div class="studio-logo">
      <img src="/split_logo.png" alt="Split Games">
    </div>
    <div class="studio-name">Split Games</div>
    <div class="studio-rule"></div>
    <div class="studio-tagline">Games that feel like something</div>
  </header>

  <div class="games">

    <!-- SPLIT ORIGIN -->
    <a class="game-card card-split" href="/splitorigin">
      <div class="card-inner">
        <div class="card-img">
          <img src="/splitorigin.png" alt="Split Origin">
        </div>
        <div class="card-fade"></div>
        <div class="card-content">
          <div class="card-status">Available Now</div>
          <div class="card-title">Split Origin</div>
          <div class="card-desc">Nothing stays whole.<br>Everything transforms.</div>
          <div class="card-btn">
            Play Now <span class="card-btn-arrow">→</span>
          </div>
        </div>
      </div>
    </a>

    <!-- ETHER -->
    <a class="game-card card-ether" href="#" onclick="return false;" style="cursor:default;">
      <div class="card-inner">
        <div class="card-img">
          <img src="/EtherLogo.png" alt="Ether" style="object-position:center center;">
        </div>
        <div class="card-fade" style="--card-bg:#030c10;"></div>
        <div class="card-content">
          <div class="card-status">Coming Soon</div>
          <div class="card-title">Ether</div>
          <div class="card-desc">A new kind of challenge<br>is forming.</div>
          <div class="card-btn" style="opacity:.45;cursor:default;pointer-events:none;">
            Coming Soon
          </div>
        </div>
      </div>
    </a>

  </div>

  <footer>
    <div class="footer-name">Split Games</div>
    <div class="footer-legal">&copy; 2025 Flavio DeOliveira LLC</div>
  </footer>
</div>

<script>
// ── CINEMATIC STAR BACKGROUND ─────────────────────────────
(function(){
  var canvas=document.getElementById('bgCanvas');
  var ctx=canvas.getContext('2d');
  var W,H;
  var stars=[],nebulae=[],shooters=[];
  var RAF;

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    buildNebulae();
  }
  window.addEventListener('resize',resize);

  // ── STARS ────────────────────────────────────────────────
  function mkStar(){
    return{
      x:Math.random()*W,
      y:Math.random()*H,
      r:Math.random()<.7?Math.random()*.6+.2:Math.random()*.4+.8,
      baseAlpha:Math.random()*.18+.04,
      alpha:0,
      speed:Math.random()*.0006+.0002,
      phase:Math.random()*Math.PI*2,
      // Slight warm/cool tint
      hue:Math.random()<.3?(Math.random()<.5?'180,80,255':'0,220,255'):'255,255,255'
    };
  }
  function buildStars(){
    stars=[];
    var n=Math.floor(W*H/3800);
    for(var i=0;i<n;i++)stars.push(mkStar());
  }

  // ── NEBULAE ───────────────────────────────────────────────
  function buildNebulae(){
    nebulae=[
      // Purple cloud upper left
      {x:W*.18,y:H*.22,rx:W*.32,ry:H*.28,col:'100,30,180',alpha:.055},
      // Cyan cloud lower right
      {x:W*.82,y:H*.75,rx:W*.28,ry:H*.24,col:'0,150,200',alpha:.04},
      // Deep purple center
      {x:W*.5,y:H*.48,rx:W*.45,ry:H*.38,col:'80,20,140',alpha:.03},
      // Faint red-violet upper right
      {x:W*.78,y:H*.18,rx:W*.22,ry:H*.2,col:'160,40,120',alpha:.028},
      // Dim cyan lower left
      {x:W*.14,y:H*.8,rx:W*.2,ry:H*.18,col:'0,120,160',alpha:.025},
    ];
  }

  // ── SHOOTING STARS ────────────────────────────────────────
  function mkShooter(){
    var angle=Math.PI*.12+Math.random()*.18;
    return{
      x:Math.random()*W*.8,
      y:Math.random()*H*.4,
      len:Math.random()*120+60,
      speed:Math.random()*6+5,
      angle:angle,
      alpha:0,
      life:1,
      dc:.012+Math.random()*.01,
      active:false,
      timer:Math.random()*400+200
    };
  }
  function buildShooters(){
    shooters=[];
    for(var i=0;i<4;i++)shooters.push(mkShooter());
  }

  // ── DRAW ──────────────────────────────────────────────────
  function draw(t){
    ctx.clearRect(0,0,W,H);

    // Deep space base — subtle gradient
    var bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#040409');
    bg.addColorStop(.5,'#050610');
    bg.addColorStop(1,'#03040a');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);

    // Nebulae
    nebulae.forEach(function(n){
      var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,Math.max(n.rx,n.ry));
      g.addColorStop(0,'rgba('+n.col+','+n.alpha+')');
      g.addColorStop(.5,'rgba('+n.col+','+(n.alpha*.35)+')');
      g.addColorStop(1,'rgba('+n.col+',0)');
      ctx.save();
      ctx.scale(1,n.ry/n.rx);
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(n.x,n.y*(n.rx/n.ry),n.rx,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // Stars
    stars.forEach(function(s){
      s.alpha=s.baseAlpha*(0.5+0.5*Math.sin(t*s.speed+s.phase));
      ctx.globalAlpha=s.alpha;
      // Larger stars get a faint cross-glow
      if(s.r>0.9){
        var glow=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5);
        glow.addColorStop(0,'rgba('+s.hue+','+(s.alpha*1.2)+')');
        glow.addColorStop(1,'rgba('+s.hue+',0)');
        ctx.fillStyle=glow;
        ctx.beginPath();ctx.arc(s.x,s.y,s.r*5,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='rgba('+s.hue+',1)';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;

    // Shooting stars
    shooters.forEach(function(s){
      s.timer--;
      if(s.timer<=0&&!s.active){s.active=true;s.alpha=0;s.life=1;}
      if(!s.active)return;
      s.x+=Math.cos(s.angle)*s.speed;
      s.y+=Math.sin(s.angle)*s.speed;
      s.life-=s.dc;
      s.alpha=Math.min(s.life*3,1)*s.life;
      if(s.life<=0){
        // Reset
        var ns=mkShooter();
        s.x=ns.x;s.y=ns.y;s.len=ns.len;s.speed=ns.speed;
        s.angle=ns.angle;s.alpha=0;s.life=1;s.dc=ns.dc;
        s.active=false;s.timer=ns.timer;
        return;
      }
      var tx=s.x-Math.cos(s.angle)*s.len;
      var ty=s.y-Math.sin(s.angle)*s.len;
      var grad=ctx.createLinearGradient(tx,ty,s.x,s.y);
      grad.addColorStop(0,'rgba(255,255,255,0)');
      grad.addColorStop(1,'rgba(255,255,255,'+s.alpha+')');
      ctx.strokeStyle=grad;
      ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(s.x,s.y);ctx.stroke();
    });
  }

  var last=0;
  function loop(ts){
    var t=ts/1000;
    draw(t);
    RAF=requestAnimationFrame(loop);
  }

  resize();
  buildStars();
  buildShooters();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
