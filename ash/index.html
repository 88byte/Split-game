<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ASHVEIL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#010904;overflow:hidden;font-family:Georgia,serif}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;image-rendering:pixelated}
.btn{position:absolute;border-radius:50%;border:1.5px solid rgba(160,220,140,0.25);
  background:rgba(160,220,140,0.06);display:flex;align-items:center;justify-content:center;
  color:rgba(160,220,140,0.5);touch-action:none;user-select:none;cursor:pointer;font-size:18px}
#bL{bottom:22px;left:16px;width:52px;height:52px}
#bR{bottom:22px;left:78px;width:52px;height:52px}
#bJ{bottom:18px;right:16px;width:64px;height:64px;font-size:24px;
    border-color:rgba(140,200,255,0.35);background:rgba(140,200,255,0.08)}
#bA{bottom:26px;right:90px;width:48px;height:48px;
    border-color:rgba(255,200,60,0.35);background:rgba(255,200,60,0.08);font-size:16px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div class="btn" id="bL">◀</div>
  <div class="btn" id="bR">▶</div>
  <div class="btn" id="bJ">↑</div>
  <div class="btn" id="bA">✦</div>
</div>
<script>
var GW=800,GH=450,TILE=32;
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
canvas.width=GW;canvas.height=GH;

function resize(){
var w=window.innerWidth||800,h=window.innerHeight||450;
var s=Math.min(w/GW,h/GH);
if(s<=0)s=1;
canvas.style.width=(GW*s)+‘px’;
canvas.style.height=(GH*s)+‘px’;
}
resize();
window.addEventListener(‘resize’,resize);

// Light overlay canvas
var lc=document.createElement(‘canvas’);
lc.width=GW;lc.height=GH;
var lctx=lc.getContext(‘2d’);

// INPUT
var K={left:false,right:false,jump:false,atk:false};
var P={jump:false,atk:false};
var gs=‘title’;

function anyKey(){if(gs===‘title’||gs===‘dead’||gs===‘win’)startGame();}

document.addEventListener(‘keydown’,function(e){
if(e.repeat)return;
if(e.key===‘ArrowLeft’||e.key===‘a’||e.key===‘A’)K.left=true;
if(e.key===‘ArrowRight’||e.key===‘d’||e.key===‘D’)K.right=true;
if(e.key===’ ‘||e.key===‘ArrowUp’||e.key===‘w’||e.key===‘W’||e.key===‘z’||e.key===‘Z’){K.jump=true;P.jump=true;}
if(e.key===‘x’||e.key===‘X’||e.key===‘Shift’||e.key===‘c’||e.key===‘C’){K.atk=true;P.atk=true;}
anyKey();
e.preventDefault();
},{passive:false});
document.addEventListener(‘keyup’,function(e){
if(e.key===‘ArrowLeft’||e.key===‘a’||e.key===‘A’)K.left=false;
if(e.key===‘ArrowRight’||e.key===‘d’||e.key===‘D’)K.right=false;
if(e.key===’ ’||e.key===‘ArrowUp’||e.key===‘w’||e.key===‘W’||e.key===‘z’||e.key===‘Z’)K.jump=false;
if(e.key===‘x’||e.key===‘X’||e.key===‘Shift’||e.key===‘c’||e.key===‘C’)K.atk=false;
});

function bindBtn(id,dn,up){
var el=document.getElementById(id);
function onDown(e){e.preventDefault();dn();anyKey();}
function onUp(e){e.preventDefault();up();}
el.addEventListener(‘touchstart’,onDown,{passive:false});
el.addEventListener(‘touchend’,onUp,{passive:false});
el.addEventListener(‘touchcancel’,onUp,{passive:false});
el.addEventListener(‘mousedown’,onDown);
el.addEventListener(‘mouseup’,onUp);
}
bindBtn(‘bL’,function(){K.left=true;},function(){K.left=false;});
bindBtn(‘bR’,function(){K.right=true;},function(){K.right=false;});
bindBtn(‘bJ’,function(){K.jump=true;P.jump=true;},function(){K.jump=false;});
bindBtn(‘bA’,function(){K.atk=true;P.atk=true;},function(){K.atk=false;});
canvas.addEventListener(‘click’,anyKey);

// TILEMAP
var MC=58,MR=14;
var TM=[];
for(var rr=0;rr<MR;rr++){TM[rr]=[];for(var cc=0;cc<MC;cc++)TM[rr][cc]=0;}
function fill(r,c,len,v){v=v||1;for(var i=c;i<c+len&&i<MC;i++)TM[r][i]=v;}

fill(12,0,58);fill(13,0,58);
fill(10,0,4);fill(9,6,3);fill(7,3,3);fill(8,11,4);fill(6,14,2);fill(10,14,3);fill(5,9,2);
fill(9,20,3);fill(10,24,3);fill(9,27,3);fill(8,30,3);fill(7,33,3);fill(9,36,3);fill(10,38,3);
TM[8][21]=2;TM[6][34]=2;
for(var r2=7;r2<=12;r2++){TM[r2][40]=3;TM[r2][41]=3;}
fill(10,42,3);fill(8,45,3);fill(10,49,3);fill(7,52,3);fill(5,42,16);

var ORBS=[];
for(var ro=0;ro<MR;ro++)for(var co=0;co<MC;co++)if(TM[ro][co]===2)ORBS.push({col:co,row:ro});

// PHYSICS
var GRAV=0.55,JSPD=-12.5,PSPD=3.8,MAXY=16;

function isSolid(c,r,go){
if(c<0||c>=MC||r<0)return false;
if(r>=MR)return true;
var t=TM[r][c];
return t===1||(t===3&&!go);
}

function moveEnt(e,go){
e.x+=e.vx;
if(e.vx>0){
var c=Math.floor((e.x+e.w)/TILE);
for(var r=Math.ceil(e.y/TILE);r<=Math.floor((e.y+e.h-1)/TILE);r++)
if(isSolid(c,r,go)){e.x=c*TILE-e.w-0.01;e.vx=0;break;}
}else if(e.vx<0){
var c2=Math.floor(e.x/TILE);
for(var r3=Math.ceil(e.y/TILE);r3<=Math.floor((e.y+e.h-1)/TILE);r3++)
if(isSolid(c2,r3,go)){e.x=(c2+1)*TILE+0.01;e.vx=0;break;}
}
e.y+=e.vy;e.onGround=false;
if(e.vy>0){
var r4=Math.floor((e.y+e.h)/TILE);
for(var c3=Math.floor(e.x/TILE);c3<=Math.floor((e.x+e.w-1)/TILE);c3++)
if(isSolid(c3,r4,go)){e.y=r4*TILE-e.h-0.01;e.vy=0;e.onGround=true;break;}
}else if(e.vy<0){
var r5=Math.floor(e.y/TILE);
for(var c4=Math.floor(e.x/TILE);c4<=Math.floor((e.x+e.w-1)/TILE);c4++)
if(isSolid(c4,r5,go)){e.y=(r5+1)*TILE+0.01;e.vy=0;break;}
}
}

function overlaps(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// GAME STATE
var pl,boss,enms,projs,parts,orbAct,gateOpen,cam,shakeT;

function mkPl(){return{x:72,y:10*TILE,vx:0,vy:0,w:15,h:25,onGround:false,jumps:2,facing:1,hp:5,maxHp:5,atkTimer:0,atkCool:0,hitTimer:0};}
function mkBoss(){return{x:47*TILE,y:12*TILE-68,vx:0,vy:0,w:54,h:68,hp:12,maxHp:12,onGround:false,hitTimer:0,state:‘idle’,timer:0,phase:1,active:false};}
function mkEnms(){return[
{x:13*TILE,y:11*TILE,vx:-.9,vy:0,w:20,h:20,hp:2,onGround:false,hitTimer:0},
{x:26*TILE,y:11*TILE,vx:.9,vy:0,w:20,h:20,hp:2,onGround:false,hitTimer:0},
{x:37*TILE,y:11*TILE,vx:-.7,vy:0,w:20,h:20,hp:2,onGround:false,hitTimer:0}
];}

function startGame(){
pl=mkPl();boss=mkBoss();enms=mkEnms();
projs=[];parts=[];orbAct=[false,false];gateOpen=false;
cam={x:0,y:0};shakeT=0;gs=‘play’;
}

// PARTICLES
function spawnPts(x,y,col,n,spd,type){
type=type||’’;
for(var i=0;i<n;i++){
var a=Math.random()*Math.PI*2,s=spd*(0.4+Math.random()*0.8);
parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.5,life:18+Math.random()*22,ml:40,r:1.5+Math.random()*2,col:col,type:type});
}
}
function wisp(x,y){
for(var i=0;i<3;i++)
parts.push({x:x,y:y,vx:(Math.random()-0.5)*1.2,vy:-1.2-Math.random()*0.8,life:25+Math.random()*25,ml:50,r:2.5,col:’#88c4ff’,type:‘wisp’});
}

// UPDATE
function update(){
if(gs!==‘play’)return;
shakeT=Math.max(0,shakeT-1);
var p=pl,b=boss;

if(K.left){p.vx=Math.max(p.vx-1,-PSPD);p.facing=-1;}
else if(K.right){p.vx=Math.min(p.vx+1,PSPD);p.facing=1;}
else{p.vx*=0.75;if(Math.abs(p.vx)<0.1)p.vx=0;}

if(P.jump){if(p.jumps>0){p.vy=JSPD;p.jumps–;wisp(p.x+7,p.y+25);}P.jump=false;}
p.vy=Math.min(p.vy+GRAV,MAXY);
var wasG=p.onGround;
moveEnt(p,gateOpen);
if(p.onGround&&!wasG)wisp(p.x+7,p.y+25);
if(p.onGround)p.jumps=2;
if(p.y>MR*TILE+60){gs=‘dead’;return;}
p.x=Math.max(0,Math.min(MC*TILE-p.w,p.x));

if(p.atkCool>0)p.atkCool–;
if(P.atk&&p.atkCool<=0){
p.atkTimer=14;p.atkCool=20;
spawnPts(p.facing>0?p.x+p.w:p.x,p.y+12,’#c0e4ff’,5,3.5);
var ab={x:p.facing>0?p.x+p.w-4:p.x-68,y:p.y-2,w:70,h:p.h+4};
for(var oi=0;oi<ORBS.length;oi++){
var o=ORBS[oi];
if(!orbAct[oi]&&overlaps(ab,{x:o.col*TILE,y:o.row*TILE,w:TILE,h:TILE})){
orbAct[oi]=true;spawnPts(o.col*TILE+16,o.row*TILE+16,’#ffd050’,14,4.5);
if(orbAct[0]&&orbAct[1])gateOpen=true;
}
}
for(var ei=0;ei<enms.length;ei++){
var e=enms[ei];
if(e.hp>0&&overlaps(ab,e)){e.hp–;e.hitTimer=15;e.vx+=(e.x>p.x?4:-4);spawnPts(e.x+10,e.y+10,’#70c030’,5,3);}
}
if(b.active&&b.hp>0&&overlaps(ab,b)){
b.hp–;b.hitTimer=12;shakeT=6;spawnPts(b.x+b.w/2,b.y+b.h*0.4,’#ff4040’,7,4);
if(b.hp<=0){spawnPts(b.x+b.w/2,b.y+b.h*0.5,’#ff8040’,24,6);gs=‘win’;}
}
P.atk=false;
}
if(p.atkTimer>0)p.atkTimer–;
if(p.hitTimer>0)p.hitTimer–;

for(var ei2=0;ei2<enms.length;ei2++){
var e2=enms[ei2];if(e2.hp<=0)continue;
e2.vy=Math.min(e2.vy+GRAV,MAXY);moveEnt(e2,gateOpen);
if(e2.onGround){
var nc=Math.floor(e2.x/TILE)+Math.sign(e2.vx);
if(!isSolid(nc,Math.floor((e2.y+e2.h+2)/TILE),gateOpen)||isSolid(nc,Math.floor((e2.y+e2.h/2)/TILE),gateOpen))e2.vx*=-1;
}
if(e2.hitTimer>0)e2.hitTimer–;
if(p.hitTimer<=0&&overlaps(p,e2)){p.hp–;p.hitTimer=60;p.vx=(e2.x>p.x?-5:5);p.vy=-6;if(p.hp<=0)gs=‘dead’;}
}

if(!b.active&&p.x>43*TILE&&gateOpen)b.active=true;
if(b.active&&b.hp>0){
b.phase=b.hp<b.maxHp/2?2:1;
b.vy=Math.min(b.vy+GRAV,MAXY);moveEnt(b,gateOpen);
if(b.hitTimer>0)b.hitTimer–;
if(b.timer>0){b.timer–;}
else{
var dx=p.x-(b.x+b.w/2),bspd=b.phase===2?1.9:1.4;
if(b.state===‘idle’){
if(Math.abs(dx)>160){b.state=‘walk’;b.vx=Math.sign(dx)*bspd;b.timer=55;}
else if(Math.random()<0.38){b.state=‘slam’;b.vy=-12;b.timer=80;}
else{
b.state=‘vine’;
var ang=Math.atan2(p.y+12-(b.y+b.h*0.3),p.x+7-(b.x+b.w/2));
var ps=3.8+(b.phase===2?2:0);
var nc2=b.phase===2?2:1;
for(var k=0;k<nc2;k++){
var da=(k-0.5)*0.3;
projs.push({x:b.x+b.w/2,y:b.y+b.h*0.3,vx:Math.cos(ang+da)*ps,vy:Math.sin(ang+da)*ps,w:11,h:11,life:90});
}
b.timer=45-(b.phase===2?10:0);
}
}else if(b.state===‘walk’){b.vx*=0.88;if(Math.abs(b.vx)<0.2){b.vx=0;b.state=‘idle’;b.timer=25;}}
else if(b.state===‘slam’){
b.vx=0;
if(b.onGround&&b.vy===0&&b.timer<75){
shakeT=10;spawnPts(b.x+b.w/2,b.y+b.h,’#3d7028’,12,5);
if(Math.abs(p.x-b.x)<130&&p.onGround&&p.hitTimer<=0){p.hp–;p.hitTimer=60;p.vy=-8;if(p.hp<=0)gs=‘dead’;}
b.state=‘idle’;b.timer=45;
}
}else{b.state=‘idle’;b.timer=20;}
}
b.x=Math.max(42*TILE,Math.min(54*TILE-b.w,b.x));
for(var pi2=0;pi2<projs.length;pi2++){
var pr=projs[pi2];
if(p.hitTimer<=0&&overlaps(p,{x:pr.x,y:pr.y,w:pr.w,h:pr.h})){
p.hp–;p.hitTimer=60;p.vx=(p.x>b.x?4:-4);p.vy=-5;pr.life=0;if(p.hp<=0)gs=‘dead’;
}
}
}

for(var pi3=projs.length-1;pi3>=0;pi3–){
var pr2=projs[pi3];pr2.x+=pr2.vx;pr2.y+=pr2.vy;pr2.vy+=0.18;pr2.life–;
if(pr2.life<=0||isSolid(Math.floor(pr2.x/TILE),Math.floor(pr2.y/TILE),gateOpen)){spawnPts(pr2.x,pr2.y,’#5a9020’,4,2.5);projs.splice(pi3,1);}
}
for(var pti=parts.length-1;pti>=0;pti–){
var pt=parts[pti];pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.93;pt.vy+=pt.type===‘wisp’?-0.04:0.08;pt.life–;
if(pt.life<=0)parts.splice(pti,1);
}

var tx=Math.max(0,Math.min(MC*TILE-GW,p.x-GW/2+7));
var ty=Math.max(0,Math.min(MR*TILE-GH,p.y-GH*0.55));
cam.x+=(tx-cam.x)*0.1;cam.y+=(ty-cam.y)*0.1;
}

// Background trees
var TREES=[];
for(var ti=0;ti<48;ti++){
var seed=ti*31+7,xr=Math.abs(Math.sin(seed)*43758.5453123)%1;
seed+=xr*100;var hr=Math.abs(Math.sin(seed)*43758.5453123)%1;
seed+=hr*100;var wr=Math.abs(Math.sin(seed)*43758.5453123)%1;
seed+=wr*100;var lr=Math.abs(Math.sin(seed)*43758.5453123)%1;
TREES.push({x:xr*MC*TILE,h:55+hr*140,w:7+wr*22,lyr:Math.floor(lr*3)});
}

// DRAW
function drawBG(){
var g=ctx.createLinearGradient(0,0,0,GH);
g.addColorStop(0,’#010503’);g.addColorStop(0.6,’#020c05’);g.addColorStop(1,’#071508’);
ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
for(var i=0;i<50;i++){
var sx=((i*137+51)*1.7+(GW-cam.x*0.04))%GW;
if(sx<0)sx+=GW;
var sy=(i*97+23)%160;
var br=0.12+Math.sin(Date.now()/900+i)*0.1;
ctx.fillStyle=‘rgba(180,230,180,’+br+’)’;
ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);ctx.fill();
}
var pars=[0.22,0.48,0.72];
var tcols=[‘rgba(7,16,5,.68)’,‘rgba(4,11,3,.82)’,‘rgba(2,8,2,.94)’];
for(var lyr=0;lyr<3;lyr++){
ctx.save();ctx.translate(-cam.x*pars[lyr],0);
ctx.fillStyle=tcols[lyr];
for(var ti2=0;ti2<TREES.length;ti2++){
var t=TREES[ti2];if(t.lyr!==lyr)continue;
ctx.beginPath();ctx.moveTo(t.x,GH);
ctx.lineTo(t.x-t.w*0.4,GH-t.h*0.3);
ctx.quadraticCurveTo(t.x-t.w*0.44,GH-t.h*0.7,t.x-t.w*0.1,GH-t.h);
ctx.quadraticCurveTo(t.x,GH-t.h*1.05,t.x+t.w*0.1,GH-t.h);
ctx.quadraticCurveTo(t.x+t.w*0.44,GH-t.h*0.7,t.x+t.w*0.4,GH-t.h*0.3);
ctx.lineTo(t.x,GH);ctx.fill();
}
ctx.restore();
}
}

function drawTiles(){
var c0=Math.max(0,Math.floor(cam.x/TILE)-1),c1=Math.min(MC,c0+Math.ceil(GW/TILE)+3);
var r0=Math.max(0,Math.floor(cam.y/TILE)-1),r1=Math.min(MR,r0+Math.ceil(GH/TILE)+3);
for(var r=r0;r<r1;r++){
for(var c=c0;c<c1;c++){
var t=TM[r][c];if(!t)continue;
var tx=c*TILE-cam.x,ty=r*TILE-cam.y;
if(t===1){
ctx.fillStyle=’#0b1709’;ctx.fillRect(tx,ty,TILE,TILE);
if(r===0||(TM[r-1]&&!TM[r-1][c])){
ctx.fillStyle=’#223c14’;ctx.fillRect(tx,ty,TILE,5);
ctx.fillStyle=’#30521c’;ctx.fillRect(tx+1,ty,TILE-2,2);
}
}else if(t===2){
var oi=0;for(var i=0;i<ORBS.length;i++)if(ORBS[i].col===c&&ORBS[i].row===r){oi=i;break;}
var act=orbAct[oi];
var cx=tx+TILE/2,cy=ty+TILE/2;
var pulse=Math.sin(Date.now()/380+c)*0.15;
if(act){
var grd=ctx.createRadialGradient(cx,cy,2,cx,cy,TILE);
grd.addColorStop(0,‘rgba(255,205,65,.55)’);grd.addColorStop(1,‘rgba(255,155,15,0)’);
ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,TILE,0,Math.PI*2);ctx.fill();
}
ctx.shadowBlur=act?18:8;ctx.shadowColor=act?’#ffa020’:’#ffe070’;
ctx.fillStyle=act?’#ffd030’:’#ffee99’;
ctx.beginPath();ctx.arc(cx,cy,6.5+pulse*3*(act?1.6:1),0,Math.PI*2);ctx.fill();
if(!act){
ctx.strokeStyle=‘rgba(255,200,80,.45)’;ctx.lineWidth=1;
for(var si=0;si<6;si++){var sa=si*Math.PI/3;ctx.beginPath();ctx.moveTo(cx+Math.cos(sa)*5,cy+Math.sin(sa)*5);ctx.lineTo(cx+Math.cos(sa)*9.5,cy+Math.sin(sa)*9.5);ctx.stroke();}
ctx.lineWidth=1;
}
ctx.shadowBlur=0;
}else if(t===3){
ctx.fillStyle=’#111c0d’;ctx.fillRect(tx,ty,TILE,TILE);
ctx.strokeStyle=’#234016’;ctx.lineWidth=2;
for(var bi=0;bi<3;bi++){
var bx=tx+4+bi*9;
ctx.beginPath();ctx.moveTo(bx,ty);ctx.bezierCurveTo(bx-3,ty+TILE/3,bx+3,ty+TILE*2/3,bx,ty+TILE);ctx.stroke();
}ctx.lineWidth=1;
}
}
}
}

function drawPlayer(){
var p=pl,sh=Math.sin(shakeT*2.8)*(shakeT*0.5);
var px=p.x-cam.x+sh,py=p.y-cam.y;
ctx.globalAlpha=p.hitTimer>0?(Math.floor(p.hitTimer/5)%2===0?0.35:1):1;
var ga=ctx.createRadialGradient(px+7,py+12,1,px+7,py+12,20);
ga.addColorStop(0,‘rgba(120,190,255,.2)’);ga.addColorStop(1,‘rgba(100,170,255,0)’);
ctx.fillStyle=ga;ctx.beginPath();ctx.arc(px+7,py+12,20,0,Math.PI*2);ctx.fill();
ctx.fillStyle=’#18262e’;
ctx.beginPath();ctx.ellipse(px+7,py+16,7,12,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(px+7,py+7,6.5,7,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.moveTo(px+5,py+3);ctx.lineTo(px+7,py-8);ctx.lineTo(px+9,py+3);ctx.fill();
var ex=px+7+p.facing*3.5;
ctx.shadowBlur=7;ctx.shadowColor=’#80c0ff’;ctx.fillStyle=’#80c0ff’;
ctx.beginPath();ctx.arc(ex,py+6.5,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
if(p.atkTimer>0){
var at=p.atkTimer/14;
ctx.save();ctx.translate(px+7,py+13);
ctx.strokeStyle=‘rgba(180,225,255,’+(at*0.8)+’)’;ctx.lineWidth=2.5;
ctx.shadowBlur=10;ctx.shadowColor=’#b0d8ff’;
ctx.beginPath();
ctx.arc(0,0,50,p.facing>0?-Math.PI*0.4:-Math.PI*0.6,p.facing>0?Math.PI*0.4:Math.PI*0.6);
ctx.stroke();ctx.shadowBlur=0;ctx.restore();
}
ctx.globalAlpha=1;
}

function drawEnms(){
for(var i=0;i<enms.length;i++){
var e=enms[i];if(e.hp<=0)continue;
var ex=e.x-cam.x,ey=e.y-cam.y;
ctx.globalAlpha=e.hitTimer>0?0.4:1;
ctx.fillStyle=’#192b10’;ctx.shadowBlur=4;ctx.shadowColor=‘rgba(35,90,15,.5)’;
for(var j=0;j<3;j++){ctx.beginPath();ctx.ellipse(ex+3+j*6,ey+13,6-j*0.5,5.5,0,0,Math.PI*2);ctx.fill();}
ctx.beginPath();ctx.ellipse(ex+15,ey+7,6.5,8,0.15,0,Math.PI*2);ctx.fill();
ctx.fillStyle=’#ff2828’;ctx.shadowColor=’#ff2020’;ctx.shadowBlur=5;
ctx.beginPath();ctx.arc(ex+17,ey+5,2.2,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;ctx.globalAlpha=1;
}
}

function drawBoss(){
var b=boss;if(!b.active||b.hp<=0)return;
var bx=b.x-cam.x,by=b.y-cam.y,ph2=b.phase===2;
ctx.globalAlpha=b.hitTimer>0?0.4:1;
if(ph2){
var cg=ctx.createRadialGradient(bx+27,by+34,4,bx+27,by+34,46);
cg.addColorStop(0,‘rgba(180,20,10,.22)’);cg.addColorStop(1,‘rgba(180,20,10,0)’);
ctx.fillStyle=cg;ctx.beginPath();ctx.arc(bx+27,by+34,46,0,Math.PI*2);ctx.fill();
}
ctx.strokeStyle=ph2?’#4a0e0e’:’#1c3612’;ctx.lineWidth=3;
ctx.shadowBlur=ph2?8:0;ctx.shadowColor=’#cc1010’;
for(var i=0;i<6;i++){
var a=-Math.PI*0.85+i*Math.PI*0.34;
ctx.beginPath();ctx.moveTo(bx+27,by+b.h*0.78);
ctx.quadraticCurveTo(bx+27+Math.cos(a)*22,by+b.h*0.9+Math.sin(a)*12,bx+27+Math.cos(a)*44,by+b.h+Math.abs(Math.sin(a))*14);
ctx.stroke();
}
ctx.lineWidth=1;ctx.shadowBlur=0;
ctx.fillStyle=ph2?’#2c0e0e’:’#172c0e’;
ctx.beginPath();ctx.ellipse(bx+27,by+41,26,30,0,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(bx+13,by+34,12,20,-0.3,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(bx+41,by+34,12,20,0.3,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.ellipse(bx+27,by+15,16,16,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=ph2?’#5a1010’:’#2a4416’;ctx.lineWidth=1.8;
for(var j=0;j<7;j++){
var a2=-Math.PI+j*(Math.PI/6.5),rx=Math.cos(a2)*15,ry=Math.sin(a2)*14;
ctx.beginPath();ctx.moveTo(bx+27+rx,by+15+ry);ctx.lineTo(bx+27+rx+Math.cos(a2)*14,by+15+ry+Math.sin(a2)*14);ctx.stroke();
}
ctx.lineWidth=1;
var ec=ph2?’#ff2828’:’#44d028’;
ctx.fillStyle=ec;ctx.shadowBlur=12;ctx.shadowColor=ec;
ctx.beginPath();ctx.arc(bx+20,by+13,5,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(bx+34,by+13,5,0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;ctx.globalAlpha=1;
}

function drawProjs(){
for(var i=0;i<projs.length;i++){
var pr=projs[i];
ctx.shadowBlur=8;ctx.shadowColor=’#60a020’;ctx.fillStyle=’#4d8818’;
ctx.beginPath();ctx.arc(pr.x-cam.x,pr.y-cam.y,5.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
}
}

function drawParts(){
for(var i=0;i<parts.length;i++){
var pt=parts[i];
ctx.globalAlpha=(pt.life/pt.ml)*0.9;ctx.fillStyle=pt.col;
if(pt.type===‘wisp’){ctx.shadowBlur=8;ctx.shadowColor=pt.col;}
ctx.beginPath();ctx.arc(pt.x-cam.x,pt.y-cam.y,pt.r*(pt.life/pt.ml),0,Math.PI*2);ctx.fill();
ctx.shadowBlur=0;
}ctx.globalAlpha=1;
}

function drawDark(){
var ds=17*TILE-cam.x,de=41*TILE-cam.x;
if(ds>=GW||de<=0)return;
lctx.clearRect(0,0,GW,GH);
var lx0=Math.max(0,ds),lx1=Math.min(GW,de);
lctx.fillStyle=‘rgba(1,4,2,.82)’;lctx.fillRect(lx0,0,lx1-lx0,GH);
lctx.globalCompositeOperation=‘destination-out’;
var plx=pl.x+7-cam.x,ply=pl.y+12-cam.y;
var pg=lctx.createRadialGradient(plx,ply,0,plx,ply,52);
pg.addColorStop(0,‘rgba(0,0,0,.92)’);pg.addColorStop(1,‘rgba(0,0,0,0)’);
lctx.fillStyle=pg;lctx.beginPath();lctx.arc(plx,ply,52,0,Math.PI*2);lctx.fill();
for(var i=0;i<ORBS.length;i++){
if(!orbAct[i])continue;
var ox=ORBS[i].col*TILE+16-cam.x,oy=ORBS[i].row*TILE+16-cam.y;
var og=lctx.createRadialGradient(ox,oy,0,ox,oy,140);
og.addColorStop(0,‘rgba(0,0,0,1)’);og.addColorStop(0.5,‘rgba(0,0,0,.7)’);og.addColorStop(1,‘rgba(0,0,0,0)’);
lctx.fillStyle=og;lctx.beginPath();lctx.arc(ox,oy,140,0,Math.PI*2);lctx.fill();
}
lctx.globalCompositeOperation=‘source-over’;
ctx.drawImage(lc,0,0);
}

function drawHUD(){
var sh=Math.sin(shakeT*2.8)*(shakeT*0.5);
for(var i=0;i<pl.maxHp;i++){
ctx.fillStyle=i<pl.hp?‘rgba(70,195,55,.85)’:‘rgba(25,45,18,.5)’;
ctx.strokeStyle=i<pl.hp?‘rgba(95,215,75,.6)’:‘rgba(35,60,25,.4)’;
ctx.lineWidth=1;
if(i<pl.hp){ctx.shadowBlur=6;ctx.shadowColor=’#48bc38’;}
ctx.beginPath();ctx.arc(18+i*22+sh,18,7,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
}
var lit=0;for(var i2=0;i2<orbAct.length;i2++)if(orbAct[i2])lit++;
ctx.fillStyle=‘rgba(255,200,65,.7)’;ctx.font=‘10px Georgia’;
ctx.fillText(‘SEALS ‘+lit+’/2’,16,42);
if(gateOpen){ctx.fillStyle=‘rgba(110,205,75,.75)’;ctx.fillText(‘PATH OPEN’,16,56);}
if(boss&&boss.active&&boss.hp>0){
var bw=280,bh=8,bbx=(GW-bw)/2,bby=GH-26;
ctx.fillStyle=‘rgba(0,0,0,.55)’;ctx.fillRect(bbx-4,bby-18,bw+8,bh+24);
ctx.fillStyle=boss.phase===2?‘rgba(175,28,18,.9)’:‘rgba(135,22,18,.8)’;
ctx.fillRect(bbx,bby,bw*boss.hp/boss.maxHp,bh);
ctx.strokeStyle=‘rgba(175,55,45,.5)’;ctx.lineWidth=1;ctx.strokeRect(bbx,bby,bw,bh);
ctx.fillStyle=‘rgba(210,175,155,.75)’;ctx.font=‘9px Georgia’;ctx.textAlign=‘center’;
ctx.fillText(‘MOSSWHYR — THE HOLLOW WARDEN’,GW/2,bby-5);ctx.textAlign=‘left’;
}
ctx.fillStyle=‘rgba(130,175,120,.25)’;ctx.font=‘9px Georgia’;ctx.textAlign=‘right’;
ctx.fillText(‘Move: WASD  Jump: Space/Z  Light Pulse: X’,GW-10,GH-10);
ctx.textAlign=‘left’;
}

function drawTitle(){
var g=ctx.createLinearGradient(0,0,0,GH);
g.addColorStop(0,’#010603’);g.addColorStop(0.7,’#020d05’);g.addColorStop(1,’#050f07’);
ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
for(var i=0;i<60;i++){
var sx=(i*137.5)%GW,sy=(i*73.3)%180;
ctx.fillStyle=‘rgba(160,220,150,’+(0.12+Math.sin(Date.now()/700+i)*0.1)+’)’;
ctx.beginPath();ctx.arc(sx,sy,0.9,0,Math.PI*2);ctx.fill();
}
ctx.fillStyle=‘rgba(4,12,3,.95)’;
for(var i2=0;i2<22;i2++){
var tx2=i2*(GW/22)+15,th=50+Math.sin(i2*1.7)*40,tw=13+Math.sin(i2*0.9)*8;
ctx.beginPath();ctx.ellipse(tx2,GH*0.52,tw,th*0.8,0,0,Math.PI*2);ctx.fill();
}
ctx.fillStyle=‘rgba(3,10,2,.98)’;ctx.fillRect(0,GH*0.6,GW,GH);
ctx.shadowBlur=35;ctx.shadowColor=‘rgba(70,200,70,.32)’;
ctx.fillStyle=’#c8e4b8’;ctx.font=‘bold 60px Georgia’;ctx.textAlign=‘center’;
ctx.fillText(‘ASHVEIL’,GW/2,GH*0.34);ctx.shadowBlur=0;
ctx.fillStyle=‘rgba(120,178,108,.72)’;ctx.font=‘13px Georgia’;
ctx.fillText(‘T H E   U N D E R S T O R Y’,GW/2,GH*0.45);
ctx.fillStyle=‘rgba(90,145,82,.55)’;ctx.font=‘10px Georgia’;
ctx.fillText(‘Activate both Seals of Light. Break the root gate. Face Mosswhyr.’,GW/2,GH*0.6);
var bk=0.5+Math.sin(Date.now()/540)*0.38;
ctx.globalAlpha=bk;ctx.fillStyle=‘rgba(155,210,130,.9)’;ctx.font=‘11px Georgia’;
ctx.fillText(’— Press any key or tap to begin —’,GW/2,GH*0.78);
ctx.globalAlpha=1;ctx.textAlign=‘left’;
}

function drawDead(){
ctx.fillStyle=‘rgba(0,0,0,.65)’;ctx.fillRect(0,0,GW,GH);
ctx.fillStyle=‘rgba(165,45,35,.92)’;ctx.font=‘bold 30px Georgia’;ctx.textAlign=‘center’;
ctx.fillText(‘THE FOREST RECLAIMS YOU’,GW/2,GH*0.44);
ctx.fillStyle=‘rgba(195,150,140,.68)’;ctx.font=‘11px Georgia’;
ctx.fillText(‘Press any key or tap to try again’,GW/2,GH*0.57);ctx.textAlign=‘left’;
}

function drawWin(){
ctx.fillStyle=‘rgba(0,3,1,.72)’;ctx.fillRect(0,0,GW,GH);
ctx.shadowBlur=24;ctx.shadowColor=‘rgba(65,205,70,.44)’;
ctx.fillStyle=‘rgba(148,220,124,.96)’;ctx.font=‘bold 26px Georgia’;ctx.textAlign=‘center’;
ctx.fillText(‘THE UNDERSTORY FALLS SILENT’,GW/2,GH*0.38);ctx.shadowBlur=0;
ctx.fillStyle=‘rgba(122,195,104,.7)’;ctx.font=‘11px Georgia’;
ctx.fillText(‘Mosswhyr has returned to the root.’,GW/2,GH*0.52);
ctx.fillText(‘One seal of light — restored.’,GW/2,GH*0.60);
ctx.fillText(‘The sky still waits above.’,GW/2,GH*0.67);
ctx.fillStyle=‘rgba(95,155,84,.5)’;ctx.font=‘9px Georgia’;
ctx.fillText(‘tap or press any key to play again’,GW/2,GH*0.81);
ctx.textAlign=‘left’;
}

function frame(){
ctx.clearRect(0,0,GW,GH);
if(gs===‘title’){drawTitle();}
else if(gs===‘dead’){drawBG();drawDead();}
else if(gs===‘win’){drawWin();}
else{
update();
drawBG();drawTiles();drawParts();drawEnms();drawBoss();drawProjs();drawPlayer();
if(!gateOpen)drawDark();
drawHUD();
}
requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>

</body>
</html>
